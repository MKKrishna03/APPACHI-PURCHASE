<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Snap Bill Photo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, sans-serif;
        background: #f5f5f0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        color: #1a1a2e;
      }
      .card {
        background: #fff;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        width: 100%;
        max-width: 420px;
        text-align: center;
      }
      h1 {
        font-size: 20px;
        margin-bottom: 8px;
      }
      .sub {
        color: #8888aa;
        font-size: 13px;
        margin-bottom: 20px;
      }
      .bill-info {
        background: #f0efe9;
        border-radius: 10px;
        padding: 12px;
        margin-bottom: 20px;
        font-size: 13px;
        color: #444466;
      }
      .bill-info strong {
        color: #1a1a2e;
      }
      .camera-btn {
        display: block;
        width: 100%;
        padding: 18px;
        background: linear-gradient(135deg, #1d6fa4, #1a5a8a);
        color: #fff;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        margin-bottom: 12px;
        box-shadow: 0 4px 16px rgba(29, 111, 164, 0.3);
      }
      .camera-btn:active {
        transform: scale(0.98);
      }
      #fileInput {
        display: none;
      }
      .preview {
        margin: 16px 0;
        border-radius: 10px;
        max-width: 100%;
        max-height: 400px;
        display: none;
      }
      .preview.show {
        display: block;
      }
      .upload-btn {
        width: 100%;
        padding: 14px;
        background: #2d6a4f;
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 8px;
        display: none;
      }
      .upload-btn.show {
        display: block;
      }
      .upload-btn:disabled {
        background: #8888aa;
        cursor: not-allowed;
      }
      .retake-btn {
        width: 100%;
        padding: 12px;
        background: #fff;
        color: #1d6fa4;
        border: 1px solid #1d6fa4;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 8px;
        display: none;
      }
      .retake-btn.show {
        display: block;
      }
      .status {
        margin-top: 16px;
        padding: 12px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        display: none;
      }
      .status.success {
        display: block;
        background: #d8f3dc;
        color: #2d6a4f;
      }
      .status.error {
        display: block;
        background: #fce8e6;
        color: #b5301e;
      }
      .status.loading {
        display: block;
        background: #dbeeff;
        color: #1d6fa4;
      }
      .done-icon {
        font-size: 60px;
        margin-bottom: 12px;
      }
    </style>
  </head>
  <body>
    <div class="card" id="card">
      <h1>📸 Snap Bill Photo</h1>
      <div class="sub">Take a clear photo of the purchase bill</div>

      <div class="bill-info" id="billInfo">Loading session…</div>

      <button class="camera-btn" id="cameraBtn" onclick="openCamera()">
        📷 Open Camera
      </button>

      <input
        type="file"
        id="fileInput"
        accept="image/*"
        capture="environment"
        onchange="onPhotoSelected(event)"
      />

      <img class="preview" id="preview" />

      <button class="upload-btn" id="uploadBtn" onclick="uploadPhoto()">
        ✓ Use This Photo
      </button>
      <button class="retake-btn" id="retakeBtn" onclick="openCamera()">
        Retake
      </button>

      <div class="status" id="status"></div>
    </div>

    <script>
      const token = window.location.pathname.split("/").pop();
      let selectedFile = null;

      async function loadSession() {
        try {
          const res = await fetch(`/api/upload-session/${token}/status`);
          const data = await res.json();
          if (data.error) {
            document.getElementById("billInfo").textContent =
              "❌ Invalid or expired link";
            document.getElementById("cameraBtn").style.display = "none";
            return;
          }
          if (data.uploaded) {
            showDone();
            return;
          }
          document.getElementById("billInfo").innerHTML =
            `<strong>Bill:</strong> ${data.bill_no || "(not set)"}<br>` +
            `<strong>Company:</strong> ${data.company || "—"}`;
        } catch (e) {
          document.getElementById("billInfo").textContent =
            "Error loading session";
        }
      }

      function openCamera() {
        document.getElementById("fileInput").click();
      }

      function onPhotoSelected(e) {
        const file = e.target.files[0];
        if (!file) return;
        selectedFile = file;
        const reader = new FileReader();
        reader.onload = (ev) => {
          const img = document.getElementById("preview");
          img.src = ev.target.result;
          img.classList.add("show");
          document.getElementById("uploadBtn").classList.add("show");
          document.getElementById("retakeBtn").classList.add("show");
          document.getElementById("cameraBtn").style.display = "none";
        };
        reader.readAsDataURL(file);
      }

      async function uploadPhoto() {
        if (!selectedFile) return;
        const btn = document.getElementById("uploadBtn");
        btn.disabled = true;
        btn.textContent = "Uploading…";
        const status = document.getElementById("status");
        status.className = "status loading";
        status.textContent = "Uploading photo…";

        const fd = new FormData();
        fd.append("photo", selectedFile);
        try {
          const res = await fetch(`/api/upload-session/${token}/upload`, {
            method: "POST",
            body: fd,
          });
          const data = await res.json();
          if (data.status === "SUCCESS") {
            showDone();
          } else {
            status.className = "status error";
            status.textContent = "Error: " + (data.error || "Upload failed");
            btn.disabled = false;
            btn.textContent = "✓ Use This Photo";
          }
        } catch (e) {
          status.className = "status error";
          status.textContent = "Error: " + e.message;
          btn.disabled = false;
          btn.textContent = "✓ Use This Photo";
        }
      }

      function showDone() {
        document.getElementById("card").innerHTML = `
          <div class="done-icon">✅</div>
          <h1>Photo Uploaded!</h1>
          <div class="sub" style="margin-top:12px;">
            You can close this page now.<br>The PC will update automatically.
          </div>
        `;
      }

      loadSession();
    </script>
  </body>
</html>
