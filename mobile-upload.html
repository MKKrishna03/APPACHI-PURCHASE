<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Snap Bill Photo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/cropperjs@1.6.1/dist/cropper.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/cropperjs@1.6.1/dist/cropper.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, sans-serif;
        background: #f5f5f0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        color: #1a1a2e;
      }
      .card {
        background: #fff;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        width: 100%;
        max-width: 420px;
        text-align: center;
      }
      h1 {
        font-size: 20px;
        margin-bottom: 8px;
      }
      .sub {
        color: #8888aa;
        font-size: 13px;
        margin-bottom: 20px;
      }
      .bill-info {
        background: #f0efe9;
        border-radius: 10px;
        padding: 12px;
        margin-bottom: 20px;
        font-size: 13px;
        color: #444466;
      }
      .bill-info strong {
        color: #1a1a2e;
      }
      .camera-btn {
        display: block;
        width: 100%;
        padding: 18px;
        background: linear-gradient(135deg, #1d6fa4, #1a5a8a);
        color: #fff;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        margin-bottom: 12px;
        box-shadow: 0 4px 16px rgba(29, 111, 164, 0.3);
      }
      .camera-btn:active {
        transform: scale(0.98);
      }
      #fileInput {
        display: none;
      }
      .preview {
        margin: 16px 0;
        border-radius: 10px;
        max-width: 100%;
        max-height: 400px;
        display: none;
      }
      .preview.show {
        display: block;
      }
      .crop-container {
        margin: 16px 0;
        max-width: 100%;
        max-height: 60vh;
        display: none;
        background: #000;
        border-radius: 10px;
        overflow: hidden;
      }
      .crop-container.show {
        display: block;
      }
      .crop-container img {
        max-width: 100%;
        display: block;
      }
      .crop-controls {
        display: none;
        gap: 6px;
        flex-wrap: wrap;
        justify-content: center;
        margin-bottom: 10px;
      }
      .crop-controls.show {
        display: flex;
      }
      .crop-btn {
        padding: 8px 12px;
        background: #f0efe9;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
        color: #444466;
      }
      .crop-btn:active {
        background: #ddd;
      }
      .preview.show {
        display: block;
      }
      .upload-btn {
        width: 100%;
        padding: 14px;
        background: #2d6a4f;
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 8px;
        display: none;
      }
      .upload-btn.show {
        display: block;
      }
      .upload-btn:disabled {
        background: #8888aa;
        cursor: not-allowed;
      }
      .retake-btn {
        width: 100%;
        padding: 12px;
        background: #fff;
        color: #1d6fa4;
        border: 1px solid #1d6fa4;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 8px;
        display: none;
      }
      .retake-btn.show {
        display: block;
      }
      .status {
        margin-top: 16px;
        padding: 12px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        display: none;
      }
      .status.success {
        display: block;
        background: #d8f3dc;
        color: #2d6a4f;
      }
      .status.error {
        display: block;
        background: #fce8e6;
        color: #b5301e;
      }
      .status.loading {
        display: block;
        background: #dbeeff;
        color: #1d6fa4;
      }
      .done-icon {
        font-size: 60px;
        margin-bottom: 12px;
      }
    </style>
  </head>
  <body>
    <div class="card" id="card">
      <h1>📸 Snap Bill Photo</h1>
      <div class="sub">Take a clear photo of the purchase bill</div>

      <div class="bill-info" id="billInfo">Loading session…</div>

      <button class="camera-btn" id="cameraBtn" onclick="openCamera()">
        📷 Open Camera
      </button>

      <input
        type="file"
        id="fileInput"
        accept="image/*"
        capture="environment"
        onchange="onPhotoSelected(event)"
      />

      <div class="crop-container" id="cropContainer">
        <img id="cropImg" />
      </div>

      <div class="crop-controls" id="cropControls">
        <button class="crop-btn" onclick="rotateCrop(-90)">↺ Rotate L</button>
        <button class="crop-btn" onclick="rotateCrop(90)">↻ Rotate R</button>
        <button class="crop-btn" onclick="resetCrop()">Reset</button>
      </div>

      <img class="preview" id="preview" />

      <button
        class="upload-btn"
        id="confirmCropBtn"
        onclick="confirmCrop()"
        style="display: none; background: #1d6fa4"
      >
        ✂ Use Cropped Photo
      </button>
      <button class="upload-btn" id="uploadBtn" onclick="uploadPhoto()">
        ✓ Use This Photo
      </button>
      <button class="retake-btn" id="retakeBtn" onclick="openCamera()">
        Retake
      </button>

      <div class="status" id="status"></div>
    </div>

    <script>
      const token = window.location.pathname.split("/").pop();
      let selectedFile = null;

      async function loadSession() {
        try {
          const res = await fetch(`/api/upload-session/${token}/status`);
          const data = await res.json();
          if (data.error) {
            document.getElementById("billInfo").textContent =
              "❌ Invalid or expired link";
            document.getElementById("cameraBtn").style.display = "none";
            return;
          }
          if (data.uploaded) {
            showDone();
            return;
          }
          document.getElementById("billInfo").innerHTML =
            `<strong>Bill:</strong> ${data.bill_no || "(not set)"}<br>` +
            `<strong>Company:</strong> ${data.company || "—"}`;
        } catch (e) {
          document.getElementById("billInfo").textContent =
            "Error loading session";
        }
      }

      function openCamera() {
        if (cropper) {
          cropper.destroy();
          cropper = null;
        }
        document.getElementById("cropContainer").classList.remove("show");
        document.getElementById("cropControls").classList.remove("show");
        document.getElementById("confirmCropBtn").style.display = "none";
        document.getElementById("preview").classList.remove("show");
        document.getElementById("uploadBtn").classList.remove("show");
        document.getElementById("fileInput").click();
      }

      let cropper = null;

      function onPhotoSelected(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          const img = document.getElementById("cropImg");
          img.src = ev.target.result;
          document.getElementById("cropContainer").classList.add("show");
          document.getElementById("cropControls").classList.add("show");
          document.getElementById("confirmCropBtn").style.display = "block";
          document.getElementById("retakeBtn").classList.add("show");
          document.getElementById("cameraBtn").style.display = "none";
          document.getElementById("preview").classList.remove("show");
          document.getElementById("uploadBtn").classList.remove("show");

          if (cropper) cropper.destroy();
          cropper = new Cropper(img, {
            viewMode: 1,
            autoCropArea: 1,
            background: false,
            movable: true,
            zoomable: true,
            scalable: true,
            rotatable: true,
          });
        };
        reader.readAsDataURL(file);
      }

      function rotateCrop(deg) {
        if (cropper) cropper.rotate(deg);
      }
      function resetCrop() {
        if (cropper) cropper.reset();
      }

      function confirmCrop() {
        if (!cropper) return;
        const canvas = cropper.getCroppedCanvas({
          maxWidth: 2000,
          maxHeight: 2000,
          imageSmoothingQuality: "high",
        });
        canvas.toBlob(
          (blob) => {
            selectedFile = new File([blob], "bill_cropped.jpg", {
              type: "image/jpeg",
            });
            const url = URL.createObjectURL(blob);

            document.getElementById("cropContainer").classList.remove("show");
            document.getElementById("cropControls").classList.remove("show");
            document.getElementById("confirmCropBtn").style.display = "none";
            if (cropper) {
              cropper.destroy();
              cropper = null;
            }

            const img = document.getElementById("preview");
            img.src = url;
            img.classList.add("show");
            document.getElementById("uploadBtn").classList.add("show");
          },
          "image/jpeg",
          0.9,
        );
      }

      async function uploadPhoto() {
        if (!selectedFile) return;
        const btn = document.getElementById("uploadBtn");
        btn.disabled = true;
        btn.textContent = "Uploading…";
        const status = document.getElementById("status");
        status.className = "status loading";
        status.textContent = "Uploading photo…";

        const fd = new FormData();
        fd.append("photo", selectedFile);
        try {
          const res = await fetch(`/api/upload-session/${token}/upload`, {
            method: "POST",
            body: fd,
          });
          const data = await res.json();
          if (data.status === "SUCCESS") {
            showDone();
          } else {
            status.className = "status error";
            status.textContent = "Error: " + (data.error || "Upload failed");
            btn.disabled = false;
            btn.textContent = "✓ Use This Photo";
          }
        } catch (e) {
          status.className = "status error";
          status.textContent = "Error: " + e.message;
          btn.disabled = false;
          btn.textContent = "✓ Use This Photo";
        }
      }

      function showDone() {
        document.getElementById("card").innerHTML = `
          <div class="done-icon">✅</div>
          <h1>Photo Uploaded!</h1>
          <div class="sub" style="margin-top:12px;">
            You can close this page now.<br>The PC will update automatically.
          </div>
        `;
      }

      loadSession();
    </script>
  </body>
</html>
