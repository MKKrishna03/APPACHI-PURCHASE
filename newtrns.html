<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Transaction</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f5f5f0;
        --surface: #ffffff;
        --surface-2: #f9f9f6;
        --ink: #1a1a2e;
        --ink-2: #444466;
        --ink-3: #8888aa;
        --accent: #2d6a4f;
        --accent-2: #245c43;
        --accent-soft: rgba(45, 106, 79, 0.08);
        --danger: #b5301e;
        --danger-soft: rgba(181, 48, 30, 0.08);
        --border: rgba(0, 0, 0, 0.08);
        --border-strong: rgba(0, 0, 0, 0.14);
        --radius: 12px;
        --radius-lg: 18px;
        --shadow:
          0 2px 8px rgba(0, 0, 0, 0.06), 0 16px 40px rgba(0, 0, 0, 0.08);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        font-family: "DM Sans", system-ui, sans-serif;
        background: var(--bg);
        color: var(--ink);
      }

      .page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 28px;
      }

      .modal-overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: rgba(26, 26, 46, 0.2);
        backdrop-filter: blur(4px);
      }

      .modal {
        width: min(760px, 100%);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
        padding: 30px;
      }

      .modal-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 24px;
      }

      .eyebrow {
        margin: 0 0 8px;
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--accent);
        font-weight: 700;
      }

      h1 {
        margin: 0;
        font-size: 26px;
        line-height: 1.1;
        font-weight: 700;
        color: var(--ink);
      }

      .subtext {
        margin: 10px 0 0;
        font-size: 13px;
        color: var(--ink-3);
      }

      .close-link {
        border: 0;
        background: transparent;
        color: var(--ink-3);
        cursor: pointer;
        font-size: 13px;
        padding: 10px 0;
        font-family: inherit;
      }
      .close-link:hover {
        color: var(--ink);
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .form-group.full {
        grid-column: 1 / -1;
      }

      label {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--ink-3);
      }

      select,
      input {
        width: 100%;
        padding: 11px 14px;
        border-radius: var(--radius);
        border: 1px solid var(--border-strong);
        background: var(--surface-2);
        color: var(--ink);
        font-size: 14px;
        font-family: inherit;
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
      }
      select:focus,
      input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(45, 106, 79, 0.1);
        background: var(--surface);
      }

      .section-card {
        margin-top: 20px;
        padding: 20px;
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
      }

      .section-title {
        margin: 0 0 14px;
        font-size: 16px;
        font-weight: 700;
        color: var(--ink);
      }

      .hint {
        margin-top: 14px;
        padding: 12px 14px;
        border-radius: var(--radius);
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 13px;
        display: none;
      }
      .hint.show {
        display: block;
      }

      .message {
        margin-top: 18px;
        padding: 12px 14px;
        border-radius: var(--radius);
        font-size: 13px;
        display: none;
      }
      .message.success {
        display: block;
        background: var(--accent-soft);
        color: var(--accent);
      }
      .message.error {
        display: block;
        background: var(--danger-soft);
        color: var(--danger);
      }

      .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 24px;
      }

      .btn {
        border: 0;
        border-radius: 99px;
        padding: 12px 22px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        font-family: inherit;
        transition:
          background 0.15s,
          transform 0.1s;
      }
      .btn-secondary {
        background: var(--surface-2);
        border: 1px solid var(--border-strong);
        color: var(--ink);
      }
      .btn-secondary:hover {
        background: var(--surface);
      }
      .btn-primary {
        background: var(--accent);
        color: #fff;
        box-shadow: 0 4px 12px rgba(45, 106, 79, 0.2);
      }
      .btn-primary:hover {
        background: var(--accent-2);
      }

      .hidden {
        display: none;
      }

      @media (max-width: 700px) {
        .modal {
          padding: 22px;
        }
        .form-grid {
          grid-template-columns: 1fr;
        }
        .modal-actions {
          flex-direction: column-reverse;
        }
        .btn {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="page"></div>

    <div class="modal-overlay" id="transactionOverlay">
      <div
        class="modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modalTitle"
      >
        <div class="modal-header">
          <div>
            <p class="eyebrow">Transaction Entry</p>
            <h1 id="modalTitle">Receipt or Payment</h1>
            <p class="subtext">
              Select the transaction flow first, then the rest of the form will
              open below.
            </p>
          </div>
          <button class="close-link" type="button" onclick="goBack()">
            Close
          </button>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label for="transactionKind">Receipt / Payment</label>
            <select id="transactionKind">
              <option value="">Select Type</option>
              <option value="Receipt Voucher">Receipt</option>
              <option value="Payment Voucher">Payment</option>
            </select>
          </div>
          <div class="form-group">
            <label for="companySelect">Company</label>
            <select id="companySelect">
              <option value="">Select Company</option>
            </select>
          </div>
          <div class="form-group full">
            <label for="entryType">New / Against</label>
            <select id="entryType">
              <option value="">Select Entry Type</option>
              <option value="new">New</option>
              <option value="against">Against</option>
            </select>
          </div>
        </div>

        <div class="section-card hidden" id="newSection">
          <h2 class="section-title">New Transaction Details</h2>
          <div class="form-grid">
            <div class="form-group">
              <label for="newDate">Date</label
              ><input type="date" id="newDate" />
            </div>
            <div class="form-group">
              <label for="newAmount">Amount</label
              ><input type="number" id="newAmount" min="0" step="0.01" />
            </div>
            <div class="form-group full">
              <label for="newMop">MOP</label
              ><select id="newMop">
                <option value="">Select MOP</option>
                <option value="Cash">Cash</option>
                <option value="NEFT/RTGS">NEFT/RTGS</option>
              </select>
            </div>
          </div>
        </div>

        <div class="section-card hidden" id="againstSection">
          <h2 class="section-title">Against Bill Details</h2>
          <div class="form-grid">
            <div class="form-group">
              <label for="againstVoucherType">Voucher Type</label
              ><select id="againstVoucherType">
                <option value="">Select Voucher Type</option>
              </select>
            </div>
            <div class="form-group">
              <label for="againstBillNo">Bill No</label
              ><select id="againstBillNo">
                <option value="">Select Bill No</option>
              </select>
            </div>
            <div class="form-group">
              <label for="againstDate">Date</label
              ><input type="date" id="againstDate" />
            </div>
            <div class="form-group">
              <label for="againstAmount">Amount</label
              ><input type="number" id="againstAmount" min="0" step="0.01" />
            </div>
            <div class="form-group full">
              <label for="againstMop">MOP</label
              ><select id="againstMop">
                <option value="">Select MOP</option>
                <option value="Cash">Cash</option>
                <option value="NEFT/RTGS">NEFT/RTGS</option>
              </select>
            </div>
          </div>
          <div class="hint" id="againstHint"></div>
        </div>

        <div class="modal-actions">
          <button class="btn btn-secondary" type="button" onclick="resetForm()">
            Reset
          </button>
          <button
            class="btn btn-primary"
            type="button"
            id="saveButton"
            onclick="saveTransaction()"
          >
            Save Transaction
          </button>
        </div>

        <div id="formMessage" class="message"></div>
      </div>
    </div>

    <script>
      const companySelect = document.getElementById("companySelect");
      const transactionKind = document.getElementById("transactionKind");
      const entryType = document.getElementById("entryType");
      const newSection = document.getElementById("newSection");
      const againstSection = document.getElementById("againstSection");
      const againstVoucherType = document.getElementById("againstVoucherType");
      const againstBillNo = document.getElementById("againstBillNo");
      const againstHint = document.getElementById("againstHint");
      const formMessage = document.getElementById("formMessage");
      const saveButton = document.getElementById("saveButton");

      let companies = [];
      let companyVouchers = [];

      function todayValue() {
        return new Date().toISOString().split("T")[0];
      }
      function setMessage(text, type) {
        formMessage.textContent = text;
        formMessage.className = "message " + type;
      }
      function clearMessage() {
        formMessage.textContent = "";
        formMessage.className = "message";
      }
      function goBack() {
        window.location.href = "/";
      }

      function resetVoucherSelectors() {
        companyVouchers = [];
        againstVoucherType.innerHTML =
          '<option value="">Select Voucher Type</option>';
        againstBillNo.innerHTML = '<option value="">Select Bill No</option>';
        againstHint.textContent = "";
        againstHint.classList.remove("show");
      }

      function resetForm() {
        transactionKind.value = "";
        companySelect.value = "";
        entryType.value = "";
        document.getElementById("newDate").value = todayValue();
        document.getElementById("newAmount").value = "";
        document.getElementById("newMop").value = "";
        document.getElementById("againstDate").value = todayValue();
        document.getElementById("againstAmount").value = "";
        document.getElementById("againstMop").value = "";
        newSection.classList.add("hidden");
        againstSection.classList.add("hidden");
        resetVoucherSelectors();
        clearMessage();
        updateSaveLabel();
      }

      function updateSaveLabel() {
        saveButton.textContent =
          transactionKind.value === "Payment Voucher"
            ? "Save Payment"
            : transactionKind.value === "Receipt Voucher"
              ? "Save Receipt"
              : "Save Transaction";
      }

      function updateSections() {
        clearMessage();
        newSection.classList.toggle("hidden", entryType.value !== "new");
        againstSection.classList.toggle(
          "hidden",
          entryType.value !== "against",
        );
      }

      async function loadCompanies() {
        const res = await fetch("/api/profiles/list");
        companies = await res.json();
        companySelect.innerHTML = '<option value="">Select Company</option>';
        companies.forEach((c) => {
          const o = document.createElement("option");
          o.value = c.id;
          o.textContent = c.alias;
          companySelect.appendChild(o);
        });
      }

      let labourReceiptVouchers = [];
      let openChittais = [];

      async function loadCompanyVouchers() {
        resetVoucherSelectors();
        labourReceiptVouchers = [];
        if (!companySelect.value) return;
        const [vouchersRes, chittaiRes, labourRes] = await Promise.all([
          fetch(
            `/api/vouchers/list?profile_id=${encodeURIComponent(companySelect.value)}&unlinked_only=true`,
          ),
          fetch(
            `/api/chittai/list?profile_id=${encodeURIComponent(companySelect.value)}&is_paid=false`,
          ),
          fetch(
            `/api/labour/list?profile_id=${encodeURIComponent(companySelect.value)}&voucher_type=Receipt Voucher`,
          ),
        ]);
        const vouchersData = await vouchersRes.json();
        const chittaiData = await chittaiRes.json();
        const labourData = await labourRes.json();
        openChittais = Array.isArray(chittaiData) ? chittaiData : [];
        companyVouchers = Array.isArray(vouchersData) ? vouchersData : [];
        labourReceiptVouchers = Array.isArray(labourData)
          ? labourData.filter((l) => l.voucher_type === "Receipt Voucher")
          : [];
        const voucherTypes = [
          ...new Set(
            companyVouchers.map((v) => v.voucher_type).filter(Boolean),
          ),
        ].filter((t) => t !== "Chittai Payment");
        if (openChittais.length) {
          if (!voucherTypes.includes("Chittai")) voucherTypes.push("Chittai");
        }
        if (labourReceiptVouchers.length) {
          [
            ...new Set(
              labourReceiptVouchers.map((l) => l.voucher_type).filter(Boolean),
            ),
          ].forEach((t) => {
            if (!voucherTypes.includes(t)) voucherTypes.push(t);
          });
        }
        if (!voucherTypes.length) {
          againstHint.textContent =
            "No existing vouchers found for this company yet.";
          againstHint.classList.add("show");
          return;
        }
        voucherTypes.forEach((type) => {
          const o = document.createElement("option");
          o.value = type;
          o.textContent = type;
          againstVoucherType.appendChild(o);
        });
      }

      function populateBillNumbers() {
        againstBillNo.innerHTML = '<option value="">Select Bill No</option>';
        againstHint.textContent = "";
        againstHint.classList.remove("show");
        if (!againstVoucherType.value) return;
        if (againstVoucherType.value === "Chittai") {
          if (!openChittais.length) {
            againstHint.textContent =
              "No unpaid Chittais found for this company.";
            againstHint.classList.add("show");
            return;
          }
          openChittais.forEach((c) => {
            const o = document.createElement("option");
            o.value = c.chittai_no;
            o.textContent = c.chittai_no;
            o.dataset.amount = c.rtgs_amount || "";
            againstBillNo.appendChild(o);
          });
          return;
        }
        if (againstVoucherType.value === "Receipt Voucher") {
          if (!labourReceiptVouchers.length) {
            againstHint.textContent = "No unlinked Receipt Vouchers found.";
            againstHint.classList.add("show");
            return;
          }
          labourReceiptVouchers.forEach((lv) => {
            const o = document.createElement("option");
            o.value = lv.receipt_bill_no || `ID-${lv.id}`;
            o.textContent = lv.receipt_bill_no || `ID-${lv.id}`;
            o.dataset.amount = "";
            againstBillNo.appendChild(o);
          });
          return;
        }
        const filtered = companyVouchers.filter(
          (v) => v.voucher_type === againstVoucherType.value,
        );
        if (!filtered.length) {
          againstHint.textContent = "No bills found under this voucher type.";
          againstHint.classList.add("show");
          return;
        }
        filtered.forEach((v) => {
          const o = document.createElement("option");
          o.value = v.bill_no || `ID-${v.id}`;
          o.textContent = v.bill_no || `ID-${v.id}`;
          o.dataset.amount = v.total_value || "";
          againstBillNo.appendChild(o);
        });
      }

      function handleBillSelection() {
        const sel = againstBillNo.options[againstBillNo.selectedIndex];
        if (sel && sel.value && sel.dataset.amount)
          document.getElementById("againstAmount").value = sel.dataset.amount;
      }

      async function saveTransaction() {
        clearMessage();
        if (
          !transactionKind.value ||
          !companySelect.value ||
          !entryType.value
        ) {
          setMessage(
            "Please select Receipt/Payment, Company, and New/Against first.",
            "error",
          );
          return;
        }
        let payload;
        if (entryType.value === "new") {
          const date = document.getElementById("newDate").value,
            amount = document.getElementById("newAmount").value,
            mop = document.getElementById("newMop").value;
          if (!date || !amount || !mop) {
            setMessage("Please fill Date, Amount, and MOP.", "error");
            return;
          }
          payload = {
            profile_id: companySelect.value,
            voucher_type: transactionKind.value,
            date,
            bill_no: null,
            entry_type: "new",
            description:
              (transactionKind.value === "Receipt Voucher"
                ? "Receipt"
                : "Payment") +
              " via " +
              mop,
            total_value: amount,
          };
        } else {
          const vt = againstVoucherType.value,
            bn = againstBillNo.value,
            date = document.getElementById("againstDate").value,
            amount = document.getElementById("againstAmount").value,
            mop = document.getElementById("againstMop").value;
          if (!vt || !bn || !date || !amount || !mop) {
            setMessage("Please fill all against fields.", "error");
            return;
          }
          payload = {
            profile_id: companySelect.value,
            voucher_type: transactionKind.value,
            date,
            bill_no: bn,
            entry_type: "against",
            description:
              (transactionKind.value === "Receipt Voucher"
                ? "Receipt"
                : "Payment") +
              " against " +
              vt +
              " via " +
              mop,
            total_value: amount,
          };
        }
        try {
          saveButton.disabled = true;
          const res = await fetch("/api/vouchers", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const result = await res.json();
          if (result.id) {
            const kind = transactionKind.value;
            resetForm();
            transactionKind.value = kind;
            updateSaveLabel();
            setMessage("Transaction saved successfully.", "success");
          } else setMessage(result.error || "Failed to save.", "error");
        } catch (err) {
          setMessage("Network error: " + err.message, "error");
        } finally {
          saveButton.disabled = false;
        }
      }

      transactionKind.addEventListener("change", updateSaveLabel);
      companySelect.addEventListener("change", async function () {
        clearMessage();
        if (entryType.value === "against") await loadCompanyVouchers();
        else resetVoucherSelectors();
      });
      againstVoucherType.addEventListener("change", populateBillNumbers);
      againstBillNo.addEventListener("change", handleBillSelection);
      entryType.addEventListener("change", async function () {
        updateSections();
        if (entryType.value === "against") await loadCompanyVouchers();
        else resetVoucherSelectors();
      });

      document.getElementById("newDate").value = todayValue();
      document.getElementById("againstDate").value = todayValue();
      loadCompanies().catch((err) =>
        setMessage("Unable to load companies: " + err.message, "error"),
      );
    </script>
  </body>
</html>
