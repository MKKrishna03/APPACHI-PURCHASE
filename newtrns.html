<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Transaction</title>
    <style>
      :root {
        --bg: #f4f1e8;
        --panel: #fffdf8;
        --panel-2: #f7f3ea;
        --ink: #1f2a37;
        --muted: #6b7280;
        --line: rgba(31, 42, 55, 0.12);
        --accent: #0f766e;
        --accent-2: #115e59;
        --accent-soft: rgba(15, 118, 110, 0.1);
        --danger: #b91c1c;
        --danger-soft: rgba(185, 28, 28, 0.08);
        --radius: 18px;
        --shadow: 0 18px 50px rgba(31, 42, 55, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Georgia, "Times New Roman", serif;
        background:
          radial-gradient(circle at top left, rgba(15, 118, 110, 0.14), transparent 30%),
          linear-gradient(135deg, #f6f1e7 0%, #efe6d7 50%, #f7f4ee 100%);
        color: var(--ink);
      }

      .page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 28px;
      }

      .modal-overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: rgba(45, 35, 20, 0.28);
        backdrop-filter: blur(5px);
      }

      .modal {
        width: min(760px, 100%);
        background: linear-gradient(180deg, rgba(255, 253, 248, 0.98), rgba(247, 243, 234, 0.98));
        border: 1px solid rgba(255, 255, 255, 0.8);
        border-radius: 28px;
        box-shadow: var(--shadow);
        padding: 30px;
      }

      .modal-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 24px;
      }

      .eyebrow {
        margin: 0 0 8px;
        font-size: 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent);
        font-weight: 700;
        font-family: Arial, sans-serif;
      }

      h1 {
        margin: 0;
        font-size: 32px;
        line-height: 1.05;
        font-weight: 700;
      }

      .subtext {
        margin: 10px 0 0;
        font-size: 15px;
        color: var(--muted);
        font-family: Arial, sans-serif;
      }

      .close-link {
        border: 0;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        font-size: 14px;
        padding: 10px 0;
        font-family: Arial, sans-serif;
      }

      .close-link:hover {
        color: var(--ink);
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .form-group.full {
        grid-column: 1 / -1;
      }

      label {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
        font-family: Arial, sans-serif;
      }

      select,
      input {
        width: 100%;
        padding: 13px 14px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.95);
        color: var(--ink);
        font-size: 15px;
        font-family: Arial, sans-serif;
        transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
      }

      select:focus,
      input:focus {
        outline: none;
        border-color: rgba(15, 118, 110, 0.55);
        box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.12);
        transform: translateY(-1px);
      }

      .section-card {
        margin-top: 22px;
        padding: 20px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(31, 42, 55, 0.08);
        border-radius: 20px;
      }

      .section-title {
        margin: 0 0 14px;
        font-size: 17px;
        font-weight: 700;
      }

      .hint {
        margin-top: 14px;
        padding: 12px 14px;
        border-radius: 14px;
        background: var(--accent-soft);
        color: var(--accent-2);
        font-size: 13px;
        font-family: Arial, sans-serif;
        display: none;
      }

      .hint.show {
        display: block;
      }

      .message {
        margin-top: 18px;
        padding: 13px 15px;
        border-radius: 14px;
        font-size: 14px;
        font-family: Arial, sans-serif;
        display: none;
      }

      .message.success {
        display: block;
        background: var(--accent-soft);
        color: var(--accent-2);
      }

      .message.error {
        display: block;
        background: var(--danger-soft);
        color: var(--danger);
      }

      .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        margin-top: 26px;
      }

      .btn {
        border: 0;
        border-radius: 999px;
        padding: 13px 22px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        font-family: Arial, sans-serif;
      }

      .btn-secondary {
        background: rgba(255, 255, 255, 0.8);
        border: 1px solid var(--line);
        color: var(--ink);
      }

      .btn-primary {
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: #fff;
        box-shadow: 0 12px 24px rgba(15, 118, 110, 0.24);
      }

      .hidden {
        display: none;
      }

      @media (max-width: 700px) {
        .modal {
          padding: 22px;
          border-radius: 22px;
        }

        .form-grid {
          grid-template-columns: 1fr;
        }

        .modal-actions {
          flex-direction: column-reverse;
        }

        .btn {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="page"></div>

    <div class="modal-overlay" id="transactionOverlay">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-header">
          <div>
            <p class="eyebrow">Transaction Entry</p>
            <h1 id="modalTitle">Receipt or Payment</h1>
            <p class="subtext">
              Select the transaction flow first, then the rest of the form will open below.
            </p>
          </div>
          <button class="close-link" type="button" onclick="goBack()">Close</button>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label for="transactionKind">Receipt / Payment</label>
            <select id="transactionKind">
              <option value="">Select Type</option>
              <option value="Receipt Voucher">Receipt</option>
              <option value="Payment Voucher">Payment</option>
            </select>
          </div>

          <div class="form-group">
            <label for="companySelect">Company</label>
            <select id="companySelect">
              <option value="">Select Alias</option>
            </select>
          </div>

          <div class="form-group full">
            <label for="entryType">New / Against</label>
            <select id="entryType">
              <option value="">Select Entry Type</option>
              <option value="new">New</option>
              <option value="against">Against</option>
            </select>
          </div>
        </div>

        <div class="section-card hidden" id="newSection">
          <h2 class="section-title">New Transaction Details</h2>
          <div class="form-grid">
            <div class="form-group">
              <label for="newDate">Date</label>
              <input type="date" id="newDate" />
            </div>

            <div class="form-group">
              <label for="newAmount">Amount</label>
              <input type="number" id="newAmount" min="0" step="0.01" />
            </div>

            <div class="form-group full">
              <label for="newMop">MOP</label>
              <select id="newMop">
                <option value="">Select MOP</option>
                <option value="Cash">Cash</option>
                <option value="NEFT/RTGS">NEFT/RTGS</option>
              </select>
            </div>
          </div>
        </div>

        <div class="section-card hidden" id="againstSection">
          <h2 class="section-title">Against Bill Details</h2>
          <div class="form-grid">
            <div class="form-group">
              <label for="againstVoucherType">Voucher Type</label>
              <select id="againstVoucherType">
                <option value="">Select Voucher Type</option>
              </select>
            </div>

            <div class="form-group">
              <label for="againstBillNo">Bill No</label>
              <select id="againstBillNo">
                <option value="">Select Bill No</option>
              </select>
            </div>

            <div class="form-group">
              <label for="againstDate">Date</label>
              <input type="date" id="againstDate" />
            </div>

            <div class="form-group">
              <label for="againstAmount">Amount</label>
              <input type="number" id="againstAmount" min="0" step="0.01" />
            </div>

            <div class="form-group full">
              <label for="againstMop">MOP</label>
              <select id="againstMop">
                <option value="">Select MOP</option>
                <option value="Cash">Cash</option>
                <option value="NEFT/RTGS">NEFT/RTGS</option>
              </select>
            </div>
          </div>
          <div class="hint" id="againstHint"></div>
        </div>

        <div class="modal-actions">
          <button class="btn btn-secondary" type="button" onclick="resetForm()">
            Reset
          </button>
          <button class="btn btn-primary" type="button" id="saveButton" onclick="saveTransaction()">
            Save Transaction
          </button>
        </div>

        <div id="formMessage" class="message"></div>
      </div>
    </div>

    <script>
      const companySelect = document.getElementById("companySelect");
      const transactionKind = document.getElementById("transactionKind");
      const entryType = document.getElementById("entryType");
      const newSection = document.getElementById("newSection");
      const againstSection = document.getElementById("againstSection");
      const againstVoucherType = document.getElementById("againstVoucherType");
      const againstBillNo = document.getElementById("againstBillNo");
      const againstHint = document.getElementById("againstHint");
      const formMessage = document.getElementById("formMessage");
      const saveButton = document.getElementById("saveButton");

      let companies = [];
      let companyVouchers = [];

      function todayValue() {
        return new Date().toISOString().split("T")[0];
      }

      function setMessage(text, type) {
        formMessage.textContent = text;
        formMessage.className = "message " + type;
      }

      function clearMessage() {
        formMessage.textContent = "";
        formMessage.className = "message";
      }

      function goBack() {
        window.location.href = "/";
      }

      function resetVoucherSelectors() {
        companyVouchers = [];
        againstVoucherType.innerHTML =
          '<option value="">Select Voucher Type</option>';
        againstBillNo.innerHTML = '<option value="">Select Bill No</option>';
        againstHint.textContent = "";
        againstHint.classList.remove("show");
      }

      function resetForm() {
        transactionKind.value = "";
        companySelect.value = "";
        entryType.value = "";
        document.getElementById("newDate").value = todayValue();
        document.getElementById("newAmount").value = "";
        document.getElementById("newMop").value = "";
        document.getElementById("againstDate").value = todayValue();
        document.getElementById("againstAmount").value = "";
        document.getElementById("againstMop").value = "";
        newSection.classList.add("hidden");
        againstSection.classList.add("hidden");
        resetVoucherSelectors();
        clearMessage();
        updateSaveLabel();
      }

      function updateSaveLabel() {
        const label =
          transactionKind.value === "Payment Voucher"
            ? "Save Payment"
            : transactionKind.value === "Receipt Voucher"
              ? "Save Receipt"
              : "Save Transaction";
        saveButton.textContent = label;
      }

      function updateSections() {
        clearMessage();
        newSection.classList.toggle("hidden", entryType.value !== "new");
        againstSection.classList.toggle("hidden", entryType.value !== "against");
      }

      async function loadCompanies() {
        const res = await fetch("/api/profiles/list");
        const data = await res.json();
        companies = data;

        companySelect.innerHTML = '<option value="">Select Alias</option>';
        companies.forEach((company) => {
          const option = document.createElement("option");
          option.value = company.id;
          option.textContent = company.alias;
          companySelect.appendChild(option);
        });
      }

      async function loadCompanyVouchers() {
        resetVoucherSelectors();

        if (!companySelect.value) return;

        const res = await fetch(
          `/api/vouchers/list?profile_id=${encodeURIComponent(companySelect.value)}`,
        );
        const data = await res.json();
        companyVouchers = Array.isArray(data) ? data : [];

        const voucherTypes = [...new Set(
          companyVouchers
            .map((voucher) => voucher.voucher_type)
            .filter(Boolean),
        )];

        if (!voucherTypes.length) {
          againstHint.textContent =
            "No existing vouchers found for this company yet.";
          againstHint.classList.add("show");
          return;
        }

        voucherTypes.forEach((type) => {
          const option = document.createElement("option");
          option.value = type;
          option.textContent = type;
          againstVoucherType.appendChild(option);
        });
      }

      function populateBillNumbers() {
        againstBillNo.innerHTML = '<option value="">Select Bill No</option>';
        againstHint.textContent = "";
        againstHint.classList.remove("show");

        if (!againstVoucherType.value) return;

        const filtered = companyVouchers.filter(
          (voucher) => voucher.voucher_type === againstVoucherType.value,
        );

        if (!filtered.length) {
          againstHint.textContent =
            "No bills found under this voucher type for the selected company.";
          againstHint.classList.add("show");
          return;
        }

        filtered.forEach((voucher) => {
          const option = document.createElement("option");
          option.value = voucher.bill_no || `ID-${voucher.id}`;
          option.textContent = voucher.bill_no || `ID-${voucher.id}`;
          option.dataset.amount = voucher.total_value || "";
          againstBillNo.appendChild(option);
        });
      }

      function handleBillSelection() {
        const selectedOption =
          againstBillNo.options[againstBillNo.selectedIndex] || null;
        if (!selectedOption || !selectedOption.value) return;

        const amount = selectedOption.dataset.amount || "";
        if (amount) {
          document.getElementById("againstAmount").value = amount;
        }
      }

      async function saveTransaction() {
        clearMessage();

        if (!transactionKind.value || !companySelect.value || !entryType.value) {
          setMessage(
            "Please select Receipt/Payment, Company, and New/Against first.",
            "error",
          );
          return;
        }

        let payload;

        if (entryType.value === "new") {
          const date = document.getElementById("newDate").value;
          const amount = document.getElementById("newAmount").value;
          const mop = document.getElementById("newMop").value;

          if (!date || !amount || !mop) {
            setMessage("Please fill Date, Amount, and MOP for the new entry.", "error");
            return;
          }

          payload = {
            profile_id: companySelect.value,
            voucher_type: transactionKind.value,
            date: date,
            bill_no: null,
            entry_type: "new",
            description:
              (transactionKind.value === "Receipt Voucher" ? "Receipt" : "Payment") +
              " via " +
              mop,
            total_value: amount,
          };
        } else {
          const voucherType = againstVoucherType.value;
          const billNo = againstBillNo.value;
          const date = document.getElementById("againstDate").value;
          const amount = document.getElementById("againstAmount").value;
          const mop = document.getElementById("againstMop").value;

          if (!voucherType || !billNo || !date || !amount || !mop) {
            setMessage(
              "Please fill Voucher Type, Bill No, Date, Amount, and MOP for the against entry.",
              "error",
            );
            return;
          }

          payload = {
            profile_id: companySelect.value,
            voucher_type: transactionKind.value,
            date: date,
            bill_no: billNo,
            entry_type: "against",
            description:
              (transactionKind.value === "Receipt Voucher" ? "Receipt" : "Payment") +
              " against " +
              voucherType +
              " via " +
              mop,
            total_value: amount,
          };
        }

        try {
          saveButton.disabled = true;
          const res = await fetch("/api/vouchers", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const result = await res.json();

          if (result.id) {
            const kind = transactionKind.value;
            resetForm();
            transactionKind.value = kind;
            updateSaveLabel();
            setMessage("Transaction saved successfully.", "success");
          } else {
            setMessage(result.error || "Failed to save transaction.", "error");
          }
        } catch (err) {
          setMessage("Network error: " + err.message, "error");
        } finally {
          saveButton.disabled = false;
        }
      }

      transactionKind.addEventListener("change", updateSaveLabel);
      companySelect.addEventListener("change", async function () {
        clearMessage();
        if (entryType.value === "against") {
          await loadCompanyVouchers();
        } else {
          resetVoucherSelectors();
        }
      });
      againstVoucherType.addEventListener("change", populateBillNumbers);
      againstBillNo.addEventListener("change", handleBillSelection);

      entryType.addEventListener("change", async function () {
        updateSections();
        if (entryType.value === "against") {
          await loadCompanyVouchers();
        } else {
          resetVoucherSelectors();
        }
      });

      document.getElementById("newDate").value = todayValue();
      document.getElementById("againstDate").value = todayValue();

      loadCompanies().catch((err) => {
        setMessage("Unable to load companies: " + err.message, "error");
      });
    </script>
  </body>
</html>
