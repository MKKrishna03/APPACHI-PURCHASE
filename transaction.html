<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transactions</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background: linear-gradient(
          135deg,
          #ffffff 0%,
          #f8f9fa 50%,
          #ffffff 100%
        );
        backdrop-filter: blur(10px);
        color: #202124;
        display: flex;
        min-height: 100vh;
      }
      .dashboard-container {
        display: flex;
        width: 100%;
      }
      .sidebar {
        width: 280px;
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(30px) saturate(180%);
        border-right: 1px solid rgba(255, 255, 255, 0.7);
        padding: 16px;
        box-shadow:
          0 4px 30px rgba(31, 38, 135, 0.08),
          inset 0 0 1px rgba(255, 255, 255, 0.5);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        overflow-y: auto;
      }
      .sidebar::-webkit-scrollbar {
        width: 6px;
      }
      .sidebar::-webkit-scrollbar-thumb {
        background: rgba(0, 0, 0, 0.2);
        border-radius: 3px;
      }
      .sidebar-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
      }
      .logo {
        font-size: 18px;
        font-weight: 700;
        color: #1976d2;
        text-decoration: none;
      }
      .toggle-btn {
        background: transparent;
        border: none;
        color: #1f2937;
        font-size: 20px;
        cursor: pointer;
        padding: 8px;
        border-radius: 8px;
        transition: all 0.3s ease;
      }
      .toggle-btn:hover {
        background: rgba(0, 0, 0, 0.06);
      }
      .sidebar-nav {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .nav-section {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .nav-section-title {
        font-size: 12px;
        font-weight: 700;
        color: #5a6268;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        padding: 0 12px;
      }
      .nav-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 12px;
        color: #1976d2;
        text-decoration: none;
        border-radius: 8px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        font-weight: 500;
        font-size: 13px;
      }
      .nav-item:hover {
        background: rgba(25, 118, 210, 0.1);
        transform: translateX(4px);
      }
      .nav-item.active {
        background: rgba(25, 118, 210, 0.15);
        color: #1565c0;
      }
      .nav-icon {
        font-size: 16px;
      }
      .main-content {
        flex: 1;
        padding: 24px;
        overflow-y: auto;
        animation: fadeIn 0.5s ease-in-out;
      }
      .main-content::-webkit-scrollbar {
        width: 8px;
      }
      .main-content::-webkit-scrollbar-thumb {
        background: rgba(0, 0, 0, 0.1);
        border-radius: 4px;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
      }
      .header-left {
        flex: 1;
      }
      .welcome-section h1 {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 8px;
        color: #202124;
        letter-spacing: -0.5px;
      }
      .welcome-section h1::after {
        content: "";
        display: block;
        width: 60px;
        height: 4px;
        background: linear-gradient(90deg, #1976d2 0%, #1565c0 100%);
        border-radius: 2px;
        margin-top: 12px;
      }
      .welcome-section p {
        color: #999;
        font-size: 14px;
        margin-top: 8px;
      }
      .dashboard-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 20px;
      }
      .card {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(20px) saturate(200%);
        border: 1px solid rgba(255, 255, 255, 0.8);
        border-radius: 20px;
        padding: 24px;
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.08),
          inset 0 0 1px rgba(255, 255, 255, 0.5);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        animation: slideUp 0.6s ease-out;
      }
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .card:hover {
        transform: translateY(-4px);
      }
      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        border-bottom: 2px solid rgba(25, 118, 210, 0.1);
        padding-bottom: 16px;
      }
      .card-title {
        font-size: 16px;
        font-weight: 700;
        color: #202124;
      }
      .card-subtitle {
        font-size: 13px;
        color: #999;
        margin-top: 4px;
      }
      .card-icon {
        font-size: 32px;
      }
      .actions {
        display: flex;
        gap: 12px;
      }
      .btn {
        padding: 12px 24px;
        border: none;
        border-radius: 8px;
        background: linear-gradient(135deg, #1976d2 0%, #1565c0 100%);
        color: white;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 4px 12px rgba(25, 118, 210, 0.3);
        font-size: 14px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .btn:hover {
        background: linear-gradient(135deg, #1565c0 0%, #0d47a1 100%);
        box-shadow: 0 8px 24px rgba(25, 118, 210, 0.4);
        transform: translateY(-2px);
      }
      .btn:active {
        transform: translateY(0);
      }
      .btn-ghost {
        background: transparent;
        color: #1976d2;
        box-shadow: none;
        border: 1px solid rgba(25, 118, 210, 0.2);
        text-transform: none;
      }
      .btn-ghost:hover {
        background: rgba(25, 118, 210, 0.05);
        border-color: rgba(25, 118, 210, 0.4);
        transform: none;
      }
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
        z-index: 999;
        backdrop-filter: blur(4px);
        animation: backdropFadeIn 0.3s ease;
      }
      .modal-overlay.active {
        display: flex;
      }
      @keyframes backdropFadeIn {
        from {
          opacity: 0;
          backdrop-filter: blur(0px);
        }
        to {
          opacity: 1;
          backdrop-filter: blur(4px);
        }
      }
      .modal {
        width: 100%;
        max-width: 700px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(20px) saturate(200%);
        border: 1px solid rgba(255, 255, 255, 0.8);
        border-radius: 20px;
        padding: 32px;
        box-shadow:
          0 20px 60px rgba(0, 0, 0, 0.15),
          inset 0 0 1px rgba(255, 255, 255, 0.5);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        animation: modalSlideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      @keyframes modalSlideUp {
        from {
          opacity: 0;
          transform: translateY(30px) scale(0.95);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
        padding-bottom: 16px;
        border-bottom: 2px solid rgba(25, 118, 210, 0.1);
      }
      .modal-title {
        font-size: 20px;
        font-weight: 700;
        color: #202124;
        letter-spacing: -0.5px;
      }
      .close-btn {
        background: none;
        border: none;
        font-size: 24px;
        cursor: pointer;
        color: #999;
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        transition: all 0.3s ease;
      }
      .close-btn:hover {
        background: rgba(0, 0, 0, 0.06);
        color: #202124;
        transform: scale(1.1);
      }
      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 20px;
      }
      .form-group {
        display: flex;
        flex-direction: column;
      }
      label {
        font-size: 12px;
        font-weight: 700;
        margin-bottom: 8px;
        color: #5a6268;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .modal input,
      .modal select {
        padding: 12px 14px;
        border: 1.5px solid rgba(25, 118, 210, 0.3);
        border-radius: 8px;
        font-size: 14px;
        background: rgba(255, 255, 255, 0.6);
        color: #202124;
        transition: all 0.3s ease;
        font-family: inherit;
        font-weight: 500;
        width: 100%;
      }
      .modal input::placeholder {
        color: #bdbdbd;
      }
      .modal input:hover,
      .modal select:hover {
        border-color: rgba(25, 118, 210, 0.5);
        background: rgba(25, 118, 210, 0.03);
      }
      .modal input:focus,
      .modal select:focus {
        outline: none;
        border-color: #1976d2;
        background: rgba(25, 118, 210, 0.05);
        box-shadow: 0 0 0 3px rgba(25, 118, 210, 0.1);
      }
      .form-grid > div[style*="grid-column"] {
        grid-column: 1 / -1;
      }
      .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        margin-top: 28px;
        padding-top: 16px;
        border-top: 1px solid rgba(0, 0, 0, 0.06);
      }
      .message {
        margin-top: 16px;
        font-size: 13px;
        padding: 12px 16px;
        border-radius: 8px;
        display: none;
        border-left: 4px solid transparent;
        animation: slideInDown 0.3s ease;
      }
      @keyframes slideInDown {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .message.success {
        background: rgba(76, 175, 80, 0.1);
        color: #2e7d32;
        border-left-color: #43a047;
        display: block;
      }
      .message.error {
        background: rgba(244, 67, 54, 0.1);
        color: #c62828;
        border-left-color: #f44336;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="dashboard-container">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <a href="/" class="logo">Crextio</a>
          <button class="toggle-btn" onclick="toggleSidebar()">☰</button>
        </div>

        <nav class="sidebar-nav">
          <div class="nav-section">
            <div class="nav-section-title">Main</div>
            <a href="/" class="nav-item">
              <span class="nav-icon">📊</span>
              <span class="nav-text">Dashboard</span>
            </a>
            <a href="#" class="nav-item">
              <span class="nav-icon">👥</span>
              <span class="nav-text">People</span>
            </a>
            <a href="#" class="nav-item">
              <span class="nav-icon">💼</span>
              <span class="nav-text">Hiring</span>
            </a>
            <a href="#" class="nav-item">
              <span class="nav-icon">📈</span>
              <span class="nav-text">Payroll</span>
            </a>
            <a href="#" class="nav-item">
              <span class="nav-icon">🏢</span>
              <span class="nav-text">Company</span>
            </a>
          </div>

          <div class="nav-section">
            <div class="nav-section-title">Operations</div>
            <a href="/profile" class="nav-item">
              <span class="nav-icon">📝</span>
              <span class="nav-text">Profile</span>
            </a>
            <a href="#" class="nav-item active">
              <span class="nav-icon">💰</span>
              <span class="nav-text">Transactions</span>
            </a>
            <a href="/labour" class="nav-item">
              <span class="nav-icon">👷</span>
              <span class="nav-text">Labour</span>
            </a>
          </div>
        </nav>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <div class="header">
          <div class="header-left">
            <div class="welcome-section">
              <h1>Transactions</h1>
              <p>Manage receipts and payments</p>
            </div>
          </div>

          <div class="header-right">
            <a href="/" class="btn btn-ghost">← BACK</a>
          </div>
        </div>

        <div class="dashboard-grid">
          <div class="card" style="grid-column: 1 / -1">
            <div class="card-header">
              <div>
                <div class="card-title">Transaction Management</div>
                <div class="card-subtitle">
                  Create and manage financial transactions
                </div>
              </div>
              <div class="card-icon">💰</div>
            </div>

            <div class="actions">
              <button class="btn btn-primary" onclick="openModal('receipt')">
                <span>📥</span>
                <span>Receipt</span>
              </button>
              <button class="btn btn-secondary" onclick="openModal('payment')">
                <span>📤</span>
                <span>Payment</span>
              </button>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Receipt Modal -->
    <div class="modal-overlay" id="receiptBackdrop">
      <div class="modal" role="dialog" aria-modal="true">
        <div class="modal-header">
          <div class="modal-title">Receipt Voucher</div>
          <button class="close-btn" onclick="closeModal('receipt')">x</button>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label for="receiptCompany">Select Company</label>
            <!-- Replace these two lines in modal HTML -->

            <select
              id="receiptCompany"
              onchange="onReceiptVoucherTypeChange()"
            ></select>
          </div>
          <div class="form-group">
            <label for="receiptEntryType">Entry Type</label>
            <select id="receiptEntryType" onchange="toggleReceiptEntryType()">
              <option value="">Select Entry Type</option>
              <option value="new">New</option>
              <option value="against">Against</option>
            </select>
          </div>
          <div
            id="receiptAgainstFields"
            style="display: none; grid-column: 1/-1"
          >
            <div class="form-grid">
              <div class="form-group">
                <label for="receiptVoucherType">Voucher Type</label>
                <select
                  id="receiptVoucherType"
                  onchange="onReceiptVoucherTypeChange()"
                >
                  <option value="">Select Voucher Type</option>
                  <option value="Purchase Receipt Voucher">
                    Purchase Receipt Voucher
                  </option>
                  <option value="Labour Receipt Voucher">
                    Labour Receipt Voucher (Closing)
                  </option>
                </select>
              </div>
              <div class="form-group">
                <label for="receiptAgainstBill">Against Bill</label>
                <select id="receiptAgainstBill">
                  <option value="">Select Bill</option>
                </select>
              </div>
            </div>
          </div>
          <div class="form-group">
            <label for="receiptDate">Receipt Date</label>
            <input type="date" id="receiptDate" />
          </div>
          <div class="form-group">
            <label for="receiptAmount">Amount</label>
            <input type="number" id="receiptAmount" min="0" step="0.01" />
          </div>
          <div class="form-group">
            <label for="receiptMop">MOP</label>
            <select id="receiptMop">
              <option value="">Select MOP</option>
              <option value="Cash">Cash</option>
              <option value="Bank">Bank</option>
              <option value="UPI">UPI</option>
              <option value="Cheque">Cheque</option>
              <option value="NEFT/RTGS">NEFT/RTGS</option>
              <option value="Other">Other</option>
            </select>
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn" onclick="saveReceipt()">Save Receipt</button>
        </div>
        <div id="receiptMsg" class="message"></div>
      </div>
    </div>

    <!-- Payment Modal -->
    <div class="modal-overlay" id="paymentBackdrop">
      <div class="modal" role="dialog" aria-modal="true">
        <div class="modal-header">
          <div class="modal-title">Payment Voucher</div>
          <button class="close-btn" onclick="closeModal('payment')">x</button>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label for="paymentCompany">Select Company</label>
            <select
              id="paymentCompany"
              onchange="onPaymentVoucherTypeChange()"
            ></select>
          </div>
          <div class="form-group">
            <label for="paymentEntryType">Entry Type</label>
            <select id="paymentEntryType" onchange="togglePaymentEntryType()">
              <option value="">Select Entry Type</option>
              <option value="new">New</option>
              <option value="against">Against</option>
            </select>
          </div>
          <div
            id="paymentAgainstFields"
            style="display: none; grid-column: 1/-1"
          >
            <div class="form-grid">
              <div class="form-group">
                <label for="paymentVoucherType">Voucher Type</label>
                <select
                  id="paymentVoucherType"
                  onchange="onPaymentVoucherTypeChange()"
                >
                  <option value="">Select Voucher Type</option>
                  <option value="Purchase Payment Voucher">
                    Purchase Payment Voucher
                  </option>
                  <option value="Labour Payment Voucher">
                    Labour Payment Voucher
                  </option>
                </select>
              </div>
              <div class="form-group">
                <label for="paymentAgainstBill">Against Bill</label>
                <select id="paymentAgainstBill">
                  <option value="">Select Bill</option>
                </select>
              </div>
            </div>
          </div>
          <div class="form-group">
            <label for="paymentDate">Payment Date</label>
            <input type="date" id="paymentDate" />
          </div>
          <div class="form-group">
            <label for="paymentAmount">Amount</label>
            <input type="number" id="paymentAmount" min="0" step="0.01" />
          </div>
          <div class="form-group">
            <label for="paymentMop">MOP</label>
            <select id="paymentMop">
              <option value="">Select MOP</option>
              <option value="Cash">Cash</option>
              <option value="Bank">Bank</option>
              <option value="UPI">UPI</option>
              <option value="Cheque">Cheque</option>
              <option value="NEFT/RTGS">NEFT/RTGS</option>
              <option value="Other">Other</option>
            </select>
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn btn-secondary" onclick="savePayment()">
            Save Payment
          </button>
        </div>
        <div id="paymentMsg" class="message"></div>
      </div>
    </div>

    <script>
      var receiptBackdrop = document.getElementById("receiptBackdrop");
      var paymentBackdrop = document.getElementById("paymentBackdrop");
      var companies = [];

      function toggleReceiptEntryType() {
        var val = document.getElementById("receiptEntryType").value;
        var fields = document.getElementById("receiptAgainstFields");
        fields.style.display = val === "against" ? "block" : "none";
        if (val !== "against") {
          document.getElementById("receiptVoucherType").value = "";
          document.getElementById("receiptAgainstBill").innerHTML =
            "<option value=''>Select Bill</option>";
        }
      }

      function togglePaymentEntryType() {
        var val = document.getElementById("paymentEntryType").value;
        var fields = document.getElementById("paymentAgainstFields");
        fields.style.display = val === "against" ? "block" : "none";
        if (val !== "against") {
          document.getElementById("paymentVoucherType").value = "";
          document.getElementById("paymentAgainstBill").innerHTML =
            "<option value=''>Select Bill</option>";
        }
      }

      function onReceiptVoucherTypeChange() {
        var profileId = document.getElementById("receiptCompany").value;
        var voucherType = document.getElementById("receiptVoucherType").value;
        console.log("receipt:", profileId, voucherType);
        if (!profileId || !voucherType) return;
        loadBillsForType(receiptCategory(), profileId, "receiptAgainstBill");
      }

      function onPaymentVoucherTypeChange() {
        var profileId = document.getElementById("paymentCompany").value;
        var voucherType = document.getElementById("paymentVoucherType").value;
        console.log("payment:", profileId, voucherType);
        if (!profileId || !voucherType) return;
        loadBillsForType(paymentCategory(), profileId, "paymentAgainstBill");
      }

      function openModal(type) {
        if (type === "receipt") {
          receiptBackdrop.classList.add("active");
        } else {
          paymentBackdrop.classList.add("active");
        }
      }

      function closeModal(type) {
        if (type === "receipt") {
          receiptBackdrop.classList.remove("active");
        } else {
          paymentBackdrop.classList.remove("active");
        }
      }

      function toggleSidebar() {
        const sidebar = document.getElementById("sidebar");
        sidebar.classList.toggle("collapsed");

        // Add mobile menu handling
        if (window.innerWidth <= 768) {
          sidebar.classList.toggle("mobile-open");
        }
      }

      receiptBackdrop.addEventListener("click", function (e) {
        if (e.target === receiptBackdrop) closeModal("receipt");
      });
      paymentBackdrop.addEventListener("click", function (e) {
        if (e.target === paymentBackdrop) closeModal("payment");
      });

      function loadCompanies() {
        fetch("/api/profiles/list")
          .then(function (res) {
            return res.json();
          })
          .then(function (data) {
            companies = data;
            var baseOption = "<option value=''>Select Company</option>";
            var opts =
              baseOption +
              companies
                .map(function (c) {
                  return "<option value='" + c.id + "'>" + c.name + "</option>";
                })
                .join("");
            document.getElementById("receiptCompany").innerHTML = opts;
            document.getElementById("paymentCompany").innerHTML = opts;
          })
          .catch(function (err) {
            console.error("Failed to load companies:", err);
          });
      }

      function loadBillsForType(voucherCategory, profileId, targetSelectId) {
        console.log("loadBillsForType:", voucherCategory, profileId);
        var sel = document.getElementById(targetSelectId);
        if (!profileId || !voucherCategory) {
          sel.innerHTML = "<option value=''>Select Bill</option>";
          return;
        }

        var url =
          voucherCategory === "labour"
            ? "/api/labour/list?profile_id=" +
              profileId +
              "&voucher_type=" +
              "Receipt%20Voucher"
            : "/api/vouchers/list?profile_id=" +
              profileId +
              "&voucher_type=Purchase";

        fetch(url)
          .then(function (res) {
            return res.json();
          })
          .then(function (bills) {
            if (!Array.isArray(bills)) {
              sel.innerHTML = "<option value=''>No Bills Found</option>";
              return;
            }
            console.log("Bills loaded:", bills); // add this line
            if (voucherCategory === "labour") {
              sel.innerHTML =
                "<option value=''>Select Bill</option>" +
                bills
                  .filter(function (b) {
                    return b.bill_no;
                  })
                  .map(function (b) {
                    var date = b.date || "";
                    var total = b.total_value != null ? b.total_value : "";
                    return (
                      "<option value='" +
                      b.bill_no +
                      "'>" +
                      date +
                      "-" +
                      b.issue_number +
                      "-" +
                      total +
                      "</option>"
                    );
                  })
                  .join("");
            } else {
              sel.innerHTML =
                "<option value=''>Select Bill</option>" +
                bills
                  .filter(function (b) {
                    return b.bill_no;
                  })
                  .map(function (b) {
                    var date = b.date || "";
                    var total = b.total_value != null ? b.total_value : "";
                    return (
                      "<option value='" +
                      b.bill_no +
                      "'>" +
                      date +
                      "-" +
                      b.bill_no +
                      "-" +
                      total +
                      "</option>"
                    );
                  })
                  .join("");
            }
          })
          .catch(function (err) {
            console.error("Failed to load bills:", err);
          });
      }

      function setMessage(id, text, type) {
        var el = document.getElementById(id);
        el.textContent = text;
        el.className = "message " + type;
      }

      function receiptCategory() {
        var v = document.getElementById("receiptVoucherType").value;
        console.log("receiptCategory value:", v);
        return v.toLowerCase().indexOf("labour") !== -1 ? "labour" : "purchase";
      }

      function paymentCategory() {
        var v = document.getElementById("paymentVoucherType").value;
        return v.toLowerCase().indexOf("labour") !== -1 ? "labour" : "purchase";
      }

      function saveReceipt() {
        var profileId = document.getElementById("receiptCompany").value;
        var entryType = document.getElementById("receiptEntryType").value;
        var voucherType =
          entryType === "against"
            ? document.getElementById("receiptVoucherType").value
            : "";
        var billNo =
          entryType === "against"
            ? document.getElementById("receiptAgainstBill").value
            : "";
        var date = document.getElementById("receiptDate").value;
        var amount = document.getElementById("receiptAmount").value;
        var mop = document.getElementById("receiptMop").value;

        if (!profileId || !entryType || !date || !amount || !mop) {
          setMessage("receiptMsg", "Please fill all receipt fields.", "error");
          return;
        }
        if (entryType === "against" && (!voucherType || !billNo)) {
          setMessage(
            "receiptMsg",
            "Please select voucher type and bill.",
            "error",
          );
          return;
        }

        var payload = {
          profile_id: profileId,
          voucher_type: voucherType || "Receipt Voucher",
          date: date,
          bill_no: billNo || null,
          entry_type: entryType,
          description: "Receipt via " + mop,
          total_value: amount,
        };

        fetch("/api/vouchers", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        })
          .then(function (res) {
            return res.json();
          })
          .then(function (data) {
            if (data.id) {
              alert("Receipt Saved!");
              closeModal("receipt");
              document.getElementById("receiptEntryType").value = "";
              document.getElementById("receiptAgainstFields").style.display =
                "none";
              document.getElementById("receiptVoucherType").value = "";
              document.getElementById("receiptAgainstBill").innerHTML =
                "<option value=''>Select Bill</option>";
              document.getElementById("receiptDate").value = "";
              document.getElementById("receiptAmount").value = "";
              document.getElementById("receiptMop").value = "";
              document.getElementById("receiptMsg").className = "message";
            } else {
              setMessage(
                "receiptMsg",
                data.error || "Failed to save receipt.",
                "error",
              );
            }
          })
          .catch(function (err) {
            setMessage("receiptMsg", "Network error: " + err.message, "error");
          });
      }

      function savePayment() {
        var profileId = document.getElementById("paymentCompany").value;
        var entryType = document.getElementById("paymentEntryType").value;
        var voucherType =
          entryType === "against"
            ? document.getElementById("paymentVoucherType").value
            : "";
        var billNo =
          entryType === "against"
            ? document.getElementById("paymentAgainstBill").value
            : "";
        var date = document.getElementById("paymentDate").value;
        var amount = document.getElementById("paymentAmount").value;
        var mop = document.getElementById("paymentMop").value;

        if (!profileId || !entryType || !date || !amount || !mop) {
          setMessage("paymentMsg", "Please fill all payment fields.", "error");
          return;
        }
        if (entryType === "against" && (!voucherType || !billNo)) {
          setMessage(
            "paymentMsg",
            "Please select voucher type and bill.",
            "error",
          );
          return;
        }

        var payload = {
          profile_id: profileId,
          voucher_type: voucherType || "Payment Voucher",
          date: date,
          bill_no: billNo || null,
          entry_type: entryType,
          description: "Payment via " + mop,
          total_value: amount,
        };

        fetch("/api/vouchers", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        })
          .then(function (res) {
            return res.json();
          })
          .then(function (data) {
            if (data.id) {
              alert("Payment Saved!");
              closeModal("payment");
              document.getElementById("paymentEntryType").value = "";
              document.getElementById("paymentAgainstFields").style.display =
                "none";
              document.getElementById("paymentVoucherType").value = "";
              document.getElementById("paymentAgainstBill").innerHTML =
                "<option value=''>Select Bill</option>";
              document.getElementById("paymentDate").value = "";
              document.getElementById("paymentAmount").value = "";
              document.getElementById("paymentMop").value = "";
              document.getElementById("paymentMsg").className = "message";
            } else {
              setMessage(
                "paymentMsg",
                data.error || "Failed to save payment.",
                "error",
              );
            }
          })
          .catch(function (err) {
            setMessage("paymentMsg", "Network error: " + err.message, "error");
          });
      }

      loadCompanies();

      var params = new URLSearchParams(window.location.search);
      var mode = params.get("mode");
      if (mode === "receipt") openModal("receipt");
      if (mode === "payment") openModal("payment");
    </script>
  </body>
</html>
