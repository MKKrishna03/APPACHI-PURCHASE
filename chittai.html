<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Chittai</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 24px;
        z-index: 999;
        overflow-y: auto;
      }

      .modal {
        width: 100%;
        max-width: 700px;
        background: #fff;
        border-radius: 18px;
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.18);
        margin: auto;
        align-self: center;
      }

      .modal-header {
        background: linear-gradient(135deg, #1976d2, #1565c0);
        padding: 22px 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .modal-header-left {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .modal-title {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 18px;
        font-weight: 700;
        color: #fff;
        letter-spacing: -0.3px;
      }
      .chittai-no-badge {
        font-family: "Courier New", monospace;
        font-size: 12px;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.75);
        letter-spacing: 0.5px;
      }
      .close-btn {
        background: rgba(255, 255, 255, 0.15);
        border: none;
        color: #fff;
        width: 32px;
        height: 32px;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s;
      }
      .close-btn:hover {
        background: rgba(255, 255, 255, 0.28);
      }

      .modal-body {
        padding: 26px 28px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 16px;
      }

      .form-row {
        display: grid;
        gap: 16px;
        margin-bottom: 16px;
      }
      .form-row-2 {
        grid-template-columns: 1fr 1fr;
      }
      .form-row-3 {
        grid-template-columns: 1fr 1fr 1fr;
      }

      label {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 10px;
        font-weight: 700;
        color: #8898aa;
        text-transform: uppercase;
        letter-spacing: 0.6px;
      }

      input,
      select {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        padding: 10px 13px;
        border: 1.5px solid #e0e6ed;
        border-radius: 9px;
        font-size: 14px;
        color: #202124;
        background: #fff;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
        width: 100%;
      }
      input:hover,
      select:hover {
        border-color: #b0c4de;
      }
      input:focus,
      select:focus {
        outline: none;
        border-color: #1976d2;
        box-shadow: 0 0 0 3px rgba(25, 118, 210, 0.1);
      }
      input[readonly] {
        background: #f0f5ff;
        color: #1565c0;
        font-weight: 700;
        border-color: #ccdaf5;
        cursor: default;
      }
      input[readonly]:focus {
        box-shadow: none;
        border-color: #ccdaf5;
      }

      .section-label {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 10px;
        font-weight: 700;
        color: #1976d2;
        text-transform: uppercase;
        letter-spacing: 0.7px;
        padding: 12px 0 10px;
        border-top: 1px solid #eef2f7;
        margin-bottom: 0;
      }

      .modal-footer {
        padding: 16px 28px 22px;
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        border-top: 1px solid #f0f2f5;
        position: relative;
        z-index: 1;
      }
      .btn {
        font-family: inherit;
        padding: 10px 22px;
        border: none;
        border-radius: 9px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        letter-spacing: 0.3px;
        transition: all 0.2s;
      }
      .btn-ghost {
        background: #f4f6f8;
        color: #6b7280;
        border: 1px solid #e5e7eb;
      }
      .btn-ghost:hover {
        background: #e9ecef;
      }
      .btn-primary {
        background: linear-gradient(135deg, #1976d2, #1565c0);
        color: #fff;
        box-shadow: 0 4px 12px rgba(25, 118, 210, 0.28);
      }
      .btn-primary:hover {
        background: linear-gradient(135deg, #1565c0, #0d47a1);
        transform: translateY(-1px);
        box-shadow: 0 6px 18px rgba(25, 118, 210, 0.36);
      }

      .message {
        margin: 0 28px 14px;
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 13px;
        font-family: inherit;
        display: none;
        border-left: 4px solid transparent;
      }
      .message.success {
        display: block;
        background: rgba(76, 175, 80, 0.1);
        color: #2e7d32;
        border-left-color: #43a047;
      }
      .message.error {
        display: block;
        background: rgba(244, 67, 54, 0.1);
        color: #c62828;
        border-left-color: #f44336;
      }

      @media (max-width: 520px) {
        .form-row-2,
        .form-row-3 {
          grid-template-columns: 1fr;
        }
        .modal-body {
          padding: 18px;
        }
        .modal-footer {
          padding: 12px 18px 18px;
        }
      }
    </style>
  </head>
  <body>
    <div class="modal-backdrop" id="chittaiBackdrop">
      <div class="modal" role="dialog" aria-modal="true">
        <div class="modal-header">
          <div class="modal-header-left">
            <div style="display: flex; align-items: center; gap: 12px">
              <div class="modal-title">Chittai Entry</div>
              <div
                class="chittai-no-badge"
                id="chittaiNoBadge"
                style="
                  background: rgba(255, 255, 255, 0.2);
                  padding: 3px 10px;
                  border-radius: 20px;
                  font-size: 13px;
                  color: #fff;
                  font-weight: 700;
                "
              >
                Generating…
              </div>
            </div>
          </div>
          <button class="close-btn" onclick="closeChittai()">✕</button>
        </div>

        <div class="modal-body">
          <div class="form-row form-row-3">
            <div class="form-group" style="margin-bottom: 0">
              <label>Company *</label>
              <select id="chittaiCompany">
                <option value="">— Select —</option>
              </select>
            </div>
            <div class="form-group" style="margin-bottom: 0">
              <label>Chittai Date *</label>
              <input
                type="date"
                id="chittaiDate"
                onchange="debouncedRefresh()"
              />
            </div>
            <div></div>
          </div>

          <input type="hidden" id="chittaiNo" />

          <div class="section-label">Calculation</div>

          <div class="form-row form-row-3">
            <div class="form-group" style="margin-bottom: 0">
              <label>Weight (g) *</label>
              <input
                type="number"
                id="chittaiWeight"
                min="0"
                step="0.01"
                placeholder="0.00"
                oninput="debouncedCalc()"
              />
            </div>
            <div class="form-group" style="margin-bottom: 0">
              <label>Rate *</label>
              <input
                type="number"
                id="chittaiRate"
                min="0"
                step="0.01"
                placeholder="0.00"
                oninput="debouncedCalc()"
              />
            </div>
            <div class="form-group" style="margin-bottom: 0">
              <label>Value (Wt × Rate)</label>
              <input
                type="number"
                id="chittaiValue"
                readonly
                placeholder="0.00"
              />
            </div>
          </div>

          <div class="form-row form-row-3">
            <div class="form-group" style="margin-bottom: 0">
              <label>Rnd</label>
              <input
                type="number"
                id="chittaiRnd"
                min="0"
                step="0.01"
                placeholder="0.00"
                oninput="debouncedCalc()"
              />
            </div>
            <div class="form-group" style="margin-bottom: 0">
              <label>Others</label>
              <input
                type="number"
                id="chittaiOthers"
                min="0"
                step="0.01"
                placeholder="0.00"
                oninput="debouncedCalc()"
              />
            </div>
            <div class="form-group" style="margin-bottom: 0">
              <label>Total (Value + Others)</label>
              <input
                type="number"
                id="chittaiTotal"
                readonly
                placeholder="0.00"
              />
            </div>
          </div>

          <div class="form-row form-row-2" style="margin-bottom: 0">
            <div class="form-group" style="margin-bottom: 0">
              <label>TDS</label>
              <input
                type="number"
                id="chittaiTds"
                min="0"
                step="0.01"
                placeholder="0.00"
                oninput="debouncedCalc()"
              />
            </div>
            <div class="form-group" style="margin-bottom: 0">
              <label>RTGS Amount (Total − TDS)</label>
              <input
                type="number"
                id="chittaiRtgs"
                readonly
                placeholder="0.00"
              />
            </div>
          </div>
        </div>

        <div id="chittaiMsg" class="message"></div>

        <div
          id="paymentSection"
          style="padding: 0 28px 16px; display: none; overflow: hidden"
        >
          <div
            class="section-label"
            style="border-top: 1px solid #eef2f7; padding-top: 12px"
          >
            Payment
          </div>
          <div class="form-row form-row-3" style="margin-top: 10px">
            <div class="form-group" style="margin-bottom: 0">
              <label>Payment Date</label>
              <input type="date" id="payDate" />
            </div>
            <div class="form-group" style="margin-bottom: 0">
              <label>Amount</label>
              <input
                type="number"
                id="payAmount"
                min="0"
                step="0.01"
                placeholder="0.00"
              />
            </div>
            <div class="form-group" style="margin-bottom: 0">
              <label>MOP</label>
              <select id="payMop">
                <option value="">— Select —</option>
                <option value="Cash">Cash</option>
                <option value="NEFT/RTGS">NEFT/RTGS</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="resetChittai()">Reset</button>
          <button
            class="btn btn-ghost"
            id="addPayBtn"
            onclick="togglePayment()"
          >
            + Add Payment
          </button>
          <button class="btn btn-primary" onclick="saveChittai()">
            Save Chittai
          </button>
        </div>
      </div>
    </div>

    <script>
      // ── Utility: debounce ──────────────────────────────────────────────────
      function debounce(fn, ms) {
        let t;
        return (...a) => {
          clearTimeout(t);
          t = setTimeout(() => fn(...a), ms);
        };
      }

      // ── Cache for companies list ───────────────────────────────────────────
      let companyCache = null;

      // ── Debounced versions of heavy handlers ──────────────────────────────
      const debouncedCalc = debounce(calcChittai, 300);
      const debouncedRefresh = debounce(refreshChittaiNo, 400);

      // ── Calculation (uses requestAnimationFrame to batch DOM writes) ───────
      function calcChittai() {
        const weight =
          parseFloat(document.getElementById("chittaiWeight").value) || 0;
        const rate =
          parseFloat(document.getElementById("chittaiRate").value) || 0;
        const others =
          parseFloat(document.getElementById("chittaiOthers").value) || 0;
        const rnd =
          parseFloat(document.getElementById("chittaiRnd").value) || 0;
        const tds =
          parseFloat(document.getElementById("chittaiTds").value) || 0;

        const value = weight * rate;
        const total = value + others + rnd;
        const rtgs = total - tds;

        requestAnimationFrame(() => {
          document.getElementById("chittaiValue").value = value.toFixed(2);
          document.getElementById("chittaiTotal").value = total.toFixed(2);
          document.getElementById("chittaiRtgs").value = rtgs.toFixed(2);
        });
      }

      // ── Chittai number generation ──────────────────────────────────────────
      async function generateChittaiNo(dateVal) {
        const d = dateVal ? new Date(dateVal) : new Date();
        const mm = String(d.getMonth() + 1).padStart(2, "0");
        const yy = String(d.getFullYear()).slice(-2);
        const prefix = `${mm}-${yy}-`;
        try {
          const res = await fetch(
            `/api/chittai/next-no?prefix=${encodeURIComponent(prefix)}`,
          );
          const data = await res.json();
          return data.chittai_no;
        } catch (e) {
          return `${prefix}001`;
        }
      }

      async function refreshChittaiNo() {
        const dateVal = document.getElementById("chittaiDate").value;
        const no = await generateChittaiNo(dateVal);
        document.getElementById("chittaiNo").value = no;
        document.getElementById("chittaiNoBadge").textContent = no;
      }

      // ── Reset ──────────────────────────────────────────────────────────────
      function resetChittai() {
        [
          "chittaiWeight",
          "chittaiRate",
          "chittaiOthers",
          "chittaiRnd",
          "chittaiTds",
        ].forEach((id) => (document.getElementById(id).value = ""));
        ["chittaiValue", "chittaiTotal", "chittaiRtgs"].forEach(
          (id) => (document.getElementById(id).value = ""),
        );
        document.getElementById("chittaiCompany").value = "";
        document.getElementById("chittaiMsg").className = "message";
        document.getElementById("paymentSection").style.display = "none";
        document.getElementById("payDate").value = "";
        document.getElementById("payAmount").value = "";
        document.getElementById("payMop").value = "";
        document.getElementById("addPayBtn").textContent = "+ Add Payment";
        document.getElementById("chittaiDate").valueAsDate = new Date();
        refreshChittaiNo();
      }

      // ── Close ──────────────────────────────────────────────────────────────
      function closeChittai() {
        document.getElementById("chittaiBackdrop").classList.remove("show");
        try {
          window.parent.closeChittaiModal();
        } catch (e) {}
      }

      // ── Load companies with cache ──────────────────────────────────────────
      async function loadCompanies() {
        try {
          if (!companyCache) {
            const res = await fetch("/api/profiles/list");
            companyCache = await res.json();
          }
          const companies = companyCache;
          const sel = document.getElementById("chittaiCompany");
          sel.innerHTML =
            '<option value="">— Select Company —</option>' +
            companies
              .map((c) => `<option value="${c.id}">${c.alias}</option>`)
              .join("");
        } catch (e) {
          console.error(e);
        }
      }

      // ── Save ───────────────────────────────────────────────────────────────
      async function saveChittai() {
        const profile_id = document.getElementById("chittaiCompany").value;
        const date = document.getElementById("chittaiDate").value;
        const chittai_no = document.getElementById("chittaiNo").value;
        const weight = document.getElementById("chittaiWeight").value;
        const rate = document.getElementById("chittaiRate").value;
        const value = document.getElementById("chittaiValue").value;
        const others = document.getElementById("chittaiOthers").value;
        const total = document.getElementById("chittaiTotal").value;
        const tds = document.getElementById("chittaiTds").value;
        const rtgs = document.getElementById("chittaiRtgs").value;
        const msg = document.getElementById("chittaiMsg");

        if (!profile_id || !date || !weight || !rate) {
          msg.textContent = "Please fill Company, Date, Weight and Rate.";
          msg.className = "message error";
          return;
        }

        try {
          const res = await fetch("/api/chittai", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              profile_id,
              chittai_no,
              date,
              weight,
              rate,
              value,
              others,
              total,
              tds,
              rtgs_amount: rtgs,
            }),
          });
          const data = await res.json();
          if (data.id) {
            const payDate = document.getElementById("payDate").value;
            const payAmount = document.getElementById("payAmount").value;
            const payMop = document.getElementById("payMop").value;
            const payVisible =
              document.getElementById("paymentSection").style.display !==
              "none";

            if (payVisible && payDate && payAmount && payMop) {
              await fetch("/api/vouchers", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  profile_id,
                  voucher_type: "Payment Voucher",
                  date: payDate,
                  bill_no: chittai_no,
                  entry_type: "against",
                  description:
                    "Payment against Chittai " + chittai_no + " via " + payMop,
                  total_value: payAmount,
                  linked_chittai_id: data.id,
                }),
              });
            }

            msg.textContent = `Chittai ${chittai_no} saved!`;
            msg.className = "message success";
            setTimeout(resetChittai, 1800);
          } else {
            msg.textContent = data.error || "Failed to save.";
            msg.className = "message error";
          }
        } catch (e) {
          msg.textContent = "Network error: " + e.message;
          msg.className = "message error";
        }
      }

      // ── Toggle payment section (lazy) ──────────────────────────────────────
      function togglePayment() {
        const sec = document.getElementById("paymentSection");
        const btn = document.getElementById("addPayBtn");
        const isHidden =
          sec.style.display === "none" || sec.style.display === "";
        if (isHidden) {
          sec.style.display = "block";
          btn.textContent = "− Remove Payment";
          const rtgs = document.getElementById("chittaiRtgs").value;
          if (rtgs) document.getElementById("payAmount").value = rtgs;
        } else {
          sec.style.display = "none";
          btn.textContent = "+ Add Payment";
        }
      }

      // ── Backdrop click to close ────────────────────────────────────────────
      document
        .getElementById("chittaiBackdrop")
        .addEventListener("click", function (e) {
          if (e.target === this) closeChittai();
        });

      // ── Init ───────────────────────────────────────────────────────────────
      document.getElementById("chittaiDate").valueAsDate = new Date();
      document.getElementById("payDate").valueAsDate = new Date();
      loadCompanies();
      refreshChittaiNo();
    </script>
  </body>
</html>
