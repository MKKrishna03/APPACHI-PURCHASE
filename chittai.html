<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Chittai</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f5f5f0;
        --surface: #ffffff;
        --surface-2: #f9f9f6;
        --ink: #1a1a2e;
        --ink-2: #444466;
        --ink-3: #8888aa;
        --accent: #2d6a4f;
        --accent-2: #245c43;
        --accent-light: #d8f3dc;
        --danger: #b5301e;
        --danger-light: #fce8e6;
        --border: rgba(0, 0, 0, 0.08);
        --border-strong: rgba(0, 0, 0, 0.14);
        --radius: 10px;
        --radius-lg: 16px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(26, 26, 46, 0.3);
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 24px;
        z-index: 999;
        overflow-y: auto;
      }

      .modal {
        width: 100%;
        max-width: 700px;
        background: var(--surface);
        border-radius: var(--radius-lg);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
        margin: auto;
        align-self: center;
        border: 1px solid var(--border);
      }

      .modal-header {
        background: var(--accent);
        padding: 22px 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      }
      .modal-header-left {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .modal-title {
        font-family: "DM Sans", system-ui, sans-serif;
        font-size: 18px;
        font-weight: 700;
        color: #fff;
        letter-spacing: -0.3px;
      }
      .chittai-no-badge {
        font-family: monospace;
        font-size: 12px;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.75);
        letter-spacing: 0.5px;
      }
      .close-btn {
        background: rgba(255, 255, 255, 0.15);
        border: none;
        color: #fff;
        width: 32px;
        height: 32px;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s;
      }
      .close-btn:hover {
        background: rgba(255, 255, 255, 0.28);
      }

      .modal-body {
        padding: 26px 28px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 16px;
      }
      .form-row {
        display: grid;
        gap: 16px;
        margin-bottom: 16px;
      }
      .form-row-2 {
        grid-template-columns: 1fr 1fr;
      }
      .form-row-3 {
        grid-template-columns: 1fr 1fr 1fr;
      }

      label {
        font-family: "DM Sans", system-ui, sans-serif;
        font-size: 10px;
        font-weight: 700;
        color: var(--ink-3);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      input,
      select {
        font-family: "DM Sans", system-ui, sans-serif;
        padding: 10px 13px;
        border: 1px solid var(--border-strong);
        border-radius: var(--radius);
        font-size: 14px;
        color: var(--ink);
        background: var(--surface-2);
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
        width: 100%;
      }
      input:hover,
      select:hover {
        border-color: rgba(45, 106, 79, 0.3);
      }
      input:focus,
      select:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(45, 106, 79, 0.08);
        background: var(--surface);
      }
      input[readonly] {
        background: var(--accent-light);
        color: var(--accent);
        font-weight: 700;
        border-color: rgba(45, 106, 79, 0.2);
        cursor: default;
      }
      input[readonly]:focus {
        box-shadow: none;
        border-color: rgba(45, 106, 79, 0.2);
      }

      .section-label {
        font-family: "DM Sans", system-ui, sans-serif;
        font-size: 10px;
        font-weight: 700;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 0.07em;
        padding: 12px 0 10px;
        border-top: 1px solid var(--border);
        margin-bottom: 0;
      }

      .modal-footer {
        padding: 16px 28px 22px;
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        border-top: 1px solid var(--border);
        position: relative;
        z-index: 1;
      }
      .btn {
        font-family: inherit;
        padding: 10px 22px;
        border: none;
        border-radius: var(--radius);
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        letter-spacing: 0.03em;
        transition: all 0.15s;
      }
      .btn-ghost {
        background: var(--surface-2);
        color: var(--ink-3);
        border: 1px solid var(--border-strong);
      }
      .btn-ghost:hover {
        background: var(--surface);
        color: var(--ink-2);
      }
      .btn-primary {
        background: var(--accent);
        color: #fff;
        box-shadow: 0 4px 12px rgba(45, 106, 79, 0.2);
      }
      .btn-primary:hover {
        background: var(--accent-2);
      }

      .message {
        margin: 0 28px 14px;
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 13px;
        font-family: inherit;
        display: none;
        border-left: 3px solid transparent;
      }
      .message.success {
        display: block;
        background: var(--accent-light);
        color: var(--accent);
        border-left-color: var(--accent);
      }
      .message.error {
        display: block;
        background: var(--danger-light);
        color: var(--danger);
        border-left-color: var(--danger);
      }

      @media (max-width: 520px) {
        .form-row-2,
        .form-row-3 {
          grid-template-columns: 1fr;
        }
        .modal-body {
          padding: 18px;
        }
        .modal-footer {
          padding: 12px 18px 18px;
        }
      }
    </style>
  </head>
  <body>
    <div class="modal-backdrop" id="chittaiBackdrop">
      <div class="modal" role="dialog" aria-modal="true">
        <div class="modal-header">
          <div class="modal-header-left">
            <div style="display: flex; align-items: center; gap: 12px">
              <div class="modal-title">Chittai Entry</div>
              <div
                class="chittai-no-badge"
                id="chittaiNoBadge"
                style="
                  background: rgba(255, 255, 255, 0.2);
                  padding: 3px 10px;
                  border-radius: 20px;
                  font-size: 13px;
                  color: #fff;
                  font-weight: 700;
                "
              >
                Generating…
              </div>
            </div>
          </div>
          <button class="close-btn" onclick="closeChittai()">✕</button>
        </div>

        <div class="modal-body">
          <div class="form-row form-row-3">
            <div class="form-group" style="margin-bottom: 0">
              <label>Company *</label
              ><select id="chittaiCompany">
                <option value="">— Select —</option>
              </select>
            </div>
            <div class="form-group" style="margin-bottom: 0">
              <label>Chittai Date *</label
              ><input
                type="date"
                id="chittaiDate"
                onchange="debouncedRefresh()"
              />
            </div>
            <div></div>
          </div>
          <input type="hidden" id="chittaiNo" />
          <div class="section-label">Calculation</div>
          <div class="form-row form-row-3">
            <div class="form-group" style="margin-bottom: 0">
              <label>Weight (g) *</label
              ><input
                type="number"
                id="chittaiWeight"
                min="0"
                step="0.01"
                placeholder="0.00"
                oninput="debouncedCalc()"
              />
            </div>
            <div class="form-group" style="margin-bottom: 0">
              <label>Rate *</label
              ><input
                type="number"
                id="chittaiRate"
                min="0"
                step="0.01"
                placeholder="0.00"
                oninput="debouncedCalc()"
              />
            </div>
            <div class="form-group" style="margin-bottom: 0">
              <label>Value (Wt × Rate)</label
              ><input
                type="number"
                id="chittaiValue"
                readonly
                placeholder="0.00"
              />
            </div>
          </div>
          <div class="form-row form-row-3">
            <div class="form-group" style="margin-bottom: 0">
              <label>Rnd</label
              ><input
                type="number"
                id="chittaiRnd"
                min="0"
                step="0.01"
                placeholder="0.00"
                oninput="debouncedCalc()"
              />
            </div>
            <div class="form-group" style="margin-bottom: 0">
              <label>Others</label
              ><input
                type="number"
                id="chittaiOthers"
                min="0"
                step="0.01"
                placeholder="0.00"
                oninput="debouncedCalc()"
              />
            </div>
            <div class="form-group" style="margin-bottom: 0">
              <label>Total (Value + Others)</label
              ><input
                type="number"
                id="chittaiTotal"
                readonly
                placeholder="0.00"
              />
            </div>
          </div>
          <div class="form-row form-row-2" style="margin-bottom: 0">
            <div class="form-group" style="margin-bottom: 0">
              <label>TDS</label
              ><input
                type="number"
                id="chittaiTds"
                min="0"
                step="0.01"
                placeholder="0.00"
                oninput="debouncedCalc()"
              />
            </div>
            <div class="form-group" style="margin-bottom: 0">
              <label>RTGS Amount (Total − TDS)</label
              ><input
                type="number"
                id="chittaiRtgs"
                readonly
                placeholder="0.00"
              />
            </div>
          </div>
        </div>

        <div id="chittaiMsg" class="message"></div>

        <div
          id="paymentSection"
          style="padding: 0 28px 16px; display: none; overflow: hidden"
        >
          <div
            class="section-label"
            style="border-top: 1px solid var(--border); padding-top: 12px"
          >
            Payment
          </div>
          <div class="form-row form-row-3" style="margin-top: 10px">
            <div class="form-group" style="margin-bottom: 0">
              <label>Payment Date</label><input type="date" id="payDate" />
            </div>
            <div class="form-group" style="margin-bottom: 0">
              <label>Amount</label
              ><input
                type="number"
                id="payAmount"
                min="0"
                step="0.01"
                placeholder="0.00"
              />
            </div>
            <div class="form-group" style="margin-bottom: 0">
              <label>MOP</label
              ><select id="payMop">
                <option value="">— Select —</option>
                <option value="Cash">Cash</option>
                <option value="NEFT/RTGS">NEFT/RTGS</option>
              </select>
            </div>
          </div>
        </div>

        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="resetChittai()">Reset</button>
          <button
            class="btn btn-ghost"
            id="addPayBtn"
            onclick="togglePayment()"
          >
            + Add Payment
          </button>
          <button class="btn btn-primary" onclick="saveChittai()">
            Save Chittai
          </button>
        </div>
      </div>
    </div>

    <script>
      function debounce(fn, ms) {
        let t;
        return (...a) => {
          clearTimeout(t);
          t = setTimeout(() => fn(...a), ms);
        };
      }
      let companyCache = null;
      const debouncedCalc = debounce(calcChittai, 300);
      const debouncedRefresh = debounce(refreshChittaiNo, 400);

      function calcChittai() {
        const weight =
          parseFloat(document.getElementById("chittaiWeight").value) || 0;
        const rate =
          parseFloat(document.getElementById("chittaiRate").value) || 0;
        const others =
          parseFloat(document.getElementById("chittaiOthers").value) || 0;
        const rnd =
          parseFloat(document.getElementById("chittaiRnd").value) || 0;
        const tds =
          parseFloat(document.getElementById("chittaiTds").value) || 0;
        const value = weight * rate;
        const total = value + others + rnd;
        const rtgs = total - tds;
        requestAnimationFrame(() => {
          document.getElementById("chittaiValue").value = value.toFixed(2);
          document.getElementById("chittaiTotal").value = total.toFixed(2);
          document.getElementById("chittaiRtgs").value = rtgs.toFixed(2);
        });
      }

      async function generateChittaiNo(dateVal) {
        const d = dateVal ? new Date(dateVal) : new Date();
        const mm = String(d.getMonth() + 1).padStart(2, "0");
        const yy = String(d.getFullYear()).slice(-2);
        const prefix = `${mm}-${yy}-`;
        try {
          const res = await fetch(
            `/api/chittai/next-no?prefix=${encodeURIComponent(prefix)}`,
          );
          const data = await res.json();
          return data.chittai_no;
        } catch (e) {
          return `${prefix}001`;
        }
      }
      async function refreshChittaiNo() {
        const dateVal = document.getElementById("chittaiDate").value;
        const no = await generateChittaiNo(dateVal);
        document.getElementById("chittaiNo").value = no;
        document.getElementById("chittaiNoBadge").textContent = no;
      }

      function resetChittai() {
        [
          "chittaiWeight",
          "chittaiRate",
          "chittaiOthers",
          "chittaiRnd",
          "chittaiTds",
        ].forEach((id) => (document.getElementById(id).value = ""));
        ["chittaiValue", "chittaiTotal", "chittaiRtgs"].forEach(
          (id) => (document.getElementById(id).value = ""),
        );
        document.getElementById("chittaiCompany").value = "";
        document.getElementById("chittaiMsg").className = "message";
        document.getElementById("paymentSection").style.display = "none";
        document.getElementById("payDate").value = "";
        document.getElementById("payAmount").value = "";
        document.getElementById("payMop").value = "";
        document.getElementById("addPayBtn").textContent = "+ Add Payment";
        document.getElementById("chittaiDate").valueAsDate = new Date();
        refreshChittaiNo();
      }

      function closeChittai() {
        document.getElementById("chittaiBackdrop").classList.remove("show");
        try {
          window.parent.closeChittaiModal();
        } catch (e) {}
      }

      async function loadCompanies() {
        try {
          if (!companyCache) {
            const res = await fetch("/api/profiles/list");
            companyCache = await res.json();
          }
          const sel = document.getElementById("chittaiCompany");
          sel.innerHTML =
            '<option value="">— Select Company —</option>' +
            companyCache
              .map((c) => `<option value="${c.id}">${c.alias}</option>`)
              .join("");
        } catch (e) {
          console.error(e);
        }
      }

      async function saveChittai() {
        const profile_id = document.getElementById("chittaiCompany").value,
          date = document.getElementById("chittaiDate").value,
          chittai_no = document.getElementById("chittaiNo").value,
          weight = document.getElementById("chittaiWeight").value,
          rate = document.getElementById("chittaiRate").value,
          value = document.getElementById("chittaiValue").value,
          others = document.getElementById("chittaiOthers").value,
          total = document.getElementById("chittaiTotal").value,
          tds = document.getElementById("chittaiTds").value,
          rtgs = document.getElementById("chittaiRtgs").value,
          msg = document.getElementById("chittaiMsg");
        if (!profile_id || !date || !weight || !rate) {
          msg.textContent = "Please fill Company, Date, Weight and Rate.";
          msg.className = "message error";
          return;
        }
        try {
          const res = await fetch("/api/chittai", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              profile_id,
              chittai_no,
              date,
              weight,
              rate,
              value,
              others,
              total,
              tds,
              rtgs_amount: rtgs,
            }),
          });
          const data = await res.json();
          if (data.id) {
            const payDate = document.getElementById("payDate").value,
              payAmount = document.getElementById("payAmount").value,
              payMop = document.getElementById("payMop").value,
              payVisible =
                document.getElementById("paymentSection").style.display !==
                "none";
            if (payVisible && payDate && payAmount && payMop) {
              await fetch("/api/vouchers", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  profile_id,
                  voucher_type: "Chittai Payment",
                  date: payDate,
                  bill_no: chittai_no,
                  entry_type: "against",
                  description:
                    "Payment against Chittai " + chittai_no + " via " + payMop,
                  total_value: payAmount,
                  linked_chittai_id: data.id,
                }),
              });
            }
            msg.textContent = `Chittai ${chittai_no} saved!`;
            msg.className = "message success";
            setTimeout(resetChittai, 1800);
          } else {
            msg.textContent = data.error || "Failed to save.";
            msg.className = "message error";
          }
        } catch (e) {
          msg.textContent = "Network error: " + e.message;
          msg.className = "message error";
        }
      }

      function togglePayment() {
        const sec = document.getElementById("paymentSection"),
          btn = document.getElementById("addPayBtn");
        const isHidden =
          sec.style.display === "none" || sec.style.display === "";
        if (isHidden) {
          sec.style.display = "block";
          btn.textContent = "− Remove Payment";
          const rtgs = document.getElementById("chittaiRtgs").value;
          if (rtgs) document.getElementById("payAmount").value = rtgs;
        } else {
          sec.style.display = "none";
          btn.textContent = "+ Add Payment";
        }
      }

      document
        .getElementById("chittaiBackdrop")
        .addEventListener("click", function (e) {
          if (e.target === this) closeChittai();
        });
      document.getElementById("chittaiDate").valueAsDate = new Date();
      document.getElementById("payDate").valueAsDate = new Date();
      loadCompanies();
      refreshChittaiNo();
    </script>
  </body>
</html>
