<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Labour Voucher</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        display: flex;
        min-height: 100vh;
      }
      .main-content {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
      }
      .container {
        background: white;
        padding: 30px;
        border-radius: 8px;
        max-width: 1000px;
      }
      h1 {
        margin-bottom: 30px;
        color: #2c3e50;
      }
      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 20px;
      }
      .form-group {
        display: flex;
        flex-direction: column;
      }
      label {
        font-weight: bold;
        margin-bottom: 5px;
        color: #2c3e50;
      }
      input,
      select {
        padding: 10px;
        border: 1px solid #bdc3c7;
        border-radius: 4px;
        font-size: 14px;
      }
      input:focus,
      select:focus {
        outline: none;
        border-color: #3498db;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
      }
      th {
        background: #34495e;
        color: white;
        padding: 12px;
        text-align: left;
      }
      td {
        padding: 12px;
        border-bottom: 1px solid #bdc3c7;
      }
      tr:hover {
        background: #ecf0f1;
      }
      input[type="number"] {
        width: 100%;
      }
      .btn {
        padding: 10px 20px;
        background: #3498db;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        margin-top: 10px;
      }
      .btn:hover {
        background: #2980b9;
      }
      .btn-danger {
        background: #e74c3c;
      }
      .btn-danger:hover {
        background: #c0392b;
      }
      .btn-add {
        background: #27ae60;
        margin-top: 0;
      }
      .btn-add:hover {
        background: #229954;
      }
      .total-section {
        text-align: right;
        margin-top: 20px;
        font-size: 16px;
        font-weight: bold;
      }

      /* Sidebar */
      .sidebar {
        width: 300px;
        background: white;
        border-left: 1px solid #ddd;
        overflow-y: auto;
        padding: 20px;
        flex-shrink: 0;
      }
      .sidebar-title {
        font-size: 15px;
        font-weight: bold;
        color: #2c3e50;
        margin-bottom: 15px;
        padding-bottom: 10px;
        border-bottom: 2px solid #3498db;
      }

      /* Accordion cards */
      .recent-card {
        background: #f9f9f9;
        border: 1px solid #ddd;
        border-radius: 8px;
        margin-bottom: 10px;
        border-left: 4px solid #27ae60;
        overflow: hidden;
      }
      .recent-card-header {
        padding: 12px 15px;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
        user-select: none;
      }
      .recent-card-header:hover {
        background: #ecf0f1;
      }
      .recent-card-title {
        font-size: 13px;
        font-weight: bold;
        color: #2c3e50;
      }
      .recent-card-sub {
        font-size: 11px;
        color: #888;
        margin-top: 2px;
      }
      .recent-card-arrow {
        font-size: 11px;
        color: #888;
        transition: transform 0.2s;
      }
      .recent-card-arrow.open {
        transform: rotate(180deg);
      }
      .recent-card-body {
        display: none;
        padding: 0 15px 12px;
        font-size: 12px;
        color: #555;
        border-top: 1px solid #eee;
      }
      .recent-card-body.show {
        display: block;
      }
      .recent-card-body p {
        margin: 6px 0;
      }
      .recent-card-body strong {
        color: #2c3e50;
      }
      .recent-items-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 8px;
        font-size: 11px;
      }
      .recent-items-table th {
        background: #34495e;
        color: white;
        padding: 5px;
        text-align: left;
      }
      .recent-items-table td {
        padding: 4px 5px;
        border-bottom: 1px solid #eee;
      }
      .no-recent {
        text-align: center;
        color: #999;
        padding: 20px;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="main-content">
      <div class="container">
        <h1>Labour Voucher</h1>
        <a href="/">← BACK</a>

        <div class="form-row" style="margin-top: 20px">
          <div class="form-group">
            <label>Company *</label>
            <select id="companySelect" onchange="loadCompanyData()">
              <option value="">Select Company</option>
            </select>
          </div>
          <div class="form-group">
            <label>Date *</label>
            <input type="date" id="date" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Issue Number *</label>
            <input type="text" id="issueNumber" placeholder="e.g., INV-001" />
          </div>
          <div class="form-group">
            <label>Labour Item Type *</label>
            <select id="labourItemType">
              <option value="">Select Labour Item Type</option>
            </select>
          </div>
        </div>

        <h3 style="margin-top: 30px; margin-bottom: 15px">Line Items</h3>
        <table>
          <thead>
            <tr>
              <th>Sl.No</th>
              <th>Description</th>
              <th>Quantity/GRAMS</th>
              <th>Rate/GRAMS</th>
              <th>Amount</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="itemsTable"></tbody>
        </table>

        <button class="btn btn-add" onclick="addRow()">+ ADD ROW</button>
        <div class="total-section">
          Total Amount: ₹<span id="totalAmount">0.00</span>
        </div>
        <button class="btn" onclick="submitLabourVoucher()">
          SUBMIT VOUCHER
        </button>
      </div>
    </div>

    <div class="sidebar">
      <div class="sidebar-title">Recent Entries (Last 5)</div>
      <div id="recentEntriesList"><div class="no-recent">Loading...</div></div>
    </div>

    <script>
      let companies = [];
      let rowCount = 0;

      async function loadCompanies() {
        const res = await fetch("/api/profile/all");
        companies = await res.json();
        const select = document.getElementById("companySelect");
        select.innerHTML = '<option value="">Select Company</option>';
        companies.forEach((c) => {
          const opt = document.createElement("option");
          opt.value = c.alias;
          opt.textContent = `${c.company} (${c.alias})`;
          select.appendChild(opt);
        });
      }

      function loadCompanyData() {}

      async function loadRecentEntries() {
        try {
          const res = await fetch("/api/labour");
          const allBills = await res.json();
          const issueBills = allBills
            .filter((b) => b.voucher_type === "ISSUE VOUCHER")
            .slice(0, 5);
          const list = document.getElementById("recentEntriesList");
          if (issueBills.length === 0) {
            list.innerHTML = '<div class="no-recent">No entries yet</div>';
            return;
          }
          // Load items for each
          const rendered = await Promise.all(
            issueBills.map(async (bill, i) => {
              const r = await fetch(`/api/labour/${bill.id}`);
              const d = await r.json();
              const totalQty = d.items.reduce(
                (s, it) => s + (parseFloat(it.quantity) || 0),
                0,
              );
              const totalAmt = d.items.reduce(
                (s, it) => s + (parseFloat(it.amount) || 0),
                0,
              );
              const itemRows = d.items
                .map(
                  (it) => `
              <tr><td>${it.sl_no}</td><td>${it.description || "-"}</td><td>${parseFloat(it.quantity).toFixed(2)}</td><td>${parseFloat(it.rate).toFixed(2)}</td><td>${parseFloat(it.amount).toFixed(2)}</td></tr>
            `,
                )
                .join("");
              return `
              <div class="recent-card">
                <div class="recent-card-header" onclick="toggleRecent(${i})">
                  <div>
                    <div class="recent-card-title">${bill.issue_number}</div>
                    <div class="recent-card-sub">${bill.company_name || ""} · ${new Date(bill.date).toLocaleDateString()}</div>
                  </div>
                  <span class="recent-card-arrow" id="arrow_r${i}">▼</span>
                </div>
                <div class="recent-card-body" id="body_r${i}">
                  <p><strong>Company:</strong> ${bill.company_name || "-"}</p>
                  <p><strong>Date:</strong> ${new Date(bill.date).toLocaleDateString()}</p>
                  <p><strong>Item Type:</strong> ${bill.labour_item_type || "-"}</p>
                  <p><strong>Total Qty:</strong> ${totalQty.toFixed(2)} g</p>
                  <p><strong>Total Amount:</strong> ₹${totalAmt.toFixed(2)}</p>
                  <table class="recent-items-table">
                    <thead><tr><th>#</th><th>Desc</th><th>Qty</th><th>Rate</th><th>Amt</th></tr></thead>
                    <tbody>${itemRows}</tbody>
                  </table>
                </div>
              </div>`;
            }),
          );
          list.innerHTML = rendered.join("");
        } catch (err) {
          document.getElementById("recentEntriesList").innerHTML =
            '<div class="no-recent">Error loading</div>';
        }
      }

      function toggleRecent(i) {
        const body = document.getElementById(`body_r${i}`);
        const arrow = document.getElementById(`arrow_r${i}`);
        body.classList.toggle("show");
        arrow.classList.toggle("open");
      }

      async function addRow() {
        rowCount++;
        const table = document.getElementById("itemsTable");
        const row = document.createElement("tr");
        row.id = `row-${rowCount}`;
        row.innerHTML = `
          <td><input type="number" value="${rowCount}" readonly></td>
          <td><input type="text" class="description" placeholder="Description"></td>
          <td><input type="number" class="quantity" step="0.01" placeholder="0.00"></td>
          <td><input type="number" class="rate" step="0.01" placeholder="0.00"></td>
          <td><input type="number" class="amount" step="0.01" placeholder="0.00"></td>
          <td><button class="btn btn-danger" onclick="deleteRow(${rowCount})">DELETE</button></td>`;
        table.appendChild(row);
        row
          .querySelector(".quantity")
          .addEventListener("input", () => calculateAmount(rowCount));
        row
          .querySelector(".rate")
          .addEventListener("input", () => calculateAmount(rowCount));
      }

      function calculateAmount(rowId) {
        const row = document.getElementById(`row-${rowId}`);
        const qty = parseFloat(row.querySelector(".quantity").value) || 0;
        const rate = parseFloat(row.querySelector(".rate").value) || 0;
        row.querySelector(".amount").value = (qty * rate).toFixed(2);
        calculateTotal();
      }

      function calculateTotal() {
        let total = 0;
        document
          .querySelectorAll(".amount")
          .forEach((i) => (total += parseFloat(i.value) || 0));
        document.getElementById("totalAmount").textContent = total.toFixed(2);
      }

      function deleteRow(rowId) {
        const row = document.getElementById(`row-${rowId}`);
        if (row) row.remove();
        calculateTotal();
      }

      async function submitLabourVoucher() {
        const companyAlias = document.getElementById("companySelect").value;
        const date = document.getElementById("date").value;
        const issueNumber = document.getElementById("issueNumber").value;
        const labourItemType = document.getElementById("labourItemType").value;

        if (!companyAlias || !date || !issueNumber || !labourItemType) {
          alert("Please fill all required fields");
          return;
        }

        const items = [];
        document.querySelectorAll("#itemsTable tr").forEach((row, index) => {
          const quantity = parseFloat(row.querySelector(".quantity").value);
          if (quantity) {
            items.push({
              sl_no: index + 1,
              description: row.querySelector(".description").value || "",
              quantity,
              rate: parseFloat(row.querySelector(".rate").value) || 0,
              amount: parseFloat(row.querySelector(".amount").value) || 0,
            });
          }
        });

        if (items.length === 0) {
          alert("Please add at least one line item");
          return;
        }

        const company = companies.find((c) => c.alias === companyAlias);
        if (!company) {
          alert("Company not found");
          return;
        }

        try {
          const res = await fetch("/api/labour", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              profile_id: company.id,
              company_name: company.company,
              date,
              issue_number: issueNumber,
              labour_item_type: labourItemType,
              items,
            }),
          });
          const result = await res.json();
          if (result.status === "SUCCESS") {
            alert("Labour Voucher created successfully!");
            location.reload();
          } else {
            alert(result.error || "Failed to create voucher");
          }
        } catch (err) {
          alert(err.message);
        }
      }

      async function loadLabourItemTypesDropdown() {
        try {
          const res = await fetch("/api/labour-item-types");
          const types = await res.json();
          const select = document.getElementById("labourItemType");
          select.innerHTML =
            '<option value="">Select Labour Item Type</option>';
          types.forEach((t) => {
            const opt = document.createElement("option");
            opt.value = t.name;
            opt.textContent = t.name;
            select.appendChild(opt);
          });
        } catch (err) {}
      }

      window.onload = async () => {
        await loadCompanies();
        loadLabourItemTypesDropdown();
        loadRecentEntries();
        document.getElementById("date").valueAsDate = new Date();
        addRow();
      };
    </script>
  </body>
</html>
