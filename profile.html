<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Profile Creation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background: linear-gradient(
          135deg,
          #ffffff 0%,
          #f8f9fa 50%,
          #ffffff 100%
        );
        backdrop-filter: blur(10px);
        color: #202124;
        min-height: 100vh;
      }
      .layout {
        display: flex;
        gap: 2rem;
        padding: 2rem;
      }
      .card {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(20px) saturate(200%);
        border: 1px solid rgba(255, 255, 255, 0.8);
        border-radius: 20px;
        padding: 32px;
        flex: 1;
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.08),
          inset 0 0 1px rgba(255, 255, 255, 0.5);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        animation: slideUp 0.6s ease-out;
      }
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .card:hover {
        transform: translateY(-4px);
        box-shadow:
          0 12px 48px rgba(0, 0, 0, 0.12),
          inset 0 0 1px rgba(255, 255, 255, 0.5);
      }
      .side-panel {
        width: 280px;
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(30px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.7);
        border-radius: 20px;
        padding: 24px;
        box-shadow:
          0 4px 30px rgba(31, 38, 135, 0.08),
          inset 0 0 1px rgba(255, 255, 255, 0.5);
        height: fit-content;
        animation: slideUp 0.6s ease-out 0.1s both;
      }
      .side-panel h2 {
        font-size: 14px;
        font-weight: 700;
        color: #1976d2;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 16px;
      }
      h1 {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 8px;
        color: #202124;
        letter-spacing: -0.5px;
      }
      h1::after {
        content: "";
        display: block;
        width: 60px;
        height: 4px;
        background: linear-gradient(90deg, #1976d2 0%, #1565c0 100%);
        border-radius: 2px;
        margin-top: 12px;
      }
      a {
        color: #1976d2;
        text-decoration: none;
        font-weight: 600;
        transition: all 0.3s ease;
      }
      a:hover {
        color: #1565c0;
        text-decoration: underline;
      }
      input,
      select {
        width: 100%;
        padding: 12px 14px;
        margin-top: 8px;
        margin-bottom: 16px;
        border: 1.5px solid rgba(25, 118, 210, 0.3);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.6);
        color: #202124;
        font-weight: 500;
        transition: all 0.3s ease;
        font-family: inherit;
        font-size: 14px;
      }
      input::placeholder {
        color: #bdbdbd;
      }
      input:hover,
      select:hover {
        border-color: rgba(25, 118, 210, 0.5);
        background: rgba(25, 118, 210, 0.03);
      }
      input:focus,
      select:focus {
        outline: none;
        border-color: #1976d2;
        background: rgba(25, 118, 210, 0.05);
        box-shadow: 0 0 0 3px rgba(25, 118, 210, 0.1);
      }
      label {
        font-weight: 700;
        font-size: 12px;
        color: #5a6268;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      #companyDropdown {
        width: 100%;
      }
      #editBanner {
        background: rgba(25, 118, 210, 0.08);
        border: 1px solid rgba(25, 118, 210, 0.2);
        border-radius: 8px;
        padding: 12px 16px;
        margin-bottom: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        animation: slideInDown 0.3s ease;
      }
      @keyframes slideInDown {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      #editBanner button {
        padding: 6px 12px;
        background: #f44336;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: 600;
        font-size: 12px;
        transition: all 0.3s ease;
      }
      #editBanner button:hover {
        background: #d32f2f;
      }

      /* ── Bulk Import Section ── */
      .bulk-import-section {
        margin-top: 32px;
        padding-top: 28px;
        border-top: 2px dashed rgba(25, 118, 210, 0.2);
        animation: slideUp 0.6s ease-out 0.15s both;
      }
      .bulk-import-section h2 {
        font-size: 16px;
        font-weight: 700;
        color: #202124;
        margin-bottom: 6px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .bulk-import-section h2::before {
        content: "⬆";
        font-size: 18px;
      }
      .bulk-import-desc {
        font-size: 13px;
        color: #6c757d;
        margin-bottom: 18px;
        line-height: 1.5;
      }
      .bulk-actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 18px;
      }
      .btn-download-template {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 18px;
        background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
        color: #2e7d32;
        border: 1.5px solid #a5d6a7;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 700;
        font-size: 13px;
        transition: all 0.3s ease;
        font-family: inherit;
        text-decoration: none;
        white-space: nowrap;
      }
      .btn-download-template:hover {
        background: linear-gradient(135deg, #c8e6c9, #a5d6a7);
        box-shadow: 0 4px 12px rgba(46, 125, 50, 0.2);
        transform: translateY(-1px);
        text-decoration: none;
        color: #1b5e20;
      }
      .btn-download-template svg {
        flex-shrink: 0;
      }

      .btn-import-excel {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 18px;
        background: linear-gradient(135deg, #e3f2fd, #bbdefb);
        color: #1565c0;
        border: 1.5px solid #90caf9;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 700;
        font-size: 13px;
        transition: all 0.3s ease;
        font-family: inherit;
        white-space: nowrap;
      }
      .btn-import-excel:hover {
        background: linear-gradient(135deg, #bbdefb, #90caf9);
        box-shadow: 0 4px 12px rgba(21, 101, 192, 0.2);
        transform: translateY(-1px);
      }
      .btn-import-excel svg {
        flex-shrink: 0;
      }

      #bulkFileInput {
        display: none;
      }

      /* Import results table */
      .import-results {
        background: rgba(255, 255, 255, 0.8);
        border: 1px solid rgba(25, 118, 210, 0.15);
        border-radius: 12px;
        overflow: hidden;
        animation: slideUp 0.4s ease-out;
      }
      .import-results-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 18px;
        background: rgba(25, 118, 210, 0.06);
        border-bottom: 1px solid rgba(25, 118, 210, 0.12);
      }
      .import-results-header span {
        font-size: 13px;
        font-weight: 700;
        color: #1565c0;
      }
      .import-results-actions {
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .import-summary {
        display: flex;
        gap: 14px;
        font-size: 12px;
        font-weight: 600;
      }
      .import-summary .ok {
        color: #2e7d32;
      }
      .import-summary .err {
        color: #c62828;
      }
      .import-summary .warn {
        color: #e65100;
      }

      .btn-submit-bulk {
        padding: 8px 16px;
        background: linear-gradient(135deg, #1976d2, #1565c0);
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 700;
        font-size: 12px;
        transition: all 0.3s ease;
        font-family: inherit;
      }
      .btn-submit-bulk:hover {
        background: linear-gradient(135deg, #1565c0, #0d47a1);
        box-shadow: 0 4px 12px rgba(21, 101, 192, 0.3);
      }
      .btn-submit-bulk:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }
      .btn-clear-import {
        padding: 8px 12px;
        background: transparent;
        color: #9e9e9e;
        border: 1px solid #e0e0e0;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        font-size: 12px;
        transition: all 0.2s ease;
        font-family: inherit;
      }
      .btn-clear-import:hover {
        color: #f44336;
        border-color: #f44336;
      }

      .import-table-wrap {
        overflow-x: auto;
        max-height: 320px;
        overflow-y: auto;
      }
      .import-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }
      .import-table th {
        position: sticky;
        top: 0;
        background: #f5f8ff;
        padding: 9px 14px;
        text-align: left;
        font-size: 11px;
        font-weight: 700;
        color: #5a6268;
        text-transform: uppercase;
        letter-spacing: 0.4px;
        border-bottom: 1px solid rgba(25, 118, 210, 0.1);
        white-space: nowrap;
      }
      .import-table td {
        padding: 8px 14px;
        border-bottom: 1px solid rgba(0, 0, 0, 0.04);
        white-space: nowrap;
        max-width: 180px;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .import-table tr:last-child td {
        border-bottom: none;
      }
      .import-table tr.row-ok {
        background: rgba(232, 245, 233, 0.4);
      }
      .import-table tr.row-error {
        background: rgba(255, 235, 238, 0.5);
      }
      .import-table tr.row-ok:hover {
        background: rgba(200, 230, 201, 0.5);
      }
      .import-table tr.row-error:hover {
        background: rgba(255, 205, 210, 0.5);
      }

      .row-status-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 8px;
        border-radius: 20px;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        white-space: nowrap;
      }
      .badge-ok {
        background: #e8f5e9;
        color: #2e7d32;
        border: 1px solid #a5d6a7;
      }
      .badge-error {
        background: #ffebee;
        color: #c62828;
        border: 1px solid #ef9a9a;
      }

      .error-tooltip {
        font-size: 11px;
        color: #c62828;
        max-width: 200px;
        white-space: normal;
        line-height: 1.4;
      }

      /* Progress bar */
      .bulk-progress-wrap {
        background: #e8f5e9;
        border: 1px solid #a5d6a7;
        border-radius: 8px;
        padding: 12px 16px;
        margin-top: 14px;
        display: none;
        align-items: center;
        gap: 14px;
      }
      .bulk-progress-wrap.active {
        display: flex;
      }
      .bulk-progress-bar-outer {
        flex: 1;
        height: 8px;
        background: #c8e6c9;
        border-radius: 4px;
        overflow: hidden;
      }
      .bulk-progress-bar-inner {
        height: 100%;
        background: linear-gradient(90deg, #43a047, #2e7d32);
        border-radius: 4px;
        transition: width 0.3s ease;
        width: 0%;
      }
      .bulk-progress-text {
        font-size: 12px;
        font-weight: 700;
        color: #2e7d32;
        white-space: nowrap;
      }

      /* Toast */
      #toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: #333;
        color: #fff;
        padding: 12px 24px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        opacity: 0;
        transition: all 0.3s ease;
        z-index: 9999;
        pointer-events: none;
      }
      #toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      #toast.success {
        background: #2e7d32;
      }
      #toast.error {
        background: #c62828;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <!-- Main Form Card -->
      <div class="card">
        <div id="loading" style="display: none">Please wait…</div>

        <div>
          <h1>Profile Creation</h1>
          <a href="/">← Back</a>
        </div>

        <!-- Edit Banner -->
        <div id="editBanner" style="display: none">
          <span>Editing: <span id="editingAlias"></span></span>
          <button onclick="cancelEdit()">Cancel</button>
        </div>

        <div id="formFields"></div>

        <!-- ── Bulk Import Section ── -->
        <div class="bulk-import-section">
          <h2>Bulk Import</h2>
          <p class="bulk-import-desc">
            Download the Excel template with the correct column headers, fill in
            your company data, then upload to import multiple companies at once.
          </p>

          <div class="bulk-actions">
            <button class="btn-download-template" onclick="downloadTemplate()">
              <svg
                width="15"
                height="15"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <polyline points="7 10 12 15 17 10" />
                <line x1="12" y1="15" x2="12" y2="3" />
              </svg>
              Download Excel Template
            </button>

            <button
              class="btn-import-excel"
              onclick="document.getElementById('bulkFileInput').click()"
            >
              <svg
                width="15"
                height="15"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <polyline points="17 8 12 3 7 8" />
                <line x1="12" y1="3" x2="12" y2="15" />
              </svg>
              Import Excel File
            </button>
            <input
              type="file"
              id="bulkFileInput"
              accept=".xlsx,.xls"
              onchange="handleBulkFileUpload(event)"
            />
          </div>

          <!-- Results Preview -->
          <div id="importResults" style="display: none"></div>

          <!-- Progress Bar -->
          <div class="bulk-progress-wrap" id="bulkProgressWrap">
            <div class="bulk-progress-bar-outer">
              <div class="bulk-progress-bar-inner" id="bulkProgressBar"></div>
            </div>
            <span class="bulk-progress-text" id="bulkProgressText">0 / 0</span>
          </div>
        </div>
      </div>

      <!-- Side Panel -->
      <div class="side-panel">
        <h2>Companies</h2>
        <select id="companyDropdown" onchange="selectCompanyForEdit()">
          <option value="">Select Company</option>
        </select>
      </div>
    </div>

    <div id="toast"></div>

    <script>
      const STATE_CODES = {
        "Andhra Pradesh": "37",
        "Arunachal Pradesh": "12",
        Assam: "18",
        Bihar: "10",
        Chhattisgarh: "22",
        Goa: "30",
        Gujarat: "24",
        Haryana: "06",
        "Himachal Pradesh": "02",
        Jharkhand: "20",
        Karnataka: "29",
        Kerala: "32",
        "Madhya Pradesh": "23",
        Maharashtra: "27",
        Manipur: "14",
        Meghalaya: "17",
        Mizoram: "15",
        Nagaland: "13",
        Odisha: "21",
        Punjab: "03",
        Rajasthan: "08",
        Sikkim: "11",
        "Tamil Nadu": "33",
        Telangana: "36",
        Tripura: "16",
        "Uttar Pradesh": "09",
        Uttarakhand: "05",
        "West Bengal": "19",
        "Andaman and Nicobar Islands": "35",
        Chandigarh: "04",
        Delhi: "07",
        "Jammu and Kashmir": "01",
        Ladakh: "38",
        Lakshadweep: "31",
        Puducherry: "34",
      };
      const STATES = Object.keys(STATE_CODES);

      const SKIP_FIELDS = ["PAN NUMBER", "SHEET NAME", "LINK"];
      const MANDATORY_FIELDS = [
        "COMPANY NAME",
        "ALIAS",
        "ADDRESS",
        "CITY",
        "PINCODE",
        "STATE",
        "STATE CODE",
        "GST NUMBER",
      ];
      const BANK_FIELDS = [
        "A/C HOLDER'S NAME",
        "BANK NAME",
        "ACCOUNT NUMBER",
        "IFSC CODE",
        "BRANCH",
      ];
      const NUMERIC_FIELDS = [
        "PINCODE",
        "STATE CODE",
        "CONTACT NUMBER 01",
        "CONTACT NUMBER 02",
        "ACCOUNT NUMBER",
      ];
      const LENGTH_RULES = {
        PINCODE: 6,
        "CONTACT NUMBER 01": 10,
        "CONTACT NUMBER 02": 10,
      };

      let cachedHeaders = [];
      let parsedBulkRows = [];

      function sanitiseAlias(raw) {
        if (!raw) return "";
        return String(raw)
          .toUpperCase()
          .trim()
          .replace(/[:\\/\?\*\[\]']/g, "")
          .replace(/\s+/g, " ")
          .substring(0, 50);
      }

      // ── Build Form ──
      async function initPage() {
        const res = await fetch("/api/profile/headers");
        cachedHeaders = await res.json();
        buildForm(cachedHeaders);
        loadCompanies();
      }

      function buildForm(headers) {
        const container = document.getElementById("formFields");
        container.innerHTML = "";
        let bankSectionStarted = false;

        headers.forEach((header) => {
          if (!header) return;
          const key = String(header).trim().toUpperCase();
          if (SKIP_FIELDS.includes(key)) return;

          if (BANK_FIELDS.includes(key) && !bankSectionStarted) {
            bankSectionStarted = true;
            container.appendChild(makeSectionHeading("BANK DETAILS"));
          }

          const fieldGroup = document.createElement("div");
          fieldGroup.className = "field-group";

          const label = document.createElement("label");
          label.textContent = header;
          if (MANDATORY_FIELDS.includes(key))
            label.innerHTML += " <span>*</span>";
          fieldGroup.appendChild(label);

          if (key === "STATE") {
            const select = document.createElement("select");
            select.name = header;
            select.dataset.key = key;
            const def = document.createElement("option");
            def.value = "";
            def.textContent = "Select State";
            select.appendChild(def);
            STATES.forEach((s) => {
              const opt = document.createElement("option");
              opt.value = s;
              opt.textContent = s;
              select.appendChild(opt);
            });
            select.addEventListener("change", function () {
              const codeInput = document.querySelector(
                'input[data-key="STATE CODE"]',
              );
              if (codeInput) codeInput.value = STATE_CODES[this.value] || "";
            });
            fieldGroup.appendChild(select);
          } else {
            const input = document.createElement("input");
            input.type = "text";
            input.name = header;
            input.dataset.key = key;
            if (key === "STATE CODE") input.readOnly = true;

            if (key === "COMPANY NAME") {
              input.addEventListener("input", function () {
                this.value = this.value.replace(/[^a-zA-Z0-9\s.,&()\-]/g, "");
                const aliasInput = document.querySelector(
                  'input[data-key="ALIAS"]',
                );
                if (aliasInput && !aliasInput.dataset.manuallyEdited) {
                  aliasInput.value = sanitiseAlias(this.value);
                  updateAliasPreview(aliasInput.value);
                }
              });
            }

            if (key === "ALIAS") {
              input.placeholder = "Short unique name";
              input.addEventListener("input", function () {
                this.dataset.manuallyEdited = "true";
                updateAliasPreview(sanitiseAlias(this.value));
              });
              input.addEventListener("blur", function () {
                this.value = sanitiseAlias(this.value);
                updateAliasPreview(this.value);
              });
            }

            if (["GST NUMBER", "IFSC CODE"].includes(key)) {
              input.addEventListener("input", function () {
                const pos = this.selectionStart;
                this.value = this.value.toUpperCase();
                this.setSelectionRange(pos, pos);
              });
            }

            fieldGroup.appendChild(input);
          }

          container.appendChild(fieldGroup);

          if (key === "ALIAS") {
            const preview = document.createElement("div");
            preview.id = "aliasPreview";
            container.appendChild(preview);
          }
        });

        const btn = document.createElement("button");
        btn.id = "submitBtn";
        btn.textContent = "SUBMIT PROFILE";
        btn.onclick = submitForm;
        container.appendChild(btn);
      }

      function updateAliasPreview(val) {
        const el = document.getElementById("aliasPreview");
        if (el) el.textContent = val ? "→ Sheet name preview: " + val : "";
      }

      function makeSectionHeading(text) {
        const h = document.createElement("div");
        h.textContent = text;
        return h;
      }

      function collectData() {
        const data = {};
        document.querySelectorAll("input[name], select[name]").forEach((el) => {
          data[el.name.trim().toUpperCase()] = el.value.trim();
        });
        return data;
      }

      function validateData(data) {
        const missing = MANDATORY_FIELDS.filter((f) => !data[f]);
        if (missing.length) return `Please fill: ${missing.join(", ")}`;
        const cleanAlias = sanitiseAlias(data["ALIAS"] || "");
        if (!cleanAlias) return "Alias cannot be empty.";
        const anyBank = BANK_FIELDS.some((f) => data[f]);
        if (anyBank) {
          const missingBank = BANK_FIELDS.filter((f) => !data[f]);
          if (missingBank.length)
            return `All bank fields required. Missing: ${missingBank.join(", ")}`;
        }
        for (const field of NUMERIC_FIELDS) {
          if (data[field] && !/^\d+$/.test(data[field]))
            return `${field} must be digits only.`;
        }
        for (const [field, len] of Object.entries(LENGTH_RULES)) {
          if (data[field] && data[field].length !== len)
            return `${field} must be exactly ${len} digits.`;
        }
        const gstPattern =
          /^[0-9]{2}[A-Z]{5}[0-9]{4}[A-Z]{1}[1-9A-Z]{1}Z[0-9A-Z]{1}$/;
        if (data["GST NUMBER"] && !gstPattern.test(data["GST NUMBER"])) {
          return "Invalid GST format. Example: 33AAAAA0000A1Z5";
        }
        return null;
      }

      async function submitForm() {
        const submitBtn = document.getElementById("submitBtn");
        const isUpdate = submitBtn.dataset.isUpdate === "true";
        const editingAlias = submitBtn.dataset.editingAlias;

        document.getElementById("loading").style.display = "block";
        submitBtn.disabled = true;

        let data = collectData();

        if (isUpdate) {
          data["ALIAS"] = sanitiseAlias(
            data["ALIAS"] || data["COMPANY NAME"] || "",
          );
          for (const key of Object.keys(data)) {
            if (key === "E-MAIL ID") data[key] = data[key].toLowerCase();
            else if (key !== "ADDRESS") data[key] = data[key].toUpperCase();
          }
          data["ALIAS"] = sanitiseAlias(data["ALIAS"]);
        } else {
          for (const key of Object.keys(data)) {
            if (key === "E-MAIL ID") data[key] = data[key].toLowerCase();
            else if (key !== "ADDRESS") data[key] = data[key].toUpperCase();
          }
          data["ALIAS"] = sanitiseAlias(
            data["ALIAS"] || data["COMPANY NAME"] || "",
          );
        }

        if (data["GST NUMBER"] && data["GST NUMBER"].length >= 12) {
          data["PAN NUMBER"] = data["GST NUMBER"].substring(2, 12);
        }

        const validationError = validateData(data);
        if (validationError) {
          document.getElementById("loading").style.display = "none";
          submitBtn.disabled = false;
          showToast(validationError, "error");
          return;
        }

        try {
          let res;
          if (isUpdate) {
            res = await fetch(
              `/api/profile/${encodeURIComponent(editingAlias)}`,
              {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data),
              },
            );
          } else {
            res = await fetch("/api/profile", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(data),
            });
          }

          const result = await res.json();
          document.getElementById("loading").style.display = "none";
          submitBtn.disabled = false;

          if (result.status === "SUCCESS") {
            showToast(
              isUpdate ? "Profile updated! ✅" : "Profile created! 🎉",
              "success",
            );
            if (isUpdate) cancelEdit();
            else resetForm();
            loadCompanies();
          } else {
            showToast(result.error || "Something went wrong!", "error");
          }
        } catch (err) {
          document.getElementById("loading").style.display = "none";
          submitBtn.disabled = false;
          showToast(err.message || "Request failed", "error");
        }
      }

      function resetForm() {
        document.querySelectorAll("input[name]").forEach((i) => {
          i.value = "";
          delete i.dataset.manuallyEdited;
        });
        document
          .querySelectorAll("select[name]")
          .forEach((s) => (s.selectedIndex = 0));
        updateAliasPreview("");
      }

      // ── Companies Sidebar ──
      let allCompanies = [];
      let currentEditingAlias = null;

      async function loadCompanies() {
        const res = await fetch("/api/profile/all");
        allCompanies = await res.json();
        renderCompaniesList(allCompanies);
      }

      function renderCompaniesList(companies) {
        const dropdown = document.getElementById("companyDropdown");
        dropdown.innerHTML = `<option value="">Select Company</option>`;
        if (!companies || companies.length === 0) return;
        companies.forEach((c) => {
          const option = document.createElement("option");
          option.value = c.alias;
          option.textContent = `${c.company} (${c.alias})`;
          if (currentEditingAlias === c.alias) option.selected = true;
          dropdown.appendChild(option);
        });
      }

      async function loadEditForm(alias) {
        document.getElementById("loading").style.display = "block";
        const res = await fetch(`/api/profile/${encodeURIComponent(alias)}`);
        const profileData = await res.json();
        document.getElementById("loading").style.display = "none";

        currentEditingAlias = alias;
        document.getElementById("editBanner").style.display = "flex";
        document.getElementById("editingAlias").textContent = alias;

        Object.entries(profileData).forEach(([key, value]) => {
          const el = document.querySelector(`[data-key="${key}"]`);
          if (!el) return;
          if (el.tagName === "SELECT") {
            el.value = value || "";
            if (key === "STATE") {
              const sc = document.querySelector('[data-key="STATE CODE"]');
              if (sc) sc.value = STATE_CODES[value] || "";
            }
          } else {
            el.value = value || "";
            if (key === "ALIAS") el.dataset.manuallyEdited = "true";
          }
        });

        updateAliasPreview(profileData["ALIAS"] || "");
        const submitBtn = document.getElementById("submitBtn");
        submitBtn.textContent = "UPDATE PROFILE";
        submitBtn.dataset.isUpdate = "true";
        submitBtn.dataset.editingAlias = alias;

        renderCompaniesList(allCompanies);
        document.querySelector(".card").scrollIntoView({ behavior: "smooth" });
      }

      function cancelEdit() {
        currentEditingAlias = null;
        document.getElementById("editBanner").style.display = "none";
        document.getElementById("companyDropdown").value = "";
        resetForm();
        const submitBtn = document.getElementById("submitBtn");
        submitBtn.textContent = "SUBMIT PROFILE";
        delete submitBtn.dataset.isUpdate;
        delete submitBtn.dataset.editingAlias;
        renderCompaniesList(allCompanies);
      }

      // ─────────────────────────────────────────────
      //  BULK IMPORT — Download Template
      // ─────────────────────────────────────────────
      async function downloadTemplate() {
        // Ensure headers are loaded
        let headers = cachedHeaders;
        if (!headers || headers.length === 0) {
          try {
            const res = await fetch("/api/profile/headers");
            headers = await res.json();
            cachedHeaders = headers;
          } catch (e) {
            showToast("Failed to load headers from server", "error");
            return;
          }
        }

        // Filter out skip fields for the template
        const templateHeaders = headers.filter((h) => {
          if (!h) return false;
          const key = String(h).trim().toUpperCase();
          return !SKIP_FIELDS.includes(key);
        });

        const wb = XLSX.utils.book_new();

        // ── Sheet 1: Data entry sheet ──
        const wsData = [templateHeaders]; // header row only
        const ws = XLSX.utils.aoa_to_sheet(wsData);

        // Style header row with column widths
        ws["!cols"] = templateHeaders.map((h) => {
          const key = String(h).trim().toUpperCase();
          if (["ADDRESS"].includes(key)) return { wch: 40 };
          if (["COMPANY NAME", "A/C HOLDER'S NAME", "BANK NAME"].includes(key))
            return { wch: 30 };
          if (["GST NUMBER", "IFSC CODE", "ALIAS"].includes(key))
            return { wch: 20 };
          return { wch: 18 };
        });

        XLSX.utils.book_append_sheet(wb, ws, "Companies");

        // ── Sheet 2: Instructions ──
        const mandatory = MANDATORY_FIELDS.filter(
          (f) => !SKIP_FIELDS.includes(f),
        );
        const instructions = [
          ["BULK IMPORT INSTRUCTIONS"],
          [""],
          ["1. Fill data in the 'Companies' sheet starting from Row 2."],
          ["2. Do NOT modify or delete the header row (Row 1)."],
          ["3. Each row = one company profile."],
          [""],
          ["MANDATORY FIELDS (must not be empty):"],
          ...mandatory.map((f) => ["  • " + f]),
          [""],
          ["NOTES:"],
          ["  • STATE: Must match exactly (e.g. Tamil Nadu, Maharashtra)"],
          [
            "  • STATE CODE: Auto-derived from State — leave blank or it will be overridden",
          ],
          ["  • GST NUMBER format: 33AAAAA0000A1Z5"],
          ["  • PINCODE: exactly 6 digits"],
          ["  • CONTACT NUMBER: exactly 10 digits"],
          [
            "  • ALIAS: Short unique name (auto-filled from Company Name if blank)",
          ],
          [
            "  • Bank fields: If any bank field is filled, ALL bank fields are required",
          ],
        ];
        const wsInstr = XLSX.utils.aoa_to_sheet(instructions);
        wsInstr["!cols"] = [{ wch: 70 }];
        XLSX.utils.book_append_sheet(wb, wsInstr, "Instructions");

        // ── Sheet 3: State Reference ──
        const stateRef = [
          ["State Name", "State Code"],
          ...Object.entries(STATE_CODES),
        ];
        const wsStates = XLSX.utils.aoa_to_sheet(stateRef);
        wsStates["!cols"] = [{ wch: 30 }, { wch: 12 }];
        XLSX.utils.book_append_sheet(wb, wsStates, "State Codes");

        XLSX.writeFile(wb, "company_bulk_import_template.xlsx");
        showToast("Template downloaded! ✅", "success");
      }

      // ─────────────────────────────────────────────
      //  BULK IMPORT — Parse uploaded Excel
      // ─────────────────────────────────────────────
      function handleBulkFileUpload(event) {
        const file = event.target.files[0];
        if (!file) return;

        // Reset file input so same file can be re-selected
        event.target.value = "";

        const reader = new FileReader();
        reader.onload = function (e) {
          try {
            const data = new Uint8Array(e.target.result);
            const wb = XLSX.read(data, { type: "array", cellDates: true });

            // Find "Companies" sheet or fall back to first sheet
            const sheetName = wb.SheetNames.includes("Companies")
              ? "Companies"
              : wb.SheetNames[0];
            const ws = wb.Sheets[sheetName];

            const rows = XLSX.utils.sheet_to_json(ws, { defval: "" });

            if (!rows || rows.length === 0) {
              showToast("No data rows found in the Excel file.", "error");
              return;
            }

            // Normalise: trim keys, uppercase
            const normalised = rows.map((row) => {
              const obj = {};
              for (const [k, v] of Object.entries(row)) {
                obj[k.trim().toUpperCase()] = String(v ?? "").trim();
              }
              return obj;
            });

            // Validate each row
            parsedBulkRows = normalised.map((row, idx) => {
              // Auto-derive STATE CODE from STATE
              if (row["STATE"] && STATE_CODES[row["STATE"]]) {
                row["STATE CODE"] = STATE_CODES[row["STATE"]];
              }

              // Normalise case
              for (const key of Object.keys(row)) {
                if (key === "E-MAIL ID") row[key] = row[key].toLowerCase();
                else if (key !== "ADDRESS") row[key] = row[key].toUpperCase();
              }

              // Auto-fill ALIAS
              row["ALIAS"] = sanitiseAlias(
                row["ALIAS"] || row["COMPANY NAME"] || "",
              );

              // Auto-derive PAN
              if (row["GST NUMBER"] && row["GST NUMBER"].length >= 12) {
                row["PAN NUMBER"] = row["GST NUMBER"].substring(2, 12);
              }

              const error = validateData(row);
              return {
                rowNum: idx + 2,
                data: row,
                error,
                status: error ? "error" : "ok",
              };
            });

            renderImportPreview(parsedBulkRows);
          } catch (err) {
            showToast("Failed to parse Excel file: " + err.message, "error");
          }
        };
        reader.readAsArrayBuffer(file);
      }

      function renderImportPreview(rows) {
        const container = document.getElementById("importResults");
        const okCount = rows.filter((r) => r.status === "ok").length;
        const errCount = rows.filter((r) => r.status === "error").length;

        // Determine columns to show: COMPANY NAME, ALIAS, CITY, STATE, GST NUMBER + STATUS + ERROR
        const previewCols = [
          "COMPANY NAME",
          "ALIAS",
          "CITY",
          "STATE",
          "GST NUMBER",
        ];

        let html = `
          <div class="import-results">
            <div class="import-results-header">
              <span>Preview — ${rows.length} row${rows.length !== 1 ? "s" : ""} detected</span>
              <div class="import-results-actions">
                <div class="import-summary">
                  <span class="ok">✓ ${okCount} valid</span>
                  ${errCount > 0 ? `<span class="err">✗ ${errCount} error${errCount !== 1 ? "s" : ""}</span>` : ""}
                </div>
                <button class="btn-submit-bulk" id="bulkSubmitBtn" onclick="submitBulkImport()" ${okCount === 0 ? "disabled" : ""}>
                  Import ${okCount} Valid
                </button>
                <button class="btn-clear-import" onclick="clearImport()">✕ Clear</button>
              </div>
            </div>
            <div class="import-table-wrap">
              <table class="import-table">
                <thead>
                  <tr>
                    <th>#</th>
                    ${previewCols.map((c) => `<th>${c}</th>`).join("")}
                    <th>STATUS</th>
                    <th>NOTES</th>
                  </tr>
                </thead>
                <tbody>
                  ${rows
                    .map(
                      (row) => `
                    <tr class="row-${row.status}">
                      <td>${row.rowNum}</td>
                      ${previewCols.map((c) => `<td title="${(row.data[c] || "").replace(/"/g, "&quot;")}">${row.data[c] || ""}</td>`).join("")}
                      <td>
                        <span class="row-status-badge badge-${row.status}">
                          ${row.status === "ok" ? "✓ Valid" : "✗ Error"}
                        </span>
                      </td>
                      <td class="error-tooltip">${row.error || ""}</td>
                    </tr>
                  `,
                    )
                    .join("")}
                </tbody>
              </table>
            </div>
          </div>
        `;

        container.innerHTML = html;
        container.style.display = "block";
      }

      function clearImport() {
        parsedBulkRows = [];
        document.getElementById("importResults").style.display = "none";
        document.getElementById("importResults").innerHTML = "";
        document.getElementById("bulkProgressWrap").classList.remove("active");
      }

      // ─────────────────────────────────────────────
      //  BULK IMPORT — Submit valid rows
      // ─────────────────────────────────────────────
      async function submitBulkImport() {
        const validRows = parsedBulkRows.filter((r) => r.status === "ok");
        if (validRows.length === 0) {
          showToast("No valid rows to import.", "error");
          return;
        }

        const btn = document.getElementById("bulkSubmitBtn");
        btn.disabled = true;
        btn.textContent = "Importing…";

        const progressWrap = document.getElementById("bulkProgressWrap");
        const progressBar = document.getElementById("bulkProgressBar");
        const progressText = document.getElementById("bulkProgressText");
        progressWrap.classList.add("active");

        let successCount = 0;
        let failCount = 0;
        const results = [...parsedBulkRows]; // clone for re-render

        for (let i = 0; i < validRows.length; i++) {
          const row = validRows[i];
          const pct = Math.round((i / validRows.length) * 100);
          progressBar.style.width = pct + "%";
          progressText.textContent = `${i} / ${validRows.length}`;

          try {
            const res = await fetch("/api/profile", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(row.data),
            });
            const result = await res.json();

            // Find original index and update status
            const origIdx = results.findIndex((r) => r.rowNum === row.rowNum);
            if (result.status === "SUCCESS") {
              successCount++;
              results[origIdx].status = "ok";
              results[origIdx].error = "";
              results[origIdx].importedOk = true;
            } else {
              failCount++;
              results[origIdx].status = "error";
              results[origIdx].error = result.error || "Server error";
            }
          } catch (err) {
            failCount++;
            const origIdx = results.findIndex((r) => r.rowNum === row.rowNum);
            results[origIdx].status = "error";
            results[origIdx].error = err.message || "Network error";
          }
        }

        progressBar.style.width = "100%";
        progressText.textContent = `${validRows.length} / ${validRows.length}`;

        parsedBulkRows = results;
        renderImportPreview(results);

        // Re-disable button if no more valid rows
        const remaining = results.filter(
          (r) => r.status === "ok" && !r.importedOk,
        ).length;
        const newBtn = document.getElementById("bulkSubmitBtn");
        if (newBtn) {
          newBtn.disabled = true;
          newBtn.textContent = "Done";
        }

        showToast(
          `Import complete: ${successCount} added${failCount > 0 ? `, ${failCount} failed` : ""}`,
          failCount === 0 ? "success" : "error",
        );

        loadCompanies();

        setTimeout(() => {
          progressWrap.classList.remove("active");
          progressBar.style.width = "0%";
        }, 2000);
      }

      function showToast(message, type) {
        const toast = document.getElementById("toast");
        toast.textContent = message;
        toast.className = "show " + type;
        setTimeout(() => (toast.className = ""), 3200);
      }

      function selectCompanyForEdit() {
        const alias = document.getElementById("companyDropdown").value;
        if (!alias) return;
        loadEditForm(alias);
      }

      window.onload = initPage;
    </script>
  </body>
</html>
