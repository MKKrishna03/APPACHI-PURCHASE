<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        display: flex;
        height: 100vh;
        background: linear-gradient(
          135deg,
          #ffffff 0%,
          #f8f9fa 50%,
          #ffffff 100%
        );
        backdrop-filter: blur(10px);
        color: #202124;
      }
      .sidebar {
        width: 280px;
        background: #ffffff;
        backdrop-filter: blur(30px) saturate(180%);
        color: #202124;
        border-right: 1px solid rgba(255, 255, 255, 0.7);
        padding: 16px;
        box-shadow:
          0 4px 30px rgba(31, 38, 135, 0.08),
          inset 0 0 1px rgba(255, 255, 255, 0.5);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        overflow-y: auto;
        transition: width 0.4s ease-in-out;
      }
      .sidebar.collapsed {
        width: 70px;
      }
      .sidebar::-webkit-scrollbar {
        width: 6px;
      }
      .sidebar::-webkit-scrollbar-track {
        background: transparent;
      }
      .sidebar::-webkit-scrollbar-thumb {
        background: rgba(0, 0, 0, 0.2);
        border-radius: 3px;
      }
      .sidebar::-webkit-scrollbar-thumb:hover {
        background: rgba(0, 0, 0, 0.3);
      }
      .toggle-btn {
        background: transparent;
        border: none;
        color: #1f2937;
        font-size: 20px;
        cursor: pointer;
        margin-bottom: 24px;
        padding: 8px;
        border-radius: 8px;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 500;
        letter-spacing: 0.5px;
      }
      .toggle-btn:hover {
        background: rgba(0, 0, 0, 0.06);
        transform: scale(1.05);
      }
      .sidebar.collapsed .toggle-btn span:not(:first-child) {
        display: none;
      }

      .sidebar.collapsed .toggle-btn span:first-child {
        display: inline;
      }
      .sidebar-content {
        display: block;
        opacity: 1;
        transition: opacity 0.3s ease-in-out;
      }
      .sidebar.collapsed .sidebar-content {
        display: none;
        opacity: 0;
      }
      .sidebar-section {
        margin-bottom: 24px;
        border-radius: 12px;
        overflow: hidden;
        transition: all 0.3s ease;
      }
      .sidebar-section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 12px;
        cursor: pointer;
        background: rgba(25, 118, 210, 0.08);
        border-radius: 8px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        user-select: none;
        font-weight: 600;
        font-size: 13px;
        color: #1976d2;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .sidebar-section-header:hover {
        background: rgba(25, 118, 210, 0.12);
        transform: translateX(2px);
      }
      .sidebar-section-icon {
        font-size: 16px;
        margin-right: 8px;
        display: inline-block;
        transition: transform 0.3s ease;
      }
      .sidebar-section.collapsed .sidebar-section-icon {
        transform: rotate(-90deg);
      }
      .sidebar-section-content {
        max-height: 500px;
        overflow: hidden;
        transition:
          max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1),
          opacity 0.3s ease;
        background: rgba(0, 0, 0, 0.02);
      }
      .sidebar-section.collapsed .sidebar-section-content {
        max-height: 0;
        opacity: 0;
      }
      .sidebar-option {
        padding: 10px 12px;
        margin: 6px 0;
        background: rgba(255, 255, 255, 0.5);
        border: 1px solid rgba(25, 118, 210, 0.2);
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        font-size: 13px;
        font-weight: 500;
        color: #1976d2;
      }
      .sidebar-option:hover {
        background: rgba(25, 118, 210, 0.1);
        border-color: rgba(25, 118, 210, 0.4);
        transform: translateX(4px);
        box-shadow: 0 4px 12px rgba(25, 118, 210, 0.15);
      }
      .sidebar-option:active {
        transform: translateX(2px);
      }
      .sidebar select {
        width: 100%;
        padding: 10px 12px;
        margin: 6px 0;
        background: rgba(255, 255, 255, 0.6);
        color: #1976d2;
        border: 1px solid rgba(25, 118, 210, 0.2);
        border-radius: 8px;
        cursor: pointer;
        font-weight: 500;
        transition: all 0.3s ease;
        font-size: 13px;
      }
      .sidebar select:hover {
        background: rgba(25, 118, 210, 0.08);
        border-color: rgba(25, 118, 210, 0.4);
      }
      .sidebar select:focus {
        outline: none;
        border-color: #1976d2;
        background: rgba(25, 118, 210, 0.05);
        box-shadow: 0 0 0 3px rgba(25, 118, 210, 0.1);
      }
      .company-list-wrap {
        margin: 12px 4px 4px;
        padding: 14px;
        border-radius: 14px;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.92),
          rgba(242, 247, 255, 0.9)
        );
        border: 1px solid rgba(25, 118, 210, 0.14);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.8),
          0 10px 24px rgba(25, 118, 210, 0.08);
      }
      .company-action {
        margin: 8px 4px 0;
        background: linear-gradient(
          135deg,
          rgba(25, 118, 210, 0.12),
          rgba(25, 118, 210, 0.04)
        );
        border-color: rgba(25, 118, 210, 0.24);
        font-weight: 600;
      }
      .company-subsection {
        margin: 12px 4px 4px;
        border-radius: 14px;
        overflow: hidden;
        border: 1px solid rgba(25, 118, 210, 0.14);
        background: rgba(255, 255, 255, 0.56);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.76),
          0 8px 20px rgba(25, 118, 210, 0.06);
      }
      .company-subsection-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 14px;
        cursor: pointer;
        color: #355c94;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        background: linear-gradient(
          180deg,
          rgba(245, 249, 255, 0.96),
          rgba(236, 243, 253, 0.92)
        );
      }
      .company-subsection-header:hover {
        background: linear-gradient(
          180deg,
          rgba(239, 246, 255, 0.98),
          rgba(228, 238, 252, 0.94)
        );
      }
      .company-subsection-icon {
        display: inline-block;
        transition: transform 0.25s ease;
      }
      .company-subsection.collapsed .company-subsection-icon {
        transform: rotate(-90deg);
      }
      .company-subsection-body {
        max-height: 340px;
        overflow: hidden;
        transition:
          max-height 0.3s ease,
          opacity 0.25s ease;
      }
      .company-subsection.collapsed .company-subsection-body {
        max-height: 0;
        opacity: 0;
      }
      .company-list-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #4f6fa8;
      }
      .company-count {
        min-width: 28px;
        padding: 3px 8px;
        border-radius: 999px;
        background: rgba(25, 118, 210, 0.12);
        color: #1976d2;
        font-size: 11px;
        text-align: center;
      }
      .company-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-height: 280px;
        overflow-y: auto;
        padding-right: 4px;
      }
      .company-list::-webkit-scrollbar {
        width: 5px;
      }
      .company-list::-webkit-scrollbar-thumb {
        background: rgba(25, 118, 210, 0.22);
        border-radius: 999px;
      }
      .company-card {
        padding: 12px 14px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.88);
        border: 1px solid rgba(25, 118, 210, 0.1);
        color: #23406d;
        font-size: 13px;
        font-weight: 600;
        line-height: 1.4;
        box-shadow: 0 6px 16px rgba(25, 118, 210, 0.08);
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease,
          border-color 0.2s ease;
      }
      .company-card:hover {
        transform: translateY(-1px);
        border-color: rgba(25, 118, 210, 0.22);
        box-shadow: 0 10px 22px rgba(25, 118, 210, 0.12);
      }
      .company-empty {
        padding: 14px 12px;
        border-radius: 12px;
        background: rgba(25, 118, 210, 0.06);
        color: #6b7b93;
        font-size: 12px;
        text-align: center;
        border: 1px dashed rgba(25, 118, 210, 0.16);
      }
      .main {
        flex: 1;
        padding: 24px;
        overflow-y: auto;
        animation: fadeIn 0.5s ease-in-out;
      }
      .main::-webkit-scrollbar {
        width: 8px;
      }
      .main::-webkit-scrollbar-track {
        background: transparent;
      }
      .main::-webkit-scrollbar-thumb {
        background: rgba(0, 0, 0, 0.1);
        border-radius: 4px;
      }
      .main::-webkit-scrollbar-thumb:hover {
        background: rgba(0, 0, 0, 0.2);
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .page {
        max-width: 1000px;
        margin: 0 auto;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(20px) saturate(200%);
        border: 1px solid rgba(255, 255, 255, 0.8);
        border-radius: 20px;
        padding: 32px;
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.08),
          inset 0 0 1px rgba(255, 255, 255, 0.5);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        animation: slideUp 0.6s ease-out;
      }
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      h1 {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 8px;
        color: #202124;
        letter-spacing: -0.5px;
      }
      h1::after {
        content: "";
        display: block;
        width: 60px;
        height: 4px;
        background: linear-gradient(90deg, #1976d2 0%, #1565c0 100%);
        border-radius: 2px;
        margin-top: 12px;
      }
      .actions {
        display: flex;
        gap: 12px;
        margin-top: 24px;
      }
      .btn {
        padding: 12px 24px;
        border: none;
        border-radius: 8px;
        background: linear-gradient(135deg, #1976d2 0%, #1565c0 100%);
        color: white;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 4px 12px rgba(25, 118, 210, 0.3);
        font-size: 14px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }
      .btn:hover {
        background: linear-gradient(135deg, #1565c0 0%, #0d47a1 100%);
        box-shadow: 0 8px 24px rgba(25, 118, 210, 0.4);
        transform: translateY(-2px);
      }
      .btn:active {
        transform: translateY(0);
      }
      .btn-secondary {
        background: linear-gradient(135deg, #43a047 0%, #2e7d32 100%);
        box-shadow: 0 4px 12px rgba(67, 160, 71, 0.3);
      }
      .btn-secondary:hover {
        background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%);
        box-shadow: 0 8px 24px rgba(67, 160, 71, 0.4);
        transform: translateY(-2px);
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
        z-index: 999;
        backdrop-filter: blur(4px);
        animation: backdropFadeIn 0.3s ease;
      }
      .modal-backdrop.show {
        display: flex;
      }
      @keyframes backdropFadeIn {
        from {
          opacity: 0;
          backdrop-filter: blur(0px);
        }
        to {
          opacity: 1;
          backdrop-filter: blur(4px);
        }
      }
      .modal {
        width: 100%;
        max-width: 700px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(20px) saturate(200%);
        border: 1px solid rgba(255, 255, 255, 0.8);
        border-radius: 20px;
        padding: 32px;
        box-shadow:
          0 20px 60px rgba(0, 0, 0, 0.15),
          inset 0 0 1px rgba(255, 255, 255, 0.5);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        animation: modalSlideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      @keyframes modalSlideUp {
        from {
          opacity: 0;
          transform: translateY(30px) scale(0.95);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
        padding-bottom: 16px;
        border-bottom: 2px solid rgba(25, 118, 210, 0.1);
      }
      .modal-title {
        font-size: 20px;
        font-weight: 700;
        color: #202124;
        letter-spacing: -0.5px;
      }
      .close-btn {
        background: none;
        border: none;
        font-size: 24px;
        cursor: pointer;
        color: #999;
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        transition: all 0.3s ease;
      }
      .close-btn:hover {
        background: rgba(0, 0, 0, 0.06);
        color: #202124;
        transform: scale(1.1);
      }
      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 20px;
      }
      .form-group {
        display: flex;
        flex-direction: column;
      }
      label {
        font-size: 12px;
        font-weight: 700;
        margin-bottom: 8px;
        color: #5a6268;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .modal input,
      .modal select {
        padding: 12px 14px;
        border: 1.5px solid rgba(25, 118, 210, 0.3);
        border-radius: 8px;
        font-size: 14px;
        background: rgba(255, 255, 255, 0.6);
        color: #202124;
        transition: all 0.3s ease;
        font-family: inherit;
      }
      .modal input::placeholder {
        color: #bdbdbd;
      }
      .modal input:hover,
      .modal select:hover {
        border-color: rgba(25, 118, 210, 0.5);
        background: rgba(25, 118, 210, 0.03);
      }
      .modal input:focus,
      .modal select:focus {
        outline: none;
        border-color: #1976d2;
        background: rgba(25, 118, 210, 0.05);
        box-shadow: 0 0 0 3px rgba(25, 118, 210, 0.1);
      }
      .full {
        grid-column: 1 / -1;
      }
      .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        margin-top: 28px;
        padding-top: 16px;
        border-top: 1px solid rgba(0, 0, 0, 0.06);
      }
      .message {
        margin-top: 16px;
        font-size: 13px;
        padding: 12px 16px;
        border-radius: 8px;
        display: none;
        border-left: 4px solid transparent;
        animation: slideInDown 0.3s ease;
      }
      @keyframes slideInDown {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .message.success {
        background: rgba(76, 175, 80, 0.1);
        color: #2e7d32;
        border-left-color: #43a047;
        display: block;
      }
      .message.error {
        background: rgba(244, 67, 54, 0.1);
        color: #c62828;
        border-left-color: #f44336;
        display: block;
      }
      @media (max-width: 720px) {
        .form-grid {
          grid-template-columns: 1fr;
          gap: 16px;
        }
        .sidebar {
          width: 260px;
        }
        .sidebar.collapsed {
          width: 70px;
        }
      }
    </style>
  </head>
  <body>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button class="toggle-btn" onclick="toggleSidebar()">
          <span>☰</span>
          <span>Menu</span>
        </button>
      </div>
      <div class="sidebar-content">
        <!-- Company Section -->
        <div class="sidebar-section" id="companySection">
          <div
            class="sidebar-section-header"
            onclick="toggleSection('companySection')"
          >
            <span><span class="sidebar-section-icon">▶</span>🏢 Company</span>
          </div>
          <div class="sidebar-section-content">
            <div
              class="sidebar-option company-action"
              onclick="window.location.href = '/profile'"
            >
              Create Profile
            </div>
            <div class="sidebar-option" onclick="openCompanyListModal()">
              List of Companies
            </div>
          </div>
        </div>

        <!-- Labour Section -->
        <div class="sidebar-section" id="labourSection">
          <div
            class="sidebar-section-header"
            onclick="toggleSection('labourSection')"
          >
            <span><span class="sidebar-section-icon">▶</span>👷 Labour</span>
          </div>
          <div class="sidebar-section-content">
            <select id="labourSelect" onchange="handleLabourSelect()">
              <option value="">Select Labour</option>
              <option value="create">+ Create Issue Voucher</option>
              <option value="close">✓ Close Issue Voucher</option>
            </select>
          </div>
        </div>

        <!-- Transactions Section -->
        <div class="sidebar-section" id="transactionSection">
          <div
            class="sidebar-section-header"
            onclick="window.location.href = '/transaction'"
          >
            <span
              ><span class="sidebar-section-icon">▶</span>💰 Transactions</span
            >
          </div>
        </div>

        <!-- Chittai Section -->
        <div class="sidebar-section" id="chittaiSection">
          <div class="sidebar-section-header" onclick="openChittaiModal()">
            <span><span class="sidebar-section-icon">▶</span>📋 Chittai</span>
          </div>
        </div>
      </div>
    </aside>

    <div class="main">
      <div class="page">
        <h1>Dashboard</h1>
      </div>

      <div
        style="
          display: grid;
          grid-template-columns: 340px;
          gap: 20px;
          margin-top: 20px;
        "
      >
        <!-- Left: Pending Vouchers -->
        <div
          class="page"
          style="
            padding: 20px;
            height: fit-content;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
          "
        >
          <h2
            style="
              font-size: 15px;
              font-weight: 700;
              margin-bottom: 12px;
              color: #202124;
            "
          >
            Pending Issue Vouchers
          </h2>
          <input
            type="text"
            id="pendingSearch"
            placeholder="Search..."
            oninput="filterPending(this.value)"
            style="
              width: 100%;
              padding: 8px 12px;
              margin-bottom: 12px;
              border: 1.5px solid rgba(25, 118, 210, 0.25);
              border-radius: 8px;
              font-size: 13px;
              outline: none;
              box-sizing: border-box;
            "
          />
          <div id="pendingVoucherList" style="flex: 1; overflow-y: auto"></div>
        </div>
      </div>
    </div>

    <div class="modal-backdrop" id="receiptBackdrop">
      <div class="modal" role="dialog" aria-modal="true">
        <div class="modal-header">
          <div class="modal-title">Receipt Voucher</div>
          <button class="close-btn" onclick="closeModal('receipt')">x</button>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label for="receiptCompany">Company</label>
            <select id="receiptCompany"></select>
          </div>
          <div class="form-group">
            <label for="receiptVoucherType">Voucher Type</label>
            <select id="receiptVoucherType">
              <option value="">Select Voucher Type</option>
              <option value="Purchase Receipt Voucher">
                Purchase Receipt Voucher
              </option>
              <option value="Labour Receipt Voucher">
                Labour Receipt Voucher
              </option>
            </select>
          </div>
          <div class="form-group full">
            <label for="receiptAgainstBill">Against Bill</label>
            <select id="receiptAgainstBill"></select>
          </div>
          <div class="form-group">
            <label for="receiptDate">Receipt Date</label>
            <input type="date" id="receiptDate" />
          </div>
          <div class="form-group">
            <label for="receiptAmount">Amount</label>
            <input type="number" id="receiptAmount" min="0" step="0.01" />
          </div>
          <div class="form-group">
            <label for="receiptMop">MOP</label>
            <select id="receiptMop">
              <option value="">Select MOP</option>
              <option value="Cash">Cash</option>
              <option value="Bank">Bank</option>
              <option value="UPI">UPI</option>
              <option value="Cheque">Cheque</option>
              <option value="NEFT/RTGS">NEFT/RTGS</option>
              <option value="Other">Other</option>
            </select>
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn" onclick="saveReceipt()">Save Receipt</button>
        </div>
        <div id="receiptMsg" class="message"></div>
      </div>
    </div>

    <div class="modal-backdrop" id="paymentBackdrop">
      <div class="modal" role="dialog" aria-modal="true">
        <div class="modal-header">
          <div class="modal-title">Payment Voucher</div>
          <button class="close-btn" onclick="closeModal('payment')">x</button>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label for="paymentCompany">Company</label>
            <select id="paymentCompany"></select>
          </div>
          <div class="form-group">
            <label for="paymentVoucherType">Voucher Type</label>
            <select id="paymentVoucherType">
              <option value="">Select Voucher Type</option>
              <option value="Purchase Payment Voucher">
                Purchase Payment Voucher
              </option>
              <option value="Labour Payment Voucher">
                Labour Payment Voucher
              </option>
            </select>
          </div>
          <div class="form-group full">
            <label for="paymentAgainstBill">Against Bill</label>
            <select id="paymentAgainstBill"></select>
          </div>
          <div class="form-group">
            <label for="paymentDate">Payment Date</label>
            <input type="date" id="paymentDate" />
          </div>
          <div class="form-group">
            <label for="paymentAmount">Amount</label>
            <input type="number" id="paymentAmount" min="0" step="0.01" />
          </div>
          <div class="form-group">
            <label for="paymentMop">MOP</label>
            <select id="paymentMop">
              <option value="">Select MOP</option>
              <option value="Cash">Cash</option>
              <option value="Bank">Bank</option>
              <option value="UPI">UPI</option>
              <option value="Cheque">Cheque</option>
              <option value="NEFT/RTGS">NEFT/RTGS</option>
              <option value="Other">Other</option>
            </select>
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn btn-secondary" onclick="savePayment()">
            Save Payment
          </button>
        </div>
        <div id="paymentMsg" class="message"></div>
      </div>
    </div>

    <script>
      const receiptBackdrop = document.getElementById("receiptBackdrop");
      const paymentBackdrop = document.getElementById("paymentBackdrop");

      // Toggle sidebar
      function toggleSidebar() {
        const sidebar = document.getElementById("sidebar");
        sidebar.classList.toggle("collapsed");
        // Collapse all sections when sidebar collapses
        if (sidebar.classList.contains("collapsed")) {
          document.querySelectorAll(".sidebar-section").forEach((section) => {
            section.classList.add("collapsed");
          });
        }
      }

      // Toggle sidebar sections
      function toggleSection(sectionId) {
        const section = document.getElementById(sectionId);
        section.classList.toggle("collapsed");
      }

      function handleLabourSelect() {
        const val = document.getElementById("labourSelect").value;
        if (val === "create") {
          window.location.href = "/labour";
        } else if (val === "close") {
          window.location.href = "/labclose";
        }
        document.getElementById("labourSelect").value = "";
      }

      function openModal(type) {
        if (type === "receipt") {
          receiptBackdrop.classList.add("show");
        } else {
          paymentBackdrop.classList.add("show");
        }
      }

      function closeModal(type) {
        if (type === "receipt") {
          receiptBackdrop.classList.remove("show");
        } else {
          paymentBackdrop.classList.remove("show");
        }
      }

      receiptBackdrop.addEventListener("click", (e) => {
        if (e.target === receiptBackdrop) closeModal("receipt");
      });
      paymentBackdrop.addEventListener("click", (e) => {
        if (e.target === paymentBackdrop) closeModal("payment");
      });

      function toggleReceiptEntryType() {
        const val = document.getElementById("receiptEntryType").value;
        const fields = document.getElementById("receiptAgainstFields");
        fields.style.display = val === "against" ? "block" : "none";
        if (val !== "against") {
          document.getElementById("receiptVoucherType").value = "";
          document.getElementById("receiptAgainstBill").innerHTML =
            "<option value=''>Select Bill</option>";
        }
      }

      function togglePaymentEntryType() {
        const val = document.getElementById("paymentEntryType").value;
        const fields = document.getElementById("paymentAgainstFields");
        fields.style.display = val === "against" ? "block" : "none";
        if (val !== "against") {
          document.getElementById("paymentVoucherType").value = "";
          document.getElementById("paymentAgainstBill").innerHTML =
            "<option value=''>Select Bill</option>";
        }
      }

      function onReceiptVoucherTypeChange() {
        const profileId = document.getElementById("receiptCompany").value;
        loadBillsForType(receiptCategory(), profileId, "receiptAgainstBill");
      }

      function onPaymentVoucherTypeChange() {
        const profileId = document.getElementById("paymentCompany").value;
        loadBillsForType(paymentCategory(), profileId, "paymentAgainstBill");
      }

      let companies = [];

      async function loadCompanies() {
        const res = await fetch("/api/profiles/list");
        companies = await res.json();
        const companyList = document.getElementById("companyList");
        const companyCount = document.getElementById("companyCount");
        const receiptCompany = document.getElementById("receiptCompany");
        const paymentCompany = document.getElementById("paymentCompany");

        const baseOption = `<option value="">Company</option>`;
        receiptCompany.innerHTML =
          baseOption +
          companies
            .map((c) => `<option value="${c.id}">${c.name}</option>`)
            .join("");
        paymentCompany.innerHTML = receiptCompany.innerHTML;

        companyCount.textContent = companies.length;
        if (!companies.length) {
          companyList.innerHTML =
            '<div class="company-empty">No company profiles created yet.</div>';
          return;
        }

        companyList.innerHTML = companies
          .map(
            (c) =>
              `<div class="company-card">${String(c.name || "").trim()}</div>`,
          )
          .join("");
      }

      function formatDateDDMMYYYY(value) {
        if (!value) return "";
        if (/^\d{4}-\d{2}-\d{2}/.test(value)) {
          const parts = value.substring(0, 10).split("-");
          return `${parts[2]}/${parts[1]}/${parts[0]}`;
        }
        const d = new Date(value);
        if (Number.isNaN(d.getTime())) return value;
        const day = String(d.getDate()).padStart(2, "0");
        const month = String(d.getMonth() + 1).padStart(2, "0");
        const year = d.getFullYear();
        return `${day}/${month}/${year}`;
      }

      async function loadBillsForType(
        voucherCategory,
        profileId,
        targetSelectId,
      ) {
        const sel = document.getElementById(targetSelectId);
        if (!profileId || !voucherCategory) {
          sel.innerHTML = `<option value="">Select Bill</option>`;
          return;
        }
        if (voucherCategory === "labour") {
          const res = await fetch(
            `/api/labour/list?profile_id=${profileId}&voucher_type=ISSUE%20VOUCHER`,
          );
          const bills = await res.json();
          const options =
            `<option value="">Select Bill</option>` +
            bills
              .filter((b) => b.issue_number)
              .map((b) => {
                const date = formatDateDDMMYYYY(b.date);
                const total =
                  b.total_value != null ? Number(b.total_value) : "";
                return `<option value="${b.issue_number}">${date}-${b.issue_number}-${total}</option>`;
              })
              .join("");
          sel.innerHTML = options;
          return;
        }

        const res = await fetch(
          `/api/vouchers/list?profile_id=${profileId}&voucher_type=Purchase`,
        );
        const bills = await res.json();
        const options =
          `<option value="">Select Bill</option>` +
          bills
            .filter((b) => b.bill_no)
            .map((b) => {
              const date = formatDateDDMMYYYY(b.date);
              const total = b.total_value != null ? Number(b.total_value) : "";
              return `<option value="${b.bill_no}">${date}-${b.bill_no}-${total}</option>`;
            })
            .join("");
        sel.innerHTML = options;
      }

      function setMessage(id, text, type) {
        const el = document.getElementById(id);
        el.textContent = text;
        el.className = `message ${type}`;
      }

      function clearReceiptForm() {
        document.getElementById("receiptEntryType").value = "";
        document.getElementById("receiptAgainstFields").style.display = "none";
        document.getElementById("receiptVoucherType").value = "";
        document.getElementById("receiptAgainstBill").innerHTML =
          "<option value=''>Select Bill</option>";
        document.getElementById("receiptDate").value = "";
        document.getElementById("receiptAmount").value = "";
        document.getElementById("receiptMop").value = "";
        document.getElementById("receiptMsg").className = "message";
      }
      function clearPaymentForm() {
        document.getElementById("paymentEntryType").value = "";
        document.getElementById("paymentAgainstFields").style.display = "none";
        document.getElementById("paymentVoucherType").value = "";
        document.getElementById("paymentAgainstBill").innerHTML =
          "<option value=''>Select Bill</option>";
        document.getElementById("paymentDate").value = "";
        document.getElementById("paymentAmount").value = "";
        document.getElementById("paymentMop").value = "";
        document.getElementById("paymentMsg").className = "message";
      }

      function receiptCategory() {
        const v = document.getElementById("receiptVoucherType").value;
        return v.toLowerCase().includes("labour") ? "labour" : "purchase";
      }
      function paymentCategory() {
        const v = document.getElementById("paymentVoucherType").value;
        return v.toLowerCase().includes("labour") ? "labour" : "purchase";
      }

      document
        .getElementById("receiptCompany")
        .addEventListener("change", (e) => {
          const cat = receiptCategory();
          if (cat) loadBillsForType(cat, e.target.value, "receiptAgainstBill");
          else
            document.getElementById("receiptAgainstBill").innerHTML =
              "<option value=''>Select Voucher Type First</option>";
        });
      document
        .getElementById("receiptVoucherType")
        .addEventListener("change", () => {
          const profileId = document.getElementById("receiptCompany").value;
          loadBillsForType(receiptCategory(), profileId, "receiptAgainstBill");
        });

      document
        .getElementById("paymentCompany")
        .addEventListener("change", (e) => {
          const cat = paymentCategory();
          if (cat) loadBillsForType(cat, e.target.value, "paymentAgainstBill");
          else
            document.getElementById("paymentAgainstBill").innerHTML =
              "<option value=''>Select Voucher Type First</option>";
        });
      document
        .getElementById("paymentVoucherType")
        .addEventListener("change", () => {
          const profileId = document.getElementById("paymentCompany").value;
          loadBillsForType(paymentCategory(), profileId, "paymentAgainstBill");
        });

      async function saveReceipt() {
        const profile_id = document.getElementById("receiptCompany").value;
        const voucher_type =
          document.getElementById("receiptVoucherType").value;
        const bill_no = document.getElementById("receiptAgainstBill").value;
        const date = document.getElementById("receiptDate").value;
        const amount = document.getElementById("receiptAmount").value;
        const mop = document.getElementById("receiptMop").value;

        if (!profile_id || !date || !amount || !mop) {
          setMessage("receiptMsg", "Please fill all receipt fields.", "error");
          return;
        }
        if (!voucher_type || !bill_no) {
          setMessage(
            "receiptMsg",
            "Please select voucher type and bill.",
            "error",
          );
          return;
        }

        const payload = {
          profile_id,
          voucher_type,
          date,
          bill_no,
          entry_type: "against",
          description: `Receipt via ${mop}`,
          total_value: amount,
        };

        const res = await fetch("/api/vouchers", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (data.id) {
          alert("Receipt Saved!");
          closeModal("receipt");
          clearReceiptForm();
        } else {
          setMessage(
            "receiptMsg",
            data.error || "Failed to save receipt.",
            "error",
          );
        }
      }

      async function savePayment() {
        const profile_id = document.getElementById("paymentCompany").value;
        const voucher_type =
          document.getElementById("paymentVoucherType").value;
        const bill_no = document.getElementById("paymentAgainstBill").value;
        const date = document.getElementById("paymentDate").value;
        const amount = document.getElementById("paymentAmount").value;
        const mop = document.getElementById("paymentMop").value;

        if (!profile_id || !date || !amount || !mop) {
          setMessage("paymentMsg", "Please fill all payment fields.", "error");
          return;
        }
        if (!voucher_type || !bill_no) {
          setMessage(
            "paymentMsg",
            "Please select voucher type and bill.",
            "error",
          );
          return;
        }

        const payload = {
          profile_id,
          voucher_type: voucher_type || "Payment Voucher",
          date,
          bill_no: bill_no || null,
          entry_type: "against",
          description: `Payment via ${mop}`,
          total_value: amount,
        };

        const res = await fetch("/api/vouchers", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (data.id) {
          alert("Payment Saved!");
          closeModal("payment");
          clearPaymentForm();
        } else {
          setMessage(
            "paymentMsg",
            data.error || "Failed to save payment.",
            "error",
          );
        }
      }

      loadCompanies();
      loadPendingVouchers();

      async function loadPendingVouchers() {
        try {
          const res = await fetch("/api/labour");
          const bills = await res.json();
          const issues = bills.filter(
            (b) => b.voucher_type === "ISSUE VOUCHER",
          );
          const receipts = bills.filter(
            (b) => b.voucher_type === "Receipt Voucher",
          );
          const closedSet = new Set(receipts.map((r) => r.issue_number));
          const pending = issues.filter((b) => !closedSet.has(b.issue_number));
          window._pendingVouchers = pending;
          renderPending(pending);
        } catch (e) {
          document.getElementById("pendingVoucherList").innerHTML =
            '<p style="color:red;">Error</p>';
        }
      }

      function renderPending(list) {
        const el = document.getElementById("pendingVoucherList");
        if (!list.length) {
          el.innerHTML =
            '<p style="text-align:center;color:#999;font-size:12px;">No pending vouchers</p>';
          return;
        }
        el.innerHTML = list
          .map(
            (b) => `
          <div style="padding:10px 12px;margin-bottom:6px;border-radius:10px;background:rgba(25,118,210,0.04);border:1px solid rgba(25,118,210,0.12);cursor:pointer;" onmouseover="this.style.borderColor='rgba(25,118,210,0.4)'" onmouseout="this.style.borderColor='rgba(25,118,210,0.12)'">
            <div style="font-weight:600;color:#1976d2;font-size:13px;">${b.issue_number || "-"}</div>
            <div style="font-size:11px;color:#666;margin-top:2px;">${b.company_name || "-"} · ${b.date ? new Date(b.date).toLocaleDateString() : "-"}</div>
          </div>
        `,
          )
          .join("");
      }

      function filterPending(q) {
        const all = window._pendingVouchers || [];
        const f = q.toLowerCase();
        renderPending(
          all.filter(
            (b) =>
              (b.issue_number || "").toLowerCase().includes(f) ||
              (b.company_name || "").toLowerCase().includes(f),
          ),
        );
      }
    </script>

    <iframe id="chittaiFrame" src="/chittai" style="display: none"></iframe>

    <div class="modal-backdrop" id="companyListBackdrop">
      <div class="modal" role="dialog" aria-modal="true">
        <div class="modal-header">
          <div class="modal-title">
            List of Companies &nbsp;<span
              class="company-count"
              id="companyCount"
              >0</span
            >
          </div>
          <button class="close-btn" onclick="closeCompanyListModal()">x</button>
        </div>
        <input
          type="text"
          id="companySearch"
          placeholder="Search companies..."
          style="
            width: 100%;
            padding: 10px 14px;
            margin-bottom: 14px;
            border: 1.5px solid rgba(25, 118, 210, 0.3);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            display: block;
            box-sizing: border-box;
          "
          oninput="filterCompanyList(this.value)"
        />
        <div
          class="company-list"
          id="companyList"
          style="max-height: 400px; overflow-y: auto"
        >
          <div class="company-empty">No company profiles created yet.</div>
        </div>
      </div>
    </div>
    <div class="modal-backdrop" id="chittaiBackdrop">
      <div
        class="modal"
        role="dialog"
        aria-modal="true"
        style="
          max-width: 640px;
          padding: 0;
          border-radius: 20px;
          overflow: hidden;
        "
      >
        <iframe
          src="/chittai"
          style="width: 100%; height: 620px; border: none; border-radius: 20px"
          id="chittaiIframe"
        ></iframe>
      </div>
    </div>

    <script>
      function openChittaiModal() {
        document.getElementById("chittaiBackdrop").classList.add("show");
      }
      function closeChittaiModal() {
        document.getElementById("chittaiBackdrop").classList.remove("show");
      }
      document
        .getElementById("chittaiBackdrop")
        .addEventListener("click", function (e) {
          if (e.target === this) closeChittaiModal();
        });
      function openCompanyListModal() {
        document.getElementById("companyListBackdrop").classList.add("show");
      }
      /*************  ✨ Windsurf Command ⭐  *************/
      /**
 * Close the company list modal and clear the search query.

/*******  0731cb41-0d51-4f39-b89b-cb591fa2eec7  *******/
      function closeCompanyListModal() {
        document.getElementById("companyListBackdrop").classList.remove("show");
        document.getElementById("companySearch").value = "";
        filterCompanyList("");
      }
      function filterCompanyList(query) {
        const q = query.toLowerCase();
        document
          .querySelectorAll("#companyList .company-card")
          .forEach((card) => {
            card.style.display = card.textContent.toLowerCase().includes(q)
              ? ""
              : "none";
          });
      }
      document
        .getElementById("companyListBackdrop")
        .addEventListener("click", function (e) {
          if (e.target === this) closeCompanyListModal();
        });
    </script>
  </body>
</html>
