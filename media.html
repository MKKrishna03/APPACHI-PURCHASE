<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        visibility: hidden;
      }
    </style>
    <title>Media - Purchase Bills</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
      :root {
        --bg: #f5f5f0;
        --surface: #ffffff;
        --surface-2: #f9f9f6;
        --surface-3: #f0efe9;
        --ink: #1a1a2e;
        --ink-2: #444466;
        --ink-3: #8888aa;
        --accent: #1d6fa4;
        --accent-2: #4da3d4;
        --accent-light: #dbeeff;
        --green: #2d6a4f;
        --green-light: #d8f3dc;
        --danger: #b5301e;
        --danger-light: #fce8e6;
        --amber: #b5620a;
        --amber-light: #fef0d6;
        --border: rgba(0, 0, 0, 0.08);
        --border-strong: rgba(0, 0, 0, 0.14);
        --radius: 10px;
        --radius-lg: 16px;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.06), 0 8px 24px rgba(0, 0, 0, 0.04);
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "DM Sans", system-ui, sans-serif;
        background: var(--bg);
        color: var(--ink);
        font-size: 14px;
        min-height: 100vh;
      }

      .topbar {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 14px 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .topbar-left {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: var(--ink-3);
      }
      .breadcrumb a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 500;
      }
      .page-title {
        font-size: 18px;
        font-weight: 700;
        color: var(--ink);
        letter-spacing: -0.3px;
      }

      .main {
        padding: 24px 28px;
        max-width: 1400px;
        margin: 0 auto;
      }

      .filters {
        display: flex;
        gap: 12px;
        align-items: flex-end;
        margin-bottom: 24px;
        flex-wrap: wrap;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 16px;
      }
      .filter-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .filter-group label {
        font-size: 10px;
        font-weight: 700;
        color: var(--ink-3);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .filters select,
      .filters input {
        padding: 8px 12px;
        border: 1px solid var(--border-strong);
        border-radius: var(--radius);
        background: var(--surface-2);
        color: var(--ink);
        font-size: 13px;
        font-family: inherit;
        min-width: 160px;
      }
      .filters select:focus,
      .filters input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(29, 111, 164, 0.1);
      }

      .btn {
        padding: 9px 16px;
        border: none;
        border-radius: var(--radius);
        font-family: inherit;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .btn-primary {
        background: var(--accent);
        color: #fff;
        box-shadow: 0 2px 8px rgba(29, 111, 164, 0.2);
      }
      .btn-primary:hover {
        background: #155a84;
      }
      .btn-secondary {
        background: var(--surface-2);
        color: var(--ink-2);
        border: 1px solid var(--border-strong);
      }
      .btn-secondary:hover {
        background: var(--surface-3);
      }
      .btn-danger {
        background: var(--danger-light);
        color: var(--danger);
        border: 1px solid #f09898;
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .summary-bar {
        display: flex;
        gap: 14px;
        margin-bottom: 18px;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
      }
      .count-pill {
        padding: 6px 14px;
        background: var(--accent-light);
        color: var(--accent);
        border-radius: 99px;
        font-size: 12px;
        font-weight: 700;
      }
      .actions-bar {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 16px;
      }

      .photo-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        overflow: hidden;
        cursor: pointer;
        transition: all 0.2s;
        position: relative;
        box-shadow: var(--shadow);
      }
      .photo-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
      }
      .photo-card.selected {
        outline: 3px solid var(--accent);
        outline-offset: -3px;
      }
      .photo-thumb {
        width: 100%;
        aspect-ratio: 1;
        object-fit: cover;
        background: var(--surface-3);
        display: block;
      }
      .photo-no-img {
        width: 100%;
        aspect-ratio: 1;
        background: var(--surface-3);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--ink-3);
        font-size: 32px;
      }
      .photo-info {
        padding: 10px 12px;
        border-top: 1px solid var(--border);
      }
      .photo-bill {
        font-family: "DM Mono", monospace;
        font-size: 11px;
        font-weight: 700;
        color: var(--accent);
        margin-bottom: 3px;
      }
      .photo-company {
        font-size: 12px;
        font-weight: 600;
        color: var(--ink);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .photo-date {
        font-size: 11px;
        color: var(--ink-3);
        margin-top: 2px;
      }
      .photo-checkbox {
        position: absolute;
        top: 8px;
        left: 8px;
        width: 22px;
        height: 22px;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.95);
        border: 2px solid var(--border-strong);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-weight: 700;
        color: transparent;
        transition: all 0.15s;
        z-index: 5;
      }
      .photo-card.selected .photo-checkbox {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }

      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--ink-3);
        font-size: 14px;
        background: var(--surface);
        border: 1px dashed var(--border-strong);
        border-radius: var(--radius-lg);
      }
      .empty-icon {
        font-size: 48px;
        margin-bottom: 12px;
        opacity: 0.4;
      }

      /* Lightbox modal */
      .lightbox {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(4px);
        z-index: 999;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .lightbox.show {
        display: flex;
      }
      .lightbox-content {
        background: var(--surface);
        border-radius: var(--radius-lg);
        max-width: 900px;
        width: 100%;
        max-height: 90vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .lightbox-header {
        padding: 14px 20px;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .lightbox-title {
        font-size: 14px;
        font-weight: 700;
        color: var(--ink);
      }
      .lightbox-sub {
        font-size: 12px;
        color: var(--ink-3);
        margin-top: 2px;
      }
      .lightbox-close {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 22px;
        color: var(--ink-3);
        width: 32px;
        height: 32px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .lightbox-close:hover {
        background: var(--surface-2);
        color: var(--ink);
      }
      .lightbox-body {
        flex: 1;
        overflow: auto;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: var(--surface-3);
      }
      .lightbox-body img {
        max-width: 100%;
        max-height: 70vh;
        border-radius: 8px;
      }
      .lightbox-footer {
        padding: 12px 20px;
        border-top: 1px solid var(--border);
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        flex-wrap: wrap;
      }

      /* Retake QR modal */
      .qr-modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1000;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .qr-modal.show {
        display: flex;
      }
      .qr-box {
        background: var(--surface);
        border-radius: var(--radius-lg);
        padding: 24px;
        max-width: 380px;
        width: 100%;
        text-align: center;
      }
      .qr-box h3 {
        font-size: 16px;
        margin-bottom: 8px;
      }
      .qr-box p {
        font-size: 13px;
        color: var(--ink-3);
        margin-bottom: 16px;
      }
      #retakeQrCode {
        display: inline-block;
        background: #fff;
        padding: 10px;
        border-radius: 8px;
      }
      #retakeStatus {
        font-size: 13px;
        color: var(--accent);
        font-weight: 600;
        margin-top: 12px;
      }

      .toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        background: var(--ink);
        color: #fff;
        padding: 12px 20px;
        border-radius: var(--radius);
        font-size: 13px;
        font-weight: 500;
        z-index: 9999;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        opacity: 0;
        transform: translateY(20px);
        transition: all 0.25s;
      }
      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }
      .toast.success {
        background: var(--green);
      }
      .toast.error {
        background: var(--danger);
      }

      .folder-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 16px;
      }
      .folder-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 20px 16px;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        box-shadow: var(--shadow);
        text-align: center;
      }
      .folder-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        border-color: var(--accent);
      }
      .folder-icon {
        font-size: 44px;
        line-height: 1;
      }
      .folder-name {
        font-size: 13px;
        font-weight: 700;
        color: var(--ink);
      }
      .folder-count {
        font-size: 11px;
        color: var(--ink-3);
        font-weight: 500;
      }
      .folder-card.type-purchase {
        border-top: 3px solid var(--accent);
      }
      .folder-card.type-labour {
        border-top: 3px solid var(--green);
      }
      .folder-card.type-hallmark {
        border-top: 3px solid var(--amber);
      }
      .folder-card.type-chittai {
        border-top: 3px solid #9b59b6;
      }
      .folder-card.type-expense {
        border-top: 3px solid var(--danger);
      }
      .folder-card.type-other {
        border-top: 3px solid var(--ink-3);
      }

      .nav-crumb {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 5px 12px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 99px;
        font-size: 12px;
        font-weight: 600;
        color: var(--accent);
        cursor: pointer;
        transition: all 0.15s;
      }
      .nav-crumb:hover {
        background: var(--accent-light);
      }
      .nav-crumb.active {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
        cursor: default;
      }
      .nav-sep {
        color: var(--ink-3);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div class="topbar-left">
        <div class="breadcrumb">
          <a href="/dashboard">Dashboard</a><span>/</span><span>Media</span>
        </div>
        <div class="page-title">📸 Bill Photos</div>
      </div>
      <button
        class="btn btn-secondary"
        onclick="window.location.href = '/purchase'"
      >
        ＋ New Purchase
      </button>
    </div>

    <div class="main">
      <!-- Filters -->
      <div class="filters">
        <div class="filter-group">
          <label>Company</label>
          <select id="filterCompany" onchange="applyFilters()">
            <option value="">All Companies</option>
          </select>
        </div>
        <div class="filter-group">
          <label>From Date</label>
          <input type="date" id="filterFrom" onchange="applyFilters()" />
        </div>
        <div class="filter-group">
          <label>To Date</label>
          <input type="date" id="filterTo" onchange="applyFilters()" />
        </div>
        <div class="filter-group">
          <label>Quick Range</label>
          <select id="filterQuick" onchange="applyQuickRange(this.value)">
            <option value="">— Pick —</option>
            <option value="today">Today</option>
            <option value="7">Last 7 Days</option>
            <option value="30">Last 30 Days</option>
            <option value="month">This Month</option>
            <option value="lastmonth">Last Month</option>
            <option value="finyear">This Fin Year</option>
            <option value="all">All Time</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Folder</label>
          <select id="filterFolder" onchange="applyFilters()">
            <option value="">All Folders</option>
            <option value="purchase_bills">Purchase Bills</option>
            <option value="chittai_bills">Chittai Bills</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Accounted</label>
          <select id="filterAccounted" onchange="applyFilters()">
            <option value="">All</option>
            <option value="no">Non-Accounted</option>
            <option value="yes">Accounted</option>
          </select>
        </div>
        <button class="btn btn-secondary" onclick="clearFilters()">
          Clear
        </button>
      </div>

      <!-- Summary + Actions -->
      <div class="summary-bar">
        <div style="display: flex; gap: 10px; align-items: center">
          <span class="count-pill" id="countPill">0 photos</span>
          <span
            id="selectedPill"
            style="
              display: none;
              padding: 6px 14px;
              background: var(--green-light);
              color: var(--green);
              border-radius: 99px;
              font-size: 12px;
              font-weight: 700;
            "
          ></span>
        </div>
        <div class="actions-bar">
          <button
            class="btn btn-secondary"
            onclick="toggleSelectAll()"
            id="selectAllBtn"
          >
            Select All
          </button>
          <label
            style="
              display: inline-flex;
              align-items: center;
              gap: 6px;
              font-size: 13px;
              font-weight: 600;
              color: var(--ink-2);
              cursor: pointer;
              padding: 9px 4px;
            "
          >
            <input
              type="checkbox"
              id="markAccountedChk"
              style="width: 16px; height: 16px; cursor: pointer"
            />
            Mark as Accounted on Download
          </label>
          <button
            class="btn btn-primary"
            onclick="downloadSelected('jpg')"
            id="dlJpgBtn"
            disabled
          >
            ⬇ Download JPGs (ZIP)
          </button>
          <button
            class="btn btn-primary"
            onclick="downloadSelected('pdf')"
            id="dlPdfBtn"
            disabled
          >
            📄 Download Combined PDF
          </button>
          <button
            class="btn btn-danger"
            onclick="deleteUnlinked()"
            id="deleteUnlinkedBtn"
          >
            🗑 Delete Unlinked from Cloudinary
          </button>
        </div>
      </div>

      <!-- Breadcrumb Nav -->
      <div
        id="folderNav"
        style="
          display: flex;
          align-items: center;
          gap: 6px;
          margin-bottom: 16px;
          flex-wrap: wrap;
        "
      ></div>

      <!-- Gallery -->
      <div id="galleryContainer">
        <div class="empty-state">
          <div class="empty-icon">📸</div>
          <div>Loading bill photos...</div>
        </div>
      </div>
    </div>

    <!-- Lightbox -->
    <div
      class="lightbox"
      id="lightbox"
      onclick="if (event.target === this) closeLightbox();"
    >
      <div class="lightbox-content">
        <div class="lightbox-header">
          <div>
            <div class="lightbox-title" id="lbTitle">Bill Photo</div>
            <div class="lightbox-sub" id="lbSub">—</div>
          </div>
          <button class="lightbox-close" onclick="closeLightbox()">✕</button>
        </div>
        <div class="lightbox-body">
          <img id="lbImg" src="" alt="Bill" />
        </div>
        <div class="lightbox-footer">
          <button class="btn btn-secondary" onclick="downloadSingle()">
            ⬇ Download JPG
          </button>
          <button class="btn btn-secondary" onclick="downloadSinglePdf()">
            📄 Download PDF
          </button>
          <button class="btn btn-primary" onclick="startRetake()">
            🔄 Retake from Phone
          </button>
        </div>
      </div>
    </div>

    <!-- Retake QR Modal -->
    <div
      class="qr-modal"
      id="qrModal"
      onclick="if (event.target === this) closeQrModal();"
    >
      <div class="qr-box">
        <h3>📱 Scan with Phone</h3>
        <p>
          Open the QR with your phone camera, snap a new photo, and it will
          replace the current one.
        </p>
        <div id="retakeQrCode"></div>
        <div id="retakeStatus">Waiting for upload...</div>
        <button
          class="btn btn-secondary"
          onclick="closeQrModal()"
          style="margin-top: 14px"
        >
          Cancel
        </button>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      (function () {
        const exp = localStorage.getItem("auth_exp");
        const user =
          localStorage.getItem("auth_user") ||
          sessionStorage.getItem("auth_user");
        if (!user || (exp && Date.now() >= parseInt(exp))) {
          window.location.replace("/login");
        } else {
          document.body.style.visibility = "visible";
        }
      })();

      let allPurchases = [];
      let companies = [];
      let filtered = [];
      let selected = new Set();
      let currentLightbox = null;
      let retakePollInterval = null;
      let retakeToken = null;
      let retakePurchaseId = null;

      // ── FOLDER NAV STATE ──
      // level: 'year' | 'month' | 'type' | 'photos'
      let navYear = null;
      let navMonth = null;
      let navType = null;
      let currentLevel = "year";

      function showToast(msg, type = "success") {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.className = "toast " + type + " show";
        setTimeout(() => t.classList.remove("show"), 2500);
      }

      async function loadCompanies() {
        const res = await fetch("/api/profile/all");
        companies = await res.json();
        const sel = document.getElementById("filterCompany");
        sel.innerHTML =
          '<option value="">All Companies</option>' +
          companies
            .map(
              (c) => `<option value="${c.id}">${c.alias || c.company}</option>`,
            )
            .join("");
      }

      async function loadAllPurchases() {
        try {
          document.getElementById("galleryContainer").innerHTML =
            `<div class="empty-state"><div class="empty-icon">⏳</div><div>Loading all photos from Cloudinary...</div></div>`;

          const [cloudinaryRes, purchasesRes, labourRes] = await Promise.all([
            fetch("/api/cloudinary/all-photos"),
            fetch("/api/purchases/list"),
            fetch("/api/labour"),
          ]);

          const cloudinaryPhotos = cloudinaryRes.ok
            ? await cloudinaryRes.json()
            : [];
          const purchases = purchasesRes.ok ? await purchasesRes.json() : [];
          const labour = labourRes.ok ? await labourRes.json() : [];

          // Extract public_id from a Cloudinary URL
          function extractPublicId(url) {
            if (!url) return null;
            try {
              // Remove query params
              const clean = url.split("?")[0];
              // Match everything after /upload/ and strip version (v1234567/)
              const match = clean.match(/\/upload\/(?:v\d+\/)?(.+)$/);
              if (match) {
                // Remove file extension for images
                return match[1].replace(/\.[^/.]+$/, "");
              }
              return null;
            } catch (e) {
              return null;
            }
          }

          // Build lookup maps by public_id (most reliable) AND by url (fallback)
          const purchaseByPublicId = {};
          const purchaseByUrl = {};
          purchases.forEach((p) => {
            if (p.photo_url) {
              purchaseByUrl[p.photo_url] = p;
              const pid = extractPublicId(p.photo_url);
              if (pid) purchaseByPublicId[pid] = p;
            }
          });

          const labourByPublicId = {};
          const labourByUrl = {};
          labour.forEach((l) => {
            if (l.photo_url) {
              labourByUrl[l.photo_url] = l;
              const pid = extractPublicId(l.photo_url);
              if (pid) labourByPublicId[pid] = l;
            }
          });

          allPurchases = cloudinaryPhotos.map((item) => {
            // Try matching by public_id first, then by full URL
            const dbPurchase =
              purchaseByPublicId[item.public_id] ||
              purchaseByUrl[item.url] ||
              purchaseByPublicId[item.public_id.replace(/\.[^/.]+$/, "")];

            const dbLabour =
              labourByPublicId[item.public_id] ||
              labourByUrl[item.url] ||
              labourByPublicId[item.public_id.replace(/\.[^/.]+$/, "")];

            const dbRecord = dbPurchase || dbLabour;

            // If matched to labour, use labour bill_no
            let bill_no = item.public_id.split("/").pop();
            if (dbPurchase) bill_no = dbPurchase.bill_no;
            else if (dbLabour)
              bill_no = dbLabour.receipt_bill_no || dbLabour.issue_number;

            return {
              id: item.public_id,
              public_id: item.public_id,
              profile_id: dbRecord ? dbRecord.profile_id : null,
              bill_no,
              date: dbRecord ? dbRecord.date : item.created_at,
              photo_url: item.url,
              is_accounted: dbPurchase
                ? dbPurchase.is_accounted
                : dbLabour
                  ? dbLabour.is_accounted
                  : false,
              folder: item.folder,
              is_pdf: item.is_pdf || false,
              bytes: item.bytes,
              _dbId: dbPurchase ? dbPurchase.id : null,
              _labourDbId: dbLabour ? dbLabour.id : null,
              _isLabour: !!dbLabour && !dbPurchase,
              _labourRecord: dbLabour || null,
              _matched: !!dbRecord,
            };
          });

          applyFilters();
        } catch (e) {
          document.getElementById("galleryContainer").innerHTML =
            `<div class="empty-state" style="color:var(--danger);">Error loading photos: ${e.message}</div>`;
        }
      }

      // ── TYPE DETECTION ──
      // ── TYPE DETECTION ──
      function detectType(item) {
        // Chittai folder = always chittai
        if (item.folder === "chittai_bills") return "chittai";

        // Labour matched from DB (receipt voucher)
        if (item._isLabour) return "labour";

        // Check if matched DB record is a labour receipt
        if (item._labourRecord) {
          const vtype = (item._labourRecord.voucher_type || "").toLowerCase();
          if (vtype.includes("receipt")) return "labour";
        }

        // Hallmark: check bill_no or public_id
        const pid = (item.public_id || "").toLowerCase();
        const bill = (item.bill_no || "").toLowerCase();
        if (pid.includes("hallmark") || bill.includes("hallmark"))
          return "hallmark";

        // Has a DB purchase record = purchase
        if (item._dbId) return "purchase";

        // In purchase_bills folder but no DB match = unlinked, still show as purchase
        if (item.folder === "purchase_bills") return "purchase";

        return "other";
      }

      const TYPE_META = {
        purchase: { label: "Purchase Bills", icon: "🧾", cls: "type-purchase" },
        labour: { label: "Labour / Receipt", icon: "👷", cls: "type-labour" },
        hallmark: { label: "Hallmark", icon: "🔖", cls: "type-hallmark" },
        chittai: { label: "Chittai", icon: "🔗", cls: "type-chittai" },
        expense: { label: "Expenses", icon: "💸", cls: "type-expense" },
        other: { label: "Other", icon: "📁", cls: "type-other" },
      };

      const MONTHS = [
        "January",
        "February",
        "March",
        "April",
        "May",
        "June",
        "July",
        "August",
        "September",
        "October",
        "November",
        "December",
      ];

      function getItemDate(p) {
        const raw = p.date || p.created_at;
        if (!raw) return null;
        return new Date(raw);
      }

      function applyFilters() {
        const company = document.getElementById("filterCompany").value;
        const from = document.getElementById("filterFrom").value;
        const to = document.getElementById("filterTo").value;
        const accounted = document.getElementById("filterAccounted").value;
        const folderFilter = document.getElementById("filterFolder")
          ? document.getElementById("filterFolder").value
          : "";

        filtered = allPurchases.filter((p) => {
          if (company && String(p.profile_id) !== String(company)) return false;
          if (from || to) {
            if (!p.date) return false;
            const d = p.date.slice(0, 10);
            if (from && d < from) return false;
            if (to && d > to) return false;
          }
          if (accounted === "yes" && !p.is_accounted) return false;
          if (accounted === "no" && p.is_accounted) return false;
          if (folderFilter && p.folder !== folderFilter) return false;
          return true;
        });

        filtered.sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));

        // Reset nav to top level when filters change
        navYear = null;
        navMonth = null;
        navType = null;
        currentLevel = "year";
        renderFolderView();
      }

      function applyQuickRange(val) {
        if (!val) return;
        const now = new Date();
        const pad = (n) => String(n).padStart(2, "0");
        const fmt = (d) =>
          `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
        let from = "",
          to = fmt(now);

        if (val === "today") from = fmt(now);
        else if (val === "7") {
          const d = new Date(now);
          d.setDate(d.getDate() - 6);
          from = fmt(d);
        } else if (val === "30") {
          const d = new Date(now);
          d.setDate(d.getDate() - 29);
          from = fmt(d);
        } else if (val === "month")
          from = fmt(new Date(now.getFullYear(), now.getMonth(), 1));
        else if (val === "lastmonth") {
          from = fmt(new Date(now.getFullYear(), now.getMonth() - 1, 1));
          to = fmt(new Date(now.getFullYear(), now.getMonth(), 0));
        } else if (val === "finyear") {
          const y =
            now.getMonth() >= 3 ? now.getFullYear() : now.getFullYear() - 1;
          from = `${y}-04-01`;
          to = `${y + 1}-03-31`;
        } else if (val === "all") {
          from = "";
          to = "";
        }

        document.getElementById("filterFrom").value = from;
        document.getElementById("filterTo").value = to;
        applyFilters();
      }

      function clearFilters() {
        document.getElementById("filterCompany").value = "";
        document.getElementById("filterFrom").value = "";
        document.getElementById("filterTo").value = "";
        document.getElementById("filterQuick").value = "";
        document.getElementById("filterAccounted").value = "";
        const ff = document.getElementById("filterFolder");
        if (ff) ff.value = "";
        applyFilters();
      }

      function getCompanyName(profileId) {
        const c = companies.find((x) => String(x.id) === String(profileId));
        return c ? c.alias || c.company : "—";
      }

      function fmtDate(d) {
        if (!d) return "—";
        const dt = new Date(d);
        return `${String(dt.getDate()).padStart(2, "0")}/${String(dt.getMonth() + 1).padStart(2, "0")}/${dt.getFullYear()}`;
      }

      // ── FOLDER VIEW RENDERER ──
      function renderFolderView() {
        updateBreadcrumb();
        const container = document.getElementById("galleryContainer");

        if (currentLevel === "year") {
          renderYearFolders(container);
        } else if (currentLevel === "month") {
          renderMonthFolders(container);
        } else if (currentLevel === "type") {
          renderTypeFolders(container);
        } else {
          renderGallery(container);
        }
      }

      function getFilteredForLevel() {
        return filtered.filter((p) => {
          const d = getItemDate(p);
          if (navYear !== null && (!d || d.getFullYear() !== navYear))
            return false;
          if (navMonth !== null && (!d || d.getMonth() !== navMonth))
            return false;
          if (navType !== null && detectType(p) !== navType) return false;
          return true;
        });
      }

      function renderYearFolders(container) {
        const yearMap = {};
        filtered.forEach((p) => {
          const d = getItemDate(p);
          const y = d ? d.getFullYear() : 0;
          yearMap[y] = (yearMap[y] || 0) + 1;
        });

        const years = Object.keys(yearMap).sort((a, b) => b - a);
        document.getElementById("countPill").textContent =
          `${years.length} year${years.length !== 1 ? "s" : ""}`;
        updateSelectedPill();

        if (!years.length) {
          container.innerHTML = `<div class="empty-state"><div class="empty-icon">🤷</div><div>No photos match your filters</div></div>`;
          return;
        }

        container.innerHTML = `<div class="folder-grid">${years
          .map(
            (y) => `
          <div class="folder-card" onclick="drillYear(${y})">
            <div class="folder-icon">📅</div>
            <div class="folder-name">${y == 0 ? "Unknown Date" : y}</div>
            <div class="folder-count">${yearMap[y]} photo${yearMap[y] !== 1 ? "s" : ""}</div>
          </div>`,
          )
          .join("")}</div>`;
      }

      function renderMonthFolders(container) {
        const monthMap = {};
        filtered
          .filter((p) => {
            const d = getItemDate(p);
            return d && d.getFullYear() === navYear;
          })
          .forEach((p) => {
            const d = getItemDate(p);
            const m = d.getMonth();
            monthMap[m] = (monthMap[m] || 0) + 1;
          });

        const months = Object.keys(monthMap).sort((a, b) => b - a);
        document.getElementById("countPill").textContent =
          `${months.length} month${months.length !== 1 ? "s" : ""}`;
        updateSelectedPill();

        container.innerHTML = `<div class="folder-grid">${months
          .map(
            (m) => `
          <div class="folder-card" onclick="drillMonth(${m})">
            <div class="folder-icon">🗓</div>
            <div class="folder-name">${MONTHS[m]}</div>
            <div class="folder-count">${monthMap[m]} photo${monthMap[m] !== 1 ? "s" : ""}</div>
          </div>`,
          )
          .join("")}</div>`;
      }

      function renderTypeFolders(container) {
        const typeMap = {};
        filtered
          .filter((p) => {
            const d = getItemDate(p);
            return (
              d && d.getFullYear() === navYear && d.getMonth() === navMonth
            );
          })
          .forEach((p) => {
            const t = detectType(p);
            typeMap[t] = (typeMap[t] || 0) + 1;
          });

        const types = Object.keys(typeMap);
        document.getElementById("countPill").textContent =
          `${types.length} type${types.length !== 1 ? "s" : ""}`;
        updateSelectedPill();

        container.innerHTML = `<div class="folder-grid">${types
          .map((t) => {
            const meta = TYPE_META[t] || TYPE_META.other;
            return `<div class="folder-card ${meta.cls}" onclick="drillType('${t}')">
            <div class="folder-icon">${meta.icon}</div>
            <div class="folder-name">${meta.label}</div>
            <div class="folder-count">${typeMap[t]} photo${typeMap[t] !== 1 ? "s" : ""}</div>
          </div>`;
          })
          .join("")}</div>`;
      }

      function renderGallery(container) {
        const items = getFilteredForLevel();
        document.getElementById("countPill").textContent =
          `${items.length} photo${items.length !== 1 ? "s" : ""}`;
        updateSelectedPill();

        if (!items.length) {
          container.innerHTML = `<div class="empty-state"><div class="empty-icon">🤷</div><div>No photos here</div></div>`;
          return;
        }

        container.innerHTML = `<div class="gallery">${items
          .map((p) => {
            const isSel = selected.has(String(p.id));
            const t = detectType(p);
            const meta = TYPE_META[t] || TYPE_META.other;
            const thumb = p.is_pdf
              ? `<div class="photo-no-img" style="background:#fef0d6;color:var(--amber);font-size:40px;">📄</div>`
              : `<img class="photo-thumb" src="${p.photo_url}" alt="Bill" loading="lazy" onerror="this.outerHTML='<div class=\\'photo-no-img\\'>📷</div>'" />`;
            return `<div class="photo-card ${isSel ? "selected" : ""}" onclick="openLightbox('${p.id}')">
            <div class="photo-checkbox" onclick="event.stopPropagation();toggleSelect('${p.id}')">${isSel ? "✓" : ""}</div>
            ${thumb}
            <div class="photo-info">
              <div class="photo-bill">${p.bill_no || "—"}</div>
              <div class="photo-company">${getCompanyName(p.profile_id) || "—"}</div>
              <div class="photo-date">${fmtDate(p.date)}</div>
              <div style="margin-top:4px;font-size:10px;font-weight:700;color:var(--ink-3);">${meta.icon} ${meta.label}</div>
              ${!p._matched ? `<div style="margin-top:2px;font-size:10px;font-weight:700;color:var(--ink-3);background:var(--surface-3);border-radius:4px;padding:2px 6px;display:inline-block;">⚠ No DB record</div>` : ""}
              ${p.is_accounted ? `<div style="margin-top:2px;font-size:10px;font-weight:700;color:var(--green);background:var(--green-light);border-radius:4px;padding:2px 6px;display:inline-block;">✓ ACCOUNTED</div>` : ""}
            </div>
          </div>`;
          })
          .join("")}</div>`;
      }

      // ── DRILL DOWN ──
      function drillYear(y) {
        navYear = parseInt(y);
        navMonth = null;
        navType = null;
        currentLevel = "month";
        renderFolderView();
      }

      function drillMonth(m) {
        navMonth = parseInt(m);
        navType = null;
        currentLevel = "type";
        renderFolderView();
      }

      function drillType(t) {
        navType = t;
        currentLevel = "photos";
        renderFolderView();
      }

      function navTo(level) {
        if (level === "year") {
          navYear = null;
          navMonth = null;
          navType = null;
          currentLevel = "year";
        } else if (level === "month") {
          navMonth = null;
          navType = null;
          currentLevel = "month";
        } else if (level === "type") {
          navType = null;
          currentLevel = "type";
        }
        renderFolderView();
      }

      // ── BREADCRUMB ──
      function updateBreadcrumb() {
        const nav = document.getElementById("folderNav");
        const crumbs = [];

        crumbs.push({
          label: "📁 All Years",
          level: "year",
          active: currentLevel === "year",
        });
        if (navYear !== null)
          crumbs.push({
            label: `📅 ${navYear}`,
            level: "month",
            active: currentLevel === "month",
          });
        if (navMonth !== null)
          crumbs.push({
            label: `🗓 ${MONTHS[navMonth]}`,
            level: "type",
            active: currentLevel === "type",
          });
        if (navType !== null) {
          const meta = TYPE_META[navType] || TYPE_META.other;
          crumbs.push({
            label: `${meta.icon} ${meta.label}`,
            level: "photos",
            active: currentLevel === "photos",
          });
        }

        nav.innerHTML = crumbs
          .map(
            (c, i) => `
          ${i > 0 ? `<span class="nav-sep">›</span>` : ""}
          <span class="nav-crumb ${c.active ? "active" : ""}" onclick="${c.active ? "" : `navTo('${c.level}')`}">${c.label}</span>
        `,
          )
          .join("");
      }

      function toggleSelect(id) {
        id = String(id);
        if (selected.has(id)) selected.delete(id);
        else selected.add(id);
        renderGallery(document.getElementById("galleryContainer"));
      }

      function toggleSelectAll() {
        const items = getFilteredForLevel();
        if (selected.size === items.length && items.length > 0) {
          selected.clear();
        } else {
          items.forEach((p) => selected.add(String(p.id)));
        }
        renderGallery(document.getElementById("galleryContainer"));
      }

      function updateSelectedPill() {
        const pill = document.getElementById("selectedPill");
        const dlJpg = document.getElementById("dlJpgBtn");
        const dlPdf = document.getElementById("dlPdfBtn");
        const selBtn = document.getElementById("selectAllBtn");
        if (selected.size > 0) {
          pill.textContent = `${selected.size} selected`;
          pill.style.display = "inline-block";
          dlJpg.disabled = false;
          dlPdf.disabled = false;
        } else {
          pill.style.display = "none";
          dlJpg.disabled = true;
          dlPdf.disabled = true;
        }
        selBtn.textContent =
          selected.size === filtered.length && filtered.length > 0
            ? "Unselect All"
            : "Select All";
      }

      // ── LIGHTBOX ──
      function openLightbox(id) {
        id = String(id);
        const p = filtered.find((x) => String(x.id) === id);
        if (!p) return;
        currentLightbox = p;
        document.getElementById("lbTitle").textContent =
          `Bill: ${p.bill_no || "—"}`;
        document.getElementById("lbSub").textContent =
          `${getCompanyName(p.profile_id)} · ${fmtDate(p.date)}`;
        document.getElementById("lbImg").src = p.photo_url;
        document.getElementById("lightbox").classList.add("show");
      }
      function closeLightbox() {
        document.getElementById("lightbox").classList.remove("show");
        currentLightbox = null;
      }

      // ── DOWNLOAD ──
      async function fetchAsBlob(url) {
        const r = await fetch(url);
        if (!r.ok) throw new Error("Fetch failed");
        return await r.blob();
      }

      function downloadBlob(blob, filename) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      }

      async function downloadSingle() {
        if (!currentLightbox) return;
        try {
          showToast("Downloading...");
          const blob = await fetchAsBlob(currentLightbox.photo_url);
          const ext = (currentLightbox.photo_url.match(/\.(\w+)(?:\?|$)/) || [
            ,
            "jpg",
          ])[1];
          downloadBlob(blob, `${currentLightbox.bill_no || "bill"}.${ext}`);
        } catch (e) {
          showToast("Download failed", "error");
        }
      }

      async function downloadSinglePdf() {
        if (!currentLightbox) return;
        try {
          showToast("Generating PDF...");
          await generatePdf(
            [currentLightbox],
            `${currentLightbox.bill_no || "bill"}.pdf`,
          );
        } catch (e) {
          showToast("PDF failed", "error");
        }
      }

      async function markItemsAccounted(items) {
        const chk = document.getElementById("markAccountedChk");
        if (!chk.checked) return;
        for (const p of items) {
          try {
            let success = false;
            if (p._dbId) {
              const res = await fetch(`/api/purchases/${p._dbId}/accounted`, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ is_accounted: true }),
              });
              success = res.ok;
            } else if (p._labourDbId) {
              const res = await fetch(
                `/api/labour/${p._labourDbId}/accounted`,
                {
                  method: "PATCH",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ is_accounted: true }),
                },
              );
              success = res.ok;
            }
            if (success) {
              // Update both the item reference AND the allPurchases master array
              p.is_accounted = true;
              const masterItem = allPurchases.find((x) => x.id === p.id);
              if (masterItem) masterItem.is_accounted = true;
            }
          } catch (e) {
            console.error("markAccounted error:", e);
          }
        }
        renderGallery(document.getElementById("galleryContainer"));
      }

      async function downloadSelected(type) {
        const items = getFilteredForLevel().filter((p) =>
          selected.has(String(p.id)),
        );
        if (!items.length) return;

        if (type === "jpg") {
          showToast(`Downloading ${items.length} photos...`);
          for (let i = 0; i < items.length; i++) {
            const p = items[i];
            try {
              const blob = await fetchAsBlob(p.photo_url);
              const ext = (p.photo_url.match(/\.(\w+)(?:\?|$)/) || [
                ,
                "jpg",
              ])[1];
              const company = getCompanyName(p.profile_id).replace(
                /[^a-z0-9]/gi,
                "_",
              );
              downloadBlob(blob, `${company}_${p.bill_no || p.id}.${ext}`);
              await new Promise((r) => setTimeout(r, 200));
            } catch (e) {}
          }
          await markItemsAccounted(items);
          showToast(`Downloaded ${items.length} photos`, "success");
        } else if (type === "pdf") {
          showToast(`Generating PDF (${items.length} photos)...`);
          try {
            await generatePdf(
              items,
              `bill_photos_${new Date().toISOString().slice(0, 10)}.pdf`,
            );
          } catch (e) {
            showToast("PDF generation failed: " + e.message, "error");
          }
          await markItemsAccounted(items);
        }
      }

      async function generatePdf(items, filename) {
        try {
          const { jsPDF } = window.jspdf;
          const pdf = new jsPDF("p", "mm", "a4");
          const pageW = pdf.internal.pageSize.getWidth();
          const pageH = pdf.internal.pageSize.getHeight();
          const margin = 10;

          for (let i = 0; i < items.length; i++) {
            const p = items[i];
            try {
              const dataUrl = await imgToDataUrl(p.photo_url);
              if (i > 0) pdf.addPage();

              // Header
              pdf.setFontSize(11);
              pdf.setFont(undefined, "bold");
              pdf.text(`Bill: ${p.bill_no || "—"}`, margin, margin + 4);
              pdf.setFontSize(9);
              pdf.setFont(undefined, "normal");
              pdf.setTextColor(100);
              pdf.text(
                `${getCompanyName(p.profile_id)}  ·  ${fmtDate(p.date)}`,
                margin,
                margin + 9,
              );
              pdf.setTextColor(0);

              // Image — fit within page minus margins+header
              const img = new Image();
              await new Promise((res, rej) => {
                img.onload = res;
                img.onerror = rej;
                img.src = dataUrl;
              });
              const maxW = pageW - margin * 2;
              const maxH = pageH - margin * 2 - 14;
              let w = img.width,
                h = img.height;
              const ratio = Math.min(maxW / w, maxH / h);
              w = w * ratio;
              h = h * ratio;
              const x = (pageW - w) / 2;
              const y = margin + 14;
              pdf.addImage(dataUrl, "JPEG", x, y, w, h);
            } catch (e) {
              console.error("PDF page failed", e);
            }
          }
          pdf.save(filename);
          showToast("PDF downloaded", "success");
        } catch (e) {
          console.error(e);
          showToast("PDF generation failed", "error");
        }
      }

      function imgToDataUrl(url) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.crossOrigin = "anonymous";
          img.onload = () => {
            const canvas = document.createElement("canvas");
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            canvas.getContext("2d").drawImage(img, 0, 0);
            resolve(canvas.toDataURL("image/jpeg", 0.85));
          };
          img.onerror = reject;
          img.src = url;
        });
      }

      // ── RETAKE ──
      async function startRetake() {
        if (!currentLightbox) return;
        retakePurchaseId = currentLightbox.id;
        const company = getCompanyName(currentLightbox.profile_id);

        const res = await fetch("/api/upload-session", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ bill_no: currentLightbox.bill_no, company }),
        });
        const data = await res.json();
        retakeToken = data.token;

        const url = `${window.location.origin}/upload/${retakeToken}`;
        const qrDiv = document.getElementById("retakeQrCode");
        qrDiv.innerHTML = "";
        new QRCode(qrDiv, { text: url, width: 180, height: 180 });

        document.getElementById("qrModal").classList.add("show");
        document.getElementById("retakeStatus").textContent =
          "Waiting for upload...";
        retakePollInterval = setInterval(checkRetakeStatus, 2000);
      }

      async function checkRetakeStatus() {
        if (!retakeToken) return;
        try {
          const res = await fetch(`/api/upload-session/${retakeToken}/status`);
          const data = await res.json();
          if (data.uploaded && data.photo_url) {
            clearInterval(retakePollInterval);
            // Save new photo to purchase
            const upd = await fetch(
              `/api/purchases/${retakePurchaseId}/photo`,
              {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ photo_url: data.photo_url }),
              },
            );
            if (upd.ok) {
              document.getElementById("retakeStatus").textContent =
                "✓ Photo updated!";
              showToast("Photo replaced successfully", "success");
              setTimeout(() => {
                closeQrModal();
                closeLightbox();
                loadAllPurchases();
              }, 1200);
            } else {
              showToast("Failed to update", "error");
            }
          }
        } catch (e) {}
      }

      function closeQrModal() {
        if (retakePollInterval) clearInterval(retakePollInterval);
        retakeToken = null;
        retakePurchaseId = null;
        document.getElementById("qrModal").classList.remove("show");
      }

      // ── DELETE UNLINKED ──
      async function deleteUnlinked() {
        const confirm1 = confirm(
          "This will permanently delete all Cloudinary photos that have no matching record in the database.\n\nAre you sure?",
        );
        if (!confirm1) return;

        const btn = document.getElementById("deleteUnlinkedBtn");
        btn.disabled = true;
        btn.textContent = "⏳ Scanning & Deleting...";
        showToast("Scanning Cloudinary for unlinked photos...");

        try {
          const res = await fetch("/api/cloudinary/delete-unlinked", {
            method: "DELETE",
          });
          const data = await res.json();
          if (data.status === "SUCCESS") {
            if (data.deleted === 0) {
              showToast(
                "No unlinked photos found — nothing deleted",
                "success",
              );
            } else {
              showToast(
                `Deleted ${data.deleted} unlinked photo(s) from Cloudinary`,
                "success",
              );
            }
            if (data.failed > 0) {
              showToast(`${data.failed} photo(s) failed to delete`, "error");
            }
            // Reload gallery
            await loadAllPurchases();
          } else {
            showToast("Error: " + (data.error || "Unknown"), "error");
          }
        } catch (e) {
          showToast("Error: " + e.message, "error");
        } finally {
          btn.disabled = false;
          btn.textContent = "🗑 Delete Unlinked from Cloudinary";
        }
      }

      // ── KEYBOARD ──
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          if (document.getElementById("qrModal").classList.contains("show"))
            closeQrModal();
          else if (
            document.getElementById("lightbox").classList.contains("show")
          )
            closeLightbox();
        }
      });

      // ── INIT ──
      (async () => {
        await loadCompanies();
        await loadAllPurchases();
      })();

      // Override applyFilters to reset folder nav
      const _origApplyFilters = applyFilters;
    </script>
  </body>
</html>
